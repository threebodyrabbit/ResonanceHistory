const DATA = [{"label_a": "Roman Empire", "label_b": "United States", "similarity": 0.321, "lcs_length": 9, "timeline_a": [{"title": "Founding of the Roman Republic", "title_zh": "\u7f57\u9a6c\u5171\u548c\u56fd\u6210\u7acb", "year": -509, "category": "reform", "description": "The overthrow of the Roman monarchy and the establishment of a republic, marking a significant shift in Roman governance towards elected officials and a senate.", "description_zh": "\u7f57\u9a6c\u738b\u653f\u88ab\u63a8\u7ffb\uff0c\u5171\u548c\u56fd\u5efa\u7acb\uff0c\u6807\u5fd7\u7740\u7f57\u9a6c\u6cbb\u7406\u6a21\u5f0f\u5411\u6c11\u9009\u5b98\u5458\u548c\u5143\u8001\u9662\u7684\u91cd\u5927\u8f6c\u53d8\u3002"}, {"title": "First Punic War Begins", "title_zh": "\u7b2c\u4e00\u6b21\u5e03\u533f\u6218\u4e89\u7206\u53d1", "year": -264, "category": "war", "description": "The first of three major conflicts between Rome and Carthage, primarily fought over control of Sicily and naval dominance in the Western Mediterranean.", "description_zh": "\u7f57\u9a6c\u4e0e\u8fe6\u592a\u57fa\u4e4b\u95f4\u4e09\u573a\u4e3b\u8981\u51b2\u7a81\u7684\u5f00\u7aef\uff0c\u4e3b\u8981\u56f4\u7ed5\u897f\u897f\u91cc\u5c9b\u7684\u63a7\u5236\u6743\u548c\u897f\u5730\u4e2d\u6d77\u7684\u6d77\u4e0a\u9738\u6743\u5c55\u5f00\u3002"}, {"title": "Destruction of Carthage and Corinth", "title_zh": "\u8fe6\u592a\u57fa\u548c\u79d1\u6797\u65af\u88ab\u6bc1", "year": -146, "category": "war", "description": "Rome decisively ends the Third Punic War with the destruction of Carthage and simultaneously sacks Corinth, marking the end of Greek independence and Roman dominance in the Mediterranean.", "description_zh": "\u7f57\u9a6c\u5728\u7b2c\u4e09\u6b21\u5e03\u533f\u6218\u4e89\u4e2d\u6467\u6bc1\u8fe6\u592a\u57fa\uff0c\u5e76\u540c\u65f6\u6d17\u52ab\u79d1\u6797\u65af\uff0c\u6807\u5fd7\u7740\u5e0c\u814a\u72ec\u7acb\u548c\u7f57\u9a6c\u5728\u5730\u4e2d\u6d77\u7684\u9738\u6743\u7ec8\u7ed3\u3002"}, {"title": "Tiberius Gracchus's Land Reforms", "title_zh": "\u63d0\u6bd4\u7565\u00b7\u683c\u62c9\u53e4\u7684\u571f\u5730\u6539\u9769", "year": -133, "category": "reform", "description": "Tiberius Gracchus attempts to redistribute public land to landless citizens, sparking intense political conflict and violence that foreshadows the Republic's instability.", "description_zh": "\u63d0\u6bd4\u7565\u00b7\u683c\u62c9\u53e4\u8bd5\u56fe\u5c06\u516c\u6709\u571f\u5730\u91cd\u65b0\u5206\u914d\u7ed9\u65e0\u5730\u516c\u6c11\uff0c\u5f15\u53d1\u4e86\u6fc0\u70c8\u7684\u653f\u6cbb\u51b2\u7a81\u548c\u66b4\u529b\uff0c\u9884\u793a\u7740\u5171\u548c\u56fd\u7684\u4e0d\u7a33\u5b9a\u3002"}, {"title": "Marian Reforms", "title_zh": "\u9a6c\u7565\u6539\u9769", "year": -107, "category": "reform", "description": "Gaius Marius opens military recruitment to landless citizens, professionalizing the army but also creating armies loyal to their generals rather than the state.", "description_zh": "\u76d6\u4e4c\u65af\u00b7\u9a6c\u7565\u5411\u65e0\u5730\u516c\u6c11\u5f00\u653e\u519b\u961f\u62db\u52df\uff0c\u4f7f\u519b\u961f\u804c\u4e1a\u5316\uff0c\u4f46\u4e5f\u5bfc\u81f4\u519b\u961f\u6548\u5fe0\u4e8e\u5c06\u519b\u800c\u975e\u56fd\u5bb6\u3002"}, {"title": "Sulla's Civil War and Dictatorship", "title_zh": "\u82cf\u62c9\u5185\u6218\u4e0e\u72ec\u88c1", "year": -82, "category": "civil_war", "description": "Lucius Cornelius Sulla marches on Rome, wins a civil war, and becomes dictator, enacting proscriptions and constitutional reforms that further destabilize the Republic.", "description_zh": "\u5362\u57fa\u4e4c\u65af\u00b7\u79d1\u5c14\u5185\u5229\u4e4c\u65af\u00b7\u82cf\u62c9\u8fdb\u519b\u7f57\u9a6c\uff0c\u8d62\u5f97\u5185\u6218\u5e76\u6210\u4e3a\u72ec\u88c1\u5b98\uff0c\u9881\u5e03\u4e86\u8fdb\u4e00\u6b65\u7834\u574f\u5171\u548c\u56fd\u7a33\u5b9a\u7684\u7981\u4ee4\u548c\u5baa\u6cd5\u6539\u9769\u3002"}, {"title": "Formation of the First Triumvirate", "title_zh": "\u7b2c\u4e00\u6b21\u4e09\u5934\u540c\u76df\u6210\u7acb", "year": -60, "category": "diplomacy", "description": "An informal political alliance between Julius Caesar, Pompey the Great, and Marcus Licinius Crassus to dominate Roman politics.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u3001\u5e9e\u57f9\u548c\u514b\u62c9\u82cf\u4e4b\u95f4\u4e3a\u63a7\u5236\u7f57\u9a6c\u653f\u6cbb\u800c\u5efa\u7acb\u7684\u975e\u6b63\u5f0f\u653f\u6cbb\u8054\u76df\u3002"}, {"title": "Caesar Crosses the Rubicon", "title_zh": "\u51ef\u6492\u6e21\u8fc7\u5362\u6bd4\u5b54\u6cb3", "year": -49, "category": "civil_war", "description": "Julius Caesar leads his army across the Rubicon River into Italy, defying the Senate and initiating a civil war against Pompey.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u7387\u519b\u6e21\u8fc7\u5362\u6bd4\u5b54\u6cb3\u8fdb\u5165\u610f\u5927\u5229\uff0c\u8fdd\u6297\u5143\u8001\u9662\uff0c\u5e76\u5f15\u53d1\u4e86\u4e0e\u5e9e\u57f9\u7684\u5185\u6218\u3002"}, {"title": "Assassination of Julius Caesar", "title_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u9047\u523a", "year": -44, "category": "revolution", "description": "Julius Caesar is assassinated by a group of senators on the Ides of March, plunging Rome back into civil war.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u5728\u4e09\u6708\u5341\u4e94\u65e5\u88ab\u4e00\u7fa4\u53c2\u8bae\u5458\u523a\u6740\uff0c\u4f7f\u7f57\u9a6c\u518d\u6b21\u9677\u5165\u5185\u6218\u3002"}, {"title": "Battle of Actium", "title_zh": "\u4e9a\u514b\u5174\u89d2\u6218\u5f79", "year": -31, "category": "war", "description": "Octavian's fleet decisively defeats the combined forces of Mark Antony and Cleopatra, leading to Octavian's sole rule and the end of the Roman Republic.", "description_zh": "\u5c4b\u5927\u7ef4\u7684\u8230\u961f\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u9a6c\u514b\u00b7\u5b89\u4e1c\u5c3c\u548c\u514b\u5229\u5965\u5e15\u7279\u62c9\u7684\u8054\u5408\u90e8\u961f\uff0c\u5bfc\u81f4\u5c4b\u5927\u7ef4\u72ec\u638c\u5927\u6743\uff0c\u7f57\u9a6c\u5171\u548c\u56fd\u7ec8\u7ed3\u3002"}, {"title": "Establishment of the Roman Empire", "title_zh": "\u7f57\u9a6c\u5e1d\u56fd\u5efa\u7acb", "year": -27, "category": "reform", "description": "Octavian is granted the title Augustus by the Senate, marking the transition from the Roman Republic to the Roman Empire and the beginning of the Pax Romana.", "description_zh": "\u5c4b\u5927\u7ef4\u88ab\u5143\u8001\u9662\u6388\u4e88\u201c\u5965\u53e4\u65af\u90fd\u201d\u79f0\u53f7\uff0c\u6807\u5fd7\u7740\u7f57\u9a6c\u5171\u548c\u56fd\u5411\u7f57\u9a6c\u5e1d\u56fd\u7684\u8fc7\u6e21\u4ee5\u53ca\u7f57\u9a6c\u548c\u5e73\u65f6\u671f\u7684\u5f00\u59cb\u3002"}, {"title": "Roman Conquest of Britain Begins", "title_zh": "\u7f57\u9a6c\u5f81\u670d\u4e0d\u5217\u98a0\u5f00\u59cb", "year": 43, "category": "colonization", "description": "Emperor Claudius orders the invasion of Britain, initiating a long period of Roman rule and integration of the island into the empire.", "description_zh": "\u7687\u5e1d\u514b\u52b3\u72c4\u4e4c\u65af\u4e0b\u4ee4\u5165\u4fb5\u4e0d\u5217\u98a0\uff0c\u5f00\u59cb\u4e86\u7f57\u9a6c\u7edf\u6cbb\u5e76\u5c06\u5176\u7eb3\u5165\u5e1d\u56fd\u7684\u957f\u671f\u65f6\u671f\u3002"}, {"title": "Great Fire of Rome", "title_zh": "\u7f57\u9a6c\u5927\u706b", "year": 64, "category": "disaster", "description": "A massive fire devastates Rome, leading to widespread destruction and accusations against Emperor Nero, who used the event to rebuild parts of the city.", "description_zh": "\u4e00\u573a\u5927\u706b\u6467\u6bc1\u4e86\u7f57\u9a6c\u7684\u5927\u90e8\u5206\u5730\u533a\uff0c\u5bfc\u81f4\u5e7f\u6cdb\u7684\u7834\u574f\uff0c\u5e76\u5f15\u53d1\u4e86\u5bf9\u5c3c\u7984\u7687\u5e1d\u7684\u6307\u63a7\uff0c\u4ed6\u5229\u7528\u8fd9\u573a\u706b\u707e\u91cd\u5efa\u4e86\u90e8\u5206\u57ce\u5e02\u3002"}, {"title": "Crisis of the Third Century Begins", "title_zh": "\u4e09\u4e16\u7eaa\u5371\u673a\u5f00\u59cb", "year": 235, "category": "economic_crisis", "description": "A period of intense political instability, civil war, plague, and economic depression that nearly led to the collapse of the Roman Empire.", "description_zh": "\u4e00\u6bb5\u653f\u6cbb\u52a8\u8361\u3001\u5185\u6218\u3001\u761f\u75ab\u548c\u7ecf\u6d4e\u8427\u6761\u7684\u65f6\u671f\uff0c\u51e0\u4e4e\u5bfc\u81f4\u7f57\u9a6c\u5e1d\u56fd\u5d29\u6e83\u3002"}, {"title": "Diocletian Divides the Roman Empire", "title_zh": "\u6234\u514b\u91cc\u5148\u5212\u5206\u7f57\u9a6c\u5e1d\u56fd", "year": 285, "category": "reform", "description": "Emperor Diocletian establishes the Tetrarchy, dividing the empire into Eastern and Western halves, each with its own emperor and Caesar, in an attempt to restore order.", "description_zh": "\u7687\u5e1d\u6234\u514b\u91cc\u5148\u5efa\u7acb\u56db\u5e1d\u5171\u6cbb\u5236\uff0c\u5c06\u5e1d\u56fd\u5206\u4e3a\u4e1c\u897f\u4e24\u90e8\u5206\uff0c\u6bcf\u90e8\u5206\u5404\u6709\u4e00\u4f4d\u7687\u5e1d\u548c\u4e00\u4f4d\u51ef\u6492\uff0c\u8bd5\u56fe\u6062\u590d\u79e9\u5e8f\u3002"}, {"title": "Fall of the Western Roman Empire", "title_zh": "\u897f\u7f57\u9a6c\u5e1d\u56fd\u706d\u4ea1", "year": 476, "category": "collapse", "description": "The deposition of the last Western Roman Emperor, Romulus Augustulus, by the Germanic chieftain Odoacer, traditionally marking the end of the Western Roman Empire.", "description_zh": "\u65e5\u8033\u66fc\u9996\u9886\u5965\u591a\u4e9a\u514b\u5e9f\u9edc\u4e86\u6700\u540e\u4e00\u4f4d\u897f\u7f57\u9a6c\u7687\u5e1d\u7f57\u6155\u8def\u65af\u00b7\u5965\u53e4\u65af\u90fd\uff0c\u4f20\u7edf\u4e0a\u6807\u5fd7\u7740\u897f\u7f57\u9a6c\u5e1d\u56fd\u7684\u7ec8\u7ed3\u3002"}], "timeline_b": [{"title": "Founding of Jamestown", "title_zh": "\u8a79\u59c6\u65af\u6566\u7684\u5efa\u7acb", "year": 1607, "category": "colonization", "description": "The first permanent English settlement in North America was established by the Virginia Company.", "description_zh": "\u5f17\u5409\u5c3c\u4e9a\u516c\u53f8\u5728\u5317\u7f8e\u5efa\u7acb\u4e86\u7b2c\u4e00\u4e2a\u6c38\u4e45\u6027\u82f1\u56fd\u5b9a\u5c45\u70b9\u3002"}, {"title": "Mayflower Compact Signed", "title_zh": "\u300a\u4e94\u6708\u82b1\u53f7\u516c\u7ea6\u300b\u7b7e\u7f72", "year": 1620, "category": "diplomacy", "description": "Pilgrims aboard the Mayflower signed an agreement to establish a self-governing colony based on majority rule.", "description_zh": "\u300a\u4e94\u6708\u82b1\u53f7\u516c\u7ea6\u300b\u662f\u4e58\u5750\u4e94\u6708\u82b1\u53f7\u7684\u6e05\u6559\u5f92\u7b7e\u7f72\u7684\u4e00\u9879\u534f\u8bae\uff0c\u65e8\u5728\u5efa\u7acb\u4e00\u4e2a\u57fa\u4e8e\u591a\u6570\u7edf\u6cbb\u7684\u81ea\u6cbb\u6b96\u6c11\u5730\u3002"}, {"title": "End of the French and Indian War", "title_zh": "\u6cd5\u56fd-\u5370\u7b2c\u5b89\u6218\u4e89\u7ed3\u675f", "year": 1763, "category": "war", "description": "The Treaty of Paris ended the war, with France ceding its North American territories to Great Britain.", "description_zh": "\u300a\u5df4\u9ece\u6761\u7ea6\u300b\u7ed3\u675f\u4e86\u6218\u4e89\uff0c\u6cd5\u56fd\u5c06\u5176\u5317\u7f8e\u9886\u571f\u5272\u8ba9\u7ed9\u82f1\u56fd\u3002"}, {"title": "Start of the American Revolutionary War", "title_zh": "\u7f8e\u56fd\u72ec\u7acb\u6218\u4e89\u5f00\u59cb", "year": 1775, "category": "war", "description": "The first shots of the war were fired at Lexington and Concord, marking the beginning of the fight for American independence.", "description_zh": "\u6218\u4e89\u7684\u7b2c\u4e00\u67aa\u5728\u5217\u514b\u661f\u6566\u548c\u5eb7\u79d1\u5fb7\u6253\u54cd\uff0c\u6807\u5fd7\u7740\u4e89\u53d6\u7f8e\u56fd\u72ec\u7acb\u7684\u6597\u4e89\u7684\u5f00\u59cb\u3002"}, {"title": "U.S. Constitution Ratified", "title_zh": "\u7f8e\u56fd\u5baa\u6cd5\u83b7\u5f97\u6279\u51c6", "year": 1788, "category": "reform", "description": "The U.S. Constitution was ratified, establishing the framework for the federal government.", "description_zh": "\u7f8e\u56fd\u5baa\u6cd5\u83b7\u5f97\u6279\u51c6\uff0c\u4e3a\u8054\u90a6\u653f\u5e9c\u5960\u5b9a\u4e86\u6846\u67b6\u3002"}, {"title": "Louisiana Purchase", "title_zh": "\u8def\u6613\u65af\u5b89\u90a3\u8d2d\u5730", "year": 1803, "category": "diplomacy", "description": "The United States purchased the Louisiana Territory from France, doubling the size of the country.", "description_zh": "\u7f8e\u56fd\u4ece\u6cd5\u56fd\u8d2d\u4e70\u4e86\u8def\u6613\u65af\u5b89\u90a3\u9886\u571f\uff0c\u4f7f\u56fd\u5bb6\u9762\u79ef\u7ffb\u500d\u3002"}, {"title": "End of the War of 1812", "title_zh": "1812\u5e74\u6218\u4e89\u7ed3\u675f", "year": 1815, "category": "war", "description": "The Treaty of Ghent officially ended the War of 1812 between the United States and Great Britain.", "description_zh": "\u300a\u6839\u7279\u6761\u7ea6\u300b\u6b63\u5f0f\u7ed3\u675f\u4e86\u7f8e\u56fd\u4e0e\u82f1\u56fd\u4e4b\u95f4\u76841812\u5e74\u6218\u4e89\u3002"}, {"title": "Start of the Mexican-American War", "title_zh": "\u7f8e\u58a8\u6218\u4e89\u5f00\u59cb", "year": 1846, "category": "war", "description": "Conflict erupted between the United States and Mexico over territorial disputes, particularly concerning Texas.", "description_zh": "\u7531\u4e8e\u9886\u571f\u4e89\u7aef\uff0c\u7279\u522b\u662f\u5173\u4e8e\u5fb7\u514b\u8428\u65af\u5dde\u7684\u4e89\u7aef\uff0c\u7f8e\u56fd\u548c\u58a8\u897f\u54e5\u4e4b\u95f4\u7206\u53d1\u4e86\u51b2\u7a81\u3002"}, {"title": "California Gold Rush Begins", "title_zh": "\u52a0\u5dde\u6dd8\u91d1\u70ed\u5f00\u59cb", "year": 1848, "category": "migration", "description": "The discovery of gold at Sutter's Mill triggered a massive migration to California.", "description_zh": "\u8428\u7279\u78e8\u574a\u53d1\u73b0\u9ec4\u91d1\u5f15\u53d1\u4e86\u5927\u89c4\u6a21\u7684\u52a0\u5dde\u79fb\u6c11\u6f6e\u3002"}, {"title": "Start of the American Civil War", "title_zh": "\u7f8e\u56fd\u5185\u6218\u5f00\u59cb", "year": 1861, "category": "civil_war", "description": "The war began with the Confederate attack on Fort Sumter, South Carolina, over issues of slavery and states' rights.", "description_zh": "\u5185\u6218\u59cb\u4e8e\u90a6\u8054\u5bf9\u5357\u5361\u7f57\u6765\u7eb3\u5dde\u8428\u59c6\u7279\u5821\u7684\u88ad\u51fb\uff0c\u8d77\u56e0\u662f\u5974\u96b6\u5236\u548c\u5dde\u6743\u95ee\u9898\u3002"}, {"title": "Emancipation Proclamation Issued", "title_zh": "\u300a\u89e3\u653e\u5974\u96b6\u5ba3\u8a00\u300b\u53d1\u5e03", "year": 1863, "category": "reform", "description": "President Lincoln declared that all slaves in Confederate-held territory were to be freed.", "description_zh": "\u6797\u80af\u603b\u7edf\u5ba3\u5e03\uff0c\u6240\u6709\u5728\u90a6\u8054\u63a7\u5236\u4e0b\u7684\u5974\u96b6\u90fd\u5c06\u88ab\u89e3\u653e\u3002"}, {"title": "End of the American Civil War", "title_zh": "\u7f8e\u56fd\u5185\u6218\u7ed3\u675f", "year": 1865, "category": "civil_war", "description": "The war concluded with the surrender of Confederate forces, leading to the abolition of slavery.", "description_zh": "\u5185\u6218\u968f\u7740\u90a6\u8054\u519b\u961f\u7684\u6295\u964d\u800c\u7ed3\u675f\uff0c\u5e76\u5bfc\u81f4\u4e86\u5974\u96b6\u5236\u7684\u5e9f\u9664\u3002"}, {"title": "Completion of the First Transcontinental Railroad", "title_zh": "\u7b2c\u4e00\u6761\u6a2a\u8d2f\u5927\u9646\u94c1\u8def\u7ae3\u5de5", "year": 1869, "category": "technology", "description": "The Union Pacific and Central Pacific railroads met at Promontory Summit, Utah, connecting the eastern and western United States.", "description_zh": "\u8054\u5408\u592a\u5e73\u6d0b\u94c1\u8def\u548c\u4e2d\u592e\u592a\u5e73\u6d0b\u94c1\u8def\u5728\u72b9\u4ed6\u5dde\u666e\u7f57\u8499\u7279\u91cc\u5cf0\u4f1a\u5408\uff0c\u8fde\u63a5\u4e86\u7f8e\u56fd\u4e1c\u897f\u90e8\u3002"}, {"title": "Spanish-American War", "title_zh": "\u7f8e\u897f\u6218\u4e89", "year": 1898, "category": "war", "description": "A conflict between the United States and Spain that resulted in the U.S. acquiring territories like Puerto Rico, Guam, and the Philippines.", "description_zh": "\u7f8e\u56fd\u4e0e\u897f\u73ed\u7259\u4e4b\u95f4\u7684\u4e00\u573a\u51b2\u7a81\uff0c\u5bfc\u81f4\u7f8e\u56fd\u83b7\u5f97\u4e86\u6ce2\u591a\u9ece\u5404\u3001\u5173\u5c9b\u548c\u83f2\u5f8b\u5bbe\u7b49\u9886\u571f\u3002"}, {"title": "United States Enters World War I", "title_zh": "\u7f8e\u56fd\u8fdb\u5165\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218", "year": 1917, "category": "war", "description": "The U.S. declared war on Germany, entering the global conflict after years of neutrality.", "description_zh": "\u7f8e\u56fd\u5411\u5fb7\u56fd\u5ba3\u6218\uff0c\u5728\u591a\u5e74\u4e2d\u7acb\u540e\u8fdb\u5165\u5168\u7403\u51b2\u7a81\u3002"}, {"title": "Start of the Great Depression", "title_zh": "\u5927\u8427\u6761\u5f00\u59cb", "year": 1929, "category": "economic_crisis", "description": "The Wall Street Crash of 1929 marked the beginning of a severe worldwide economic depression.", "description_zh": "1929\u5e74\u7684\u534e\u5c14\u8857\u80a1\u707e\u6807\u5fd7\u7740\u4e00\u573a\u4e25\u91cd\u7684\u5168\u7403\u6027\u7ecf\u6d4e\u5927\u8427\u6761\u7684\u5f00\u59cb\u3002"}, {"title": "United States Enters World War II", "title_zh": "\u7f8e\u56fd\u8fdb\u5165\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218", "year": 1941, "category": "war", "description": "Following the attack on Pearl Harbor, the U.S. declared war on Japan and subsequently Germany and Italy.", "description_zh": "\u73cd\u73e0\u6e2f\u4e8b\u4ef6\u540e\uff0c\u7f8e\u56fd\u5411\u65e5\u672c\u5ba3\u6218\uff0c\u968f\u540e\u5411\u5fb7\u56fd\u548c\u610f\u5927\u5229\u5ba3\u6218\u3002"}, {"title": "First Successful Atomic Bomb Test (Trinity)", "title_zh": "\u9996\u6b21\u6210\u529f\u539f\u5b50\u5f39\u8bd5\u9a8c\uff08\u4e09\u4f4d\u4e00\u4f53\uff09", "year": 1945, "category": "technology", "description": "The Trinity test in New Mexico marked the first detonation of a nuclear weapon, a key part of the Manhattan Project.", "description_zh": "\u65b0\u58a8\u897f\u54e5\u5dde\u7684\u4e09\u4f4d\u4e00\u4f53\u8bd5\u9a8c\u6807\u5fd7\u7740\u7b2c\u4e00\u679a\u6838\u6b66\u5668\u7684\u7206\u70b8\uff0c\u662f\u66fc\u54c8\u987f\u8ba1\u5212\u7684\u5173\u952e\u90e8\u5206\u3002"}, {"title": "End of World War II", "title_zh": "\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u7ed3\u675f", "year": 1945, "category": "war", "description": "The war concluded with the surrender of Japan after the atomic bombings of Hiroshima and Nagasaki.", "description_zh": "\u6218\u4e89\u968f\u7740\u65e5\u672c\u5728\u5e7f\u5c9b\u548c\u957f\u5d0e\u539f\u5b50\u5f39\u7206\u70b8\u540e\u6295\u964d\u800c\u7ed3\u675f\u3002"}, {"title": "Beginning of the Cold War", "title_zh": "\u51b7\u6218\u5f00\u59cb", "year": 1947, "category": "war", "description": "The Truman Doctrine and the Marshall Plan signaled the start of a period of geopolitical tension between the U.S. and the Soviet Union.", "description_zh": "\u675c\u9c81\u95e8\u4e3b\u4e49\u548c\u9a6c\u6b47\u5c14\u8ba1\u5212\u6807\u5fd7\u7740\u7f8e\u56fd\u4e0e\u82cf\u8054\u4e4b\u95f4\u5730\u7f18\u653f\u6cbb\u7d27\u5f20\u65f6\u671f\u5f00\u59cb\u3002"}, {"title": "Korean War Begins", "title_zh": "\u671d\u9c9c\u6218\u4e89\u5f00\u59cb", "year": 1950, "category": "war", "description": "The U.S. led United Nations forces intervened when North Korea invaded South Korea.", "description_zh": "\u671d\u9c9c\u5165\u4fb5\u97e9\u56fd\u540e\uff0c\u7f8e\u56fd\u9886\u5bfc\u7684\u8054\u5408\u56fd\u90e8\u961f\u4ecb\u5165\u3002"}, {"title": "Brown v. Board of Education Ruling", "title_zh": "\u5e03\u6717\u8bc9\u6559\u80b2\u59d4\u5458\u4f1a\u6848\u88c1\u51b3", "year": 1954, "category": "reform", "description": "The Supreme Court declared state-sponsored segregation in public schools unconstitutional.", "description_zh": "\u6700\u9ad8\u6cd5\u9662\u5ba3\u5e03\u516c\u7acb\u5b66\u6821\u4e2d\u7684\u5dde\u653f\u5e9c\u652f\u6301\u7684\u79cd\u65cf\u9694\u79bb\u8fdd\u5baa\u3002"}, {"title": "Gulf of Tonkin Incident and Escalation of Vietnam War", "title_zh": "\u4e1c\u4eac\u6e7e\u4e8b\u4ef6\u4e0e\u8d8a\u5357\u6218\u4e89\u5347\u7ea7", "year": 1964, "category": "war", "description": "The Gulf of Tonkin Resolution authorized President Johnson to increase U.S. military involvement in Vietnam.", "description_zh": "\u4e1c\u4eac\u6e7e\u51b3\u8bae\u6388\u6743\u7ea6\u7ff0\u900a\u603b\u7edf\u589e\u52a0\u7f8e\u56fd\u5728\u8d8a\u5357\u7684\u519b\u4e8b\u4ecb\u5165\u3002"}, {"title": "Civil Rights Act of 1964 Signed", "title_zh": "1964\u5e74\u6c11\u6743\u6cd5\u6848\u7b7e\u7f72", "year": 1964, "category": "reform", "description": "This landmark legislation outlawed discrimination based on race, color, religion, sex, or national origin.", "description_zh": "\u8fd9\u9879\u91cc\u7a0b\u7891\u5f0f\u7684\u7acb\u6cd5\u7981\u6b62\u57fa\u4e8e\u79cd\u65cf\u3001\u80a4\u8272\u3001\u5b97\u6559\u3001\u6027\u522b\u6216\u56fd\u7c4d\u7684\u6b67\u89c6\u3002"}, {"title": "Apollo 11 Moon Landing", "title_zh": "\u963f\u6ce2\u7f5711\u53f7\u767b\u6708", "year": 1969, "category": "technology", "description": "Neil Armstrong and Buzz Aldrin became the first humans to walk on the Moon.", "description_zh": "\u5c3c\u5c14\u00b7\u963f\u59c6\u65af\u7279\u6717\u548c\u5df4\u5179\u00b7\u5965\u5c14\u5fb7\u6797\u6210\u4e3a\u9996\u6279\u8e0f\u4e0a\u6708\u7403\u7684\u4eba\u7c7b\u3002"}, {"title": "Dissolution of the Soviet Union", "title_zh": "\u82cf\u8054\u89e3\u4f53", "year": 1991, "category": "collapse", "description": "The dissolution of the Soviet Union marked the end of the Cold War.", "description_zh": "\u82cf\u8054\u89e3\u4f53\u6807\u5fd7\u7740\u51b7\u6218\u7684\u7ed3\u675f\u3002"}, {"title": "September 11th Attacks", "title_zh": "9\u670811\u65e5\u88ad\u51fb\u4e8b\u4ef6", "year": 2001, "category": "war", "description": "Terrorist attacks on the World Trade Center and the Pentagon led to the U.S. launching the War on Terror.", "description_zh": "\u5bf9\u4e16\u754c\u8d38\u6613\u4e2d\u5fc3\u548c\u4e94\u89d2\u5927\u697c\u7684\u6050\u6016\u88ad\u51fb\u5bfc\u81f4\u7f8e\u56fd\u53d1\u52a8\u4e86\u53cd\u6050\u6218\u4e89\u3002"}, {"title": "Start of the Great Recession", "title_zh": "\u5927\u8870\u9000\u5f00\u59cb", "year": 2007, "category": "economic_crisis", "description": "A severe worl \uff0c\u8bd5\u56fe\u6062\u590d\u79e9\u5e8f\u3002"}, "b": {"title": "Civil Rights Act of 1964 Signed", "title_zh": "1964\u5e74\u6c11\u6743\u6cd5\u6848\u7b7e\u7f72", "year": 1964, "description": "This landmark legislation outlawed discrimination based on race, color, religion, sex, or national origin.", "description_zh": "\u8fd9\u9879\u91cc\u7a0b\u7891\u5f0f\u7684\u7acb\u6cd5\u7981\u6b62\u57fa\u4e8e\u79cd\u65cf\u3001\u80a4\u8272\u3001\u5b97\u6559\u3001\u6027\u522b\u6216\u56fd\u7c4d\u7684\u6b67\u89c6\u3002"}}, {"category": "collapse", "a": {"title": "Fall of the Western Roman Empire", "title_zh": "\u897f\u7f57\u9a6c\u5e1d\u56fd\u706d\u4ea1", "year": 476, "description": "The deposition of the last Western Roman Emperor, Romulus Augustulus, by the Germanic chieftain Odoacer, traditionally marking the end of the Western Roman Empire.", "description_zh": "\u65e5\u8033\u66fc\u9996\u9886\u5965\u591a\u4e9a\u514b\u5e9f\u9edc\u4e86\u6700\u540e\u4e00\u4f4d\u897f\u7f57\u9a6c\u7687\u5e1d\u7f57\u6155\u8def\u65af\u00b7\u5965\u53e4\u65af\u90fd\uff0c\u4f20\u7edf\u4e0a\u6807\u5fd7\u7740\u897f\u7f57\u9a6c\u5e1d\u56fd\u7684\u7ec8\u7ed3\u3002"}, "b": {"title": "Dissolution of the Soviet Union", "title_zh": "\u82cf\u8054\u89e3\u4f53", "year": 1991, "description": "The dissolution of the Soviet Union marked the end of the Cold War.", "description_zh": "\u82cf\u8054\u89e3\u4f53\u6807\u5fd7\u7740\u51b7\u6218\u7684\u7ed3\u675f\u3002"}}], "prediction": {"title": "Diocletian Divides the Roman Empire", "title_zh": "\u6234\u514b\u91cc\u5148\u5212\u5206\u7f57\u9a6c\u5e1d\u56fd", "year": 285, "category": "reform", "description": "Emperor Diocletian establishes the Tetrarchy, dividing the empire into Eastern and Western halves, each with its own emperor and Caesar, in an attempt to restore order.", "description_zh": "\u7687\u5e1d\u6234\u514b\u91cc\u5148\u5efa\u7acb\u56db\u5e1d\u5171\u6cbb\u5236\uff0c\u5c06\u5e1d\u56fd\u5206\u4e3a\u4e1c\u897f\u4e24\u90e8\u5206\uff0c\u6bcf\u90e8\u5206\u5404\u6709\u4e00\u4f4d\u7687\u5e1d\u548c\u4e00\u4f4d\u51ef\u6492\uff0c\u8bd5\u56fe\u6062\u590d\u79e9\u5e8f\u3002"}}, {"label_a": "Roman Empire", "label_b": "Han Dynasty", "similarity": 0.375, "lcs_length": 6, "timeline_a": [{"title": "Founding of the Roman Republic", "title_zh": "\u7f57\u9a6c\u5171\u548c\u56fd\u6210\u7acb", "year": -509, "category": "reform", "description": "The overthrow of the Roman monarchy and the establishment of a republic, marking a significant shift in Roman governance towards elected officials and a senate.", "description_zh": "\u7f57\u9a6c\u738b\u653f\u88ab\u63a8\u7ffb\uff0c\u5171\u548c\u56fd\u5efa\u7acb\uff0c\u6807\u5fd7\u7740\u7f57\u9a6c\u6cbb\u7406\u6a21\u5f0f\u5411\u6c11\u9009\u5b98\u5458\u548c\u5143\u8001\u9662\u7684\u91cd\u5927\u8f6c\u53d8\u3002"}, {"title": "First Punic War Begins", "title_zh": "\u7b2c\u4e00\u6b21\u5e03\u533f\u6218\u4e89\u7206\u53d1", "year": -264, "category": "war", "description": "The first of three major conflicts between Rome and Carthage, primarily fought over control of Sicily and naval dominance in the Western Mediterranean.", "description_zh": "\u7f57\u9a6c\u4e0e\u8fe6\u592a\u57fa\u4e4b\u95f4\u4e09\u573a\u4e3b\u8981\u51b2\u7a81\u7684\u5f00\u7aef\uff0c\u4e3b\u8981\u56f4\u7ed5\u897f\u897f\u91cc\u5c9b\u7684\u63a7\u5236\u6743\u548c\u897f\u5730\u4e2d\u6d77\u7684\u6d77\u4e0a\u9738\u6743\u5c55\u5f00\u3002"}, {"title": "Destruction of Carthage and Corinth", "title_zh": "\u8fe6\u592a\u57fa\u548c\u79d1\u6797\u65af\u88ab\u6bc1", "year": -146, "category": "war", "description": "Rome decisively ends the Third Punic War with the destruction of Carthage and simultaneously sacks Corinth, marking the end of Greek independence and Roman dominance in the Mediterranean.", "description_zh": "\u7f57\u9a6c\u5728\u7b2c\u4e09\u6b21\u5e03\u533f\u6218\u4e89\u4e2d\u6467\u6bc1\u8fe6\u592a\u57fa\uff0c\u5e76\u540c\u65f6\u6d17\u52ab\u79d1\u6797\u65af\uff0c\u6807\u5fd7\u7740\u5e0c\u814a\u72ec\u7acb\u548c\u7f57\u9a6c\u5728\u5730\u4e2d\u6d77\u7684\u9738\u6743\u7ec8\u7ed3\u3002"}, {"title": "Tiberius Gracchus's Land Reforms", "title_zh": "\u63d0\u6bd4\u7565\u00b7\u683c\u62c9\u53e4\u7684\u571f\u5730\u6539\u9769", "year": -133, "category": "reform", "description": "Tiberius Gracchus attempts to redistribute public land to landless citizens, sparking intense political conflict and violence that foreshadows the Republic's instability.", "description_zh": "\u63d0\u6bd4\u7565\u00b7\u683c\u62c9\u53e4\u8bd5\u56fe\u5c06\u516c\u6709\u571f\u5730\u91cd\u65b0\u5206\u914d\u7ed9\u65e0\u5730\u516c\u6c11\uff0c\u5f15\u53d1\u4e86\u6fc0\u70c8\u7684\u653f\u6cbb\u51b2\u7a81\u548c\u66b4\u529b\uff0c\u9884\u793a\u7740\u5171\u548c\u56fd\u7684\u4e0d\u7a33\u5b9a\u3002"}, {"title": "Marian Reforms", "title_zh": "\u9a6c\u7565\u6539\u9769", "year": -107, "category": "reform", "description": "Gaius Marius opens military recruitment to landless citizens, professionalizing the army but also creating armies loyal to their generals rather than the state.", "description_zh": "\u76d6\u4e4c\u65af\u00b7\u9a6c\u7565\u5411\u65e0\u5730\u516c\u6c11\u5f00\u653e\u519b\u961f\u62db\u52df\uff0c\u4f7f\u519b\u961f\u804c\u4e1a\u5316\uff0c\u4f46\u4e5f\u5bfc\u81f4\u519b\u961f\u6548\u5fe0\u4e8e\u5c06\u519b\u800c\u975e\u56fd\u5bb6\u3002"}, {"title": "Sulla's Civil War and Dictatorship", "title_zh": "\u82cf\u62c9\u5185\u6218\u4e0e\u72ec\u88c1", "year": -82, "category": "civil_war", "description": "Lucius Cornelius Sulla marches on Rome, wins a civil war, and becomes dictator, enacting proscriptions and constitutional reforms that further destabilize the Republic.", "description_zh": "\u5362\u57fa\u4e4c\u65af\u00b7\u79d1\u5c14\u5185\u5229\u4e4c\u65af\u00b7\u82cf\u62c9\u8fdb\u519b\u7f57\u9a6c\uff0c\u8d62\u5f97\u5185\u6218\u5e76\u6210\u4e3a\u72ec\u88c1\u5b98\uff0c\u9881\u5e03\u4e86\u8fdb\u4e00\u6b65\u7834\u574f\u5171\u548c\u56fd\u7a33\u5b9a\u7684\u7981\u4ee4\u548c\u5baa\u6cd5\u6539\u9769\u3002"}, {"title": "Formation of the First Triumvirate", "title_zh": "\u7b2c\u4e00\u6b21\u4e09\u5934\u540c\u76df\u6210\u7acb", "year": -60, "category": "diplomacy", "description": "An informal political alliance between Julius Caesar, Pompey the Great, and Marcus Licinius Crassus to dominate Roman politics.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u3001\u5e9e\u57f9\u548c\u514b\u62c9\u82cf\u4e4b\u95f4\u4e3a\u63a7\u5236\u7f57\u9a6c\u653f\u6cbb\u800c\u5efa\u7acb\u7684\u975e\u6b63\u5f0f\u653f\u6cbb\u8054\u76df\u3002"}, {"title": "Caesar Crosses the Rubicon", "title_zh": "\u51ef\u6492\u6e21\u8fc7\u5362\u6bd4\u5b54\u6cb3", "year": -49, "category": "civil_war", "description": "Julius Caesar leads his army across the Rubicon River into Italy, defying the Senate and initiating a civil war against Pompey.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u7387\u519b\u6e21\u8fc7\u5362\u6bd4\u5b54\u6cb3\u8fdb\u5165\u610f\u5927\u5229\uff0c\u8fdd\u6297\u5143\u8001\u9662\uff0c\u5e76\u5f15\u53d1\u4e86\u4e0e\u5e9e\u57f9\u7684\u5185\u6218\u3002"}, {"title": "Assassination of Julius Caesar", "title_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u9047\u523a", "year": -44, "category": "revolution", "description": "Julius Caesar is assassinated by a group of senators on the Ides of March, plunging Rome back into civil war.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u5728\u4e09\u6708\u5341\u4e94\u65e5\u88ab\u4e00\u7fa4\u53c2\u8bae\u5458\u523a\u6740\uff0c\u4f7f\u7f57\u9a6c\u518d\u6b21\u9677\u5165\u5185\u6218\u3002"}, {"title": "Battle of Actium", "title_zh": "\u4e9a\u514b\u5174\u89d2\u6218\u5f79", "year": -31, "category": "war", "description": "Octavian's fleet decisively defeats the combined forces of Mark Antony and Cleopatra, leading to Octavian's sole rule and the end of the Roman Republic.", "description_zh": "\u5c4b\u5927\u7ef4\u7684\u8230\u961f\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u9a6c\u514b\u00b7\u5b89\u4e1c\u5c3c\u548c\u514b\u5229\u5965\u5e15\u7279\u62c9\u7684\u8054\u5408\u90e8\u961f\uff0c\u5bfc\u81f4\u5c4b\u5927\u7ef4\u72ec\u638c\u5927\u6743\uff0c\u7f57\u9a6c\u5171\u548c\u56fd\u7ec8\u7ed3\u3002"}, {"title": "Establishment of the Roman Empire", "title_zh": "\u7f57\u9a6c\u5e1d\u56fd\u5efa\u7acb", "year": -27, "category": "reform", "description": "Octavian is granted the title Augustus by the Senate, marking the transition from the Roman Republic to the Roman Empire and the beginning of the Pax Romana.", "description_zh": "\u5c4b\u5927\u7ef4\u88ab\u5143\u8001\u9662\u6388\u4e88\u201c\u5965\u53e4\u65af\u90fd\u201d\u79f0\u53f7\uff0c\u6807\u5fd7\u7740\u7f57\u9a6c\u5171\u548c\u56fd\u5411\u7f57\u9a6c\u5e1d\u56fd\u7684\u8fc7\u6e21\u4ee5\u53ca\u7f57\u9a6c\u548c\u5e73\u65f6\u671f\u7684\u5f00\u59cb\u3002"}, {"title": "Roman Conquest of Britain Begins", "title_zh": "\u7f57\u9a6c\u5f81\u670d\u4e0d\u5217\u98a0\u5f00\u59cb", "year": 43, "category": "colonization", "description": "Emperor Claudius orders the invasion of Britain, initiating a long period of Roman rule and integration of the island into the empire.", "description_zh": "\u7687\u5e1d\u514b\u52b3\u72c4\u4e4c\u65af\u4e0b\u4ee4\u5165\u4fb5\u4e0d\u5217\u98a0\uff0c\u5f00\u59cb\u4e86\u7f57\u9a6c\u7edf\u6cbb\u5e76\u5c06\u5176\u7eb3\u5165\u5e1d\u56fd\u7684\u957f\u671f\u65f6\u671f\u3002"}, {"title": "Great Fire of Rome", "title_zh": "\u7f57\u9a6c\u5927\u706b", "year": 64, "category": "disaster", "description": "A massive fire devastates Rome, leading to widespread destruction and accusations against Emperor Nero, who used the event to rebuild parts of the city.", "description_zh": "\u4e00\u573a\u5927\u706b\u6467\u6bc1\u4e86\u7f57\u9a6c\u7684\u5927\u90e8\u5206\u5730\u533a\uff0c\u5bfc\u81f4\u5e7f\u6cdb\u7684\u7834\u574f\uff0c\u5e76\u5f15\u53d1\u4e86\u5bf9\u5c3c\u7984\u7687\u5e1d\u7684\u6307\u63a7\uff0c\u4ed6\u5229\u7528\u8fd9\u573a\u706b\u707e\u91cd\u5efa\u4e86\u90e8\u5206\u57ce\u5e02\u3002"}, {"title": "Crisis of the Third Century Begins", "title_zh": "\u4e09\u4e16\u7eaa\u5371\u673a\u5f00\u59cb", "year": 235, "category": "economic_crisis", "description": "A period of intense political instability, civil war, plague, and economic depression that nearly led to the collapse of the Roman Empire.", "description_zh": "\u4e00\u6bb5\u653f\u6cbb\u52a8\u8361\u3001\u5185\u6218\u3001\u761f\u75ab\u548c\u7ecf\u6d4e\u8427\u6761\u7684\u65f6\u671f\uff0c\u51e0\u4e4e\u5bfc\u81f4\u7f57\u9a6c\u5e1d\u56fd\u5d29\u6e83\u3002"}, {"title": "Diocletian Divides the Roman Empire", "title_zh": "\u6234\u514b\u91cc\u5148\u5212\u5206\u7f57\u9a6c\u5e1d\u56fd", "year": 285, "category": "reform", "description": "Emperor Diocletian establishes the Tetrarchy, dividing the empire into Eastern and Western halves, each with its own emperor and Caesar, in an attempt to restore order.", "description_zh": "\u7687\u5e1d\u6234\u514b\u91cc\u5148\u5efa\u7acb\u56db\u5e1d\u5171\u6cbb\u5236\uff0c\u5c06\u5e1d\u56fd\u5206\u4e3a\u4e1c\u897f\u4e24\u90e8\u5206\uff0c\u6bcf\u90e8\u5206\u5404\u6709\u4e00\u4f4d\u7687\u5e1d\u548c\u4e00\u4f4d\u51ef\u6492\uff0c\u8bd5\u56fe\u6062\u590d\u79e9\u5e8f\u3002"}, {"title": "Fall of the Western Roman Empire", "title_zh": "\u897f\u7f57\u9a6c\u5e1d\u56fd\u706d\u4ea1", "year": 476, "category": "collapse", "description": "The deposition of the last Western Roman Emperor, Romulus Augustulus, by the Germanic chieftain Odoacer, traditionally marking the end of the Western Roman Empire.", "description_zh": "\u65e5\u8033\u66fc\u9996\u9886\u5965\u591a\u4e9a\u514b\u5e9f\u9edc\u4e86\u6700\u540e\u4e00\u4f4d\u897f\u7f57\u9a6c\u7687\u5e1d\u7f57\u6155\u8def\u65af\u00b7\u5965\u53e4\u65af\u90fd\uff0c\u4f20\u7edf\u4e0a\u6807\u5fd7\u7740\u897f\u7f57\u9a6c\u5e1d\u56fd\u7684\u7ec8\u7ed3\u3002"}], "timeline_b": [{"title": "Qin Unification of China", "title_zh": "\u79e6\u7edf\u4e00\u4e2d\u56fd", "year": -221, "category": "reform", "description": "The state of Qin conquers its rivals, ending the Warring States period and establishing the first unified Chinese empire under Emperor Qin Shi Huang. This marked the beginning of imperial China, with standardized laws, currency, weights, measures, and script.", "description_zh": "\u79e6\u56fd\u5f81\u670d\u5176\u5bf9\u624b\uff0c\u7ed3\u675f\u4e86\u6218\u56fd\u65f6\u671f\uff0c\u5e76\u5728\u79e6\u59cb\u7687\u7684\u7edf\u6cbb\u4e0b\u5efa\u7acb\u4e86\u7b2c\u4e00\u4e2a\u7edf\u4e00\u7684\u4e2d\u56fd\u5e1d\u56fd\u3002\u8fd9\u6807\u5fd7\u7740\u4e2d\u56fd\u5e1d\u5236\u7684\u5f00\u59cb\uff0c\u5b9e\u884c\u4e86\u7edf\u4e00\u7684\u6cd5\u5f8b\u3001\u8d27\u5e01\u3001\u5ea6\u91cf\u8861\u548c\u6587\u5b57\u3002"}, {"title": "Establishment of the Han Dynasty", "title_zh": "\u6c49\u671d\u5efa\u7acb", "year": -202, "category": "revolution", "description": "Liu Bang, posthumously known as Emperor Gaozu of Han, defeats Xiang Yu and establishes the Han Dynasty, ushering in a long period of stability and prosperity that would shape Chinese civilization.", "description_zh": "\u5218\u90a6\uff08\u540e\u4e16\u5c0a\u79f0\u4e3a\u6c49\u9ad8\u7956\uff09\u51fb\u8d25\u9879\u7fbd\uff0c\u5efa\u7acb\u4e86\u6c49\u671d\uff0c\u5f00\u542f\u4e86\u5851\u9020\u4e2d\u56fd\u6587\u660e\u7684\u957f\u671f\u7a33\u5b9a\u548c\u7e41\u8363\u65f6\u671f\u3002"}, {"title": "Reign of Emperor Wu of Han", "title_zh": "\u6c49\u6b66\u5e1d\u65f6\u671f", "year": -141, "category": "reform", "description": "Emperor Wu's long reign saw significant expansion of the Han empire through military campaigns, the establishment of Confucianism as the state ideology, and the promotion of trade along the Silk Road.", "description_zh": "\u6c49\u6b66\u5e1d\u7684\u957f\u671f\u7edf\u6cbb\u901a\u8fc7\u519b\u4e8b\u5f81\u4f10\uff0c\u786e\u7acb\u5112\u5bb6\u601d\u60f3\u4e3a\u56fd\u5bb6\u610f\u8bc6\u5f62\u6001\uff0c\u4ee5\u53ca\u63a8\u5e7f\u4e1d\u7ef8\u4e4b\u8def\u8d38\u6613\uff0c\u5b9e\u73b0\u4e86\u6c49\u5e1d\u56fd\u7684\u663e\u8457\u6269\u5f20\u3002"}, {"title": "Yellow Turban Rebellion", "title_zh": "\u9ec4\u5dfe\u8d77\u4e49", "year": 184, "category": "revolution", "description": "A massive peasant revolt against the Han Dynasty, inspired by Taoist beliefs, which severely weakened the central government and contributed to the eventual collapse of the Han.", "description_zh": "\u4e00\u573a\u53d7\u9053\u6559\u601d\u60f3\u542f\u53d1\u7684\u9488\u5bf9\u6c49\u671d\u7684\u5927\u89c4\u6a21\u519c\u6c11\u8d77\u4e49\uff0c\u4e25\u91cd\u524a\u5f31\u4e86\u4e2d\u592e\u653f\u5e9c\uff0c\u5e76\u5bfc\u81f4\u4e86\u6c49\u671d\u7684\u6700\u7ec8\u706d\u4ea1\u3002"}, {"title": "Fall of the Han Dynasty", "title_zh": "\u6c49\u671d\u706d\u4ea1", "year": 220, "category": "collapse", "description": "The Han Dynasty officially ends with the abdication of Emperor Xian, leading to the fragmentation of China into the Three Kingdoms period.", "description_zh": "\u6c49\u671d\u5728\u732e\u5e1d\u9000\u4f4d\u540e\u6b63\u5f0f\u706d\u4ea1\uff0c\u5bfc\u81f4\u4e2d\u56fd\u5206\u88c2\u4e3a\u4e09\u56fd\u65f6\u671f\u3002"}, {"title": "Three Kingdoms Period", "title_zh": "\u4e09\u56fd\u65f6\u671f", "year": 220, "category": "civil_war", "description": "A period of division and warfare following the fall of the Han Dynasty, characterized by the rival states of Wei, Shu, and Wu vying for control of China.", "description_zh": "\u6c49\u671d\u706d\u4ea1\u540e\u5206\u88c2\u548c\u6218\u4e89\u65f6\u671f\uff0c\u4ee5\u9b4f\u3001\u8700\u3001\u5434\u4e09\u4e2a\u4e89\u593a\u4e2d\u56fd\u63a7\u5236\u6743\u7684\u654c\u5bf9\u56fd\u5bb6\u4e3a\u7279\u5f81\u3002"}, {"title": "Jin Dynasty Unification", "title_zh": "\u664b\u671d\u7edf\u4e00", "year": 280, "category": "revolution", "description": "The Jin Dynasty, founded by the Sima family, conquers the state of Wu, temporarily reunifying China after the Three Kingdoms period.", "description_zh": "\u7531\u53f8\u9a6c\u5bb6\u65cf\u5efa\u7acb\u7684\u664b\u671d\u5f81\u670d\u4e86\u5434\u56fd\uff0c\u5728\u4e09\u56fd\u65f6\u671f\u540e\u6682\u65f6\u91cd\u65b0\u7edf\u4e00\u4e86\u4e2d\u56fd\u3002"}, {"title": "War of the Eight Princes", "title_zh": "\u516b\u738b\u4e4b\u4e71", "year": 291, "category": "civil_war", "description": "A series of civil wars fought between members of the imperial family of the Jin Dynasty, which severely weakened the dynasty and led to widespread instability and the eventual loss of northern China.", "description_zh": "\u664b\u671d\u7687\u65cf\u6210\u5458\u4e4b\u95f4\u53d1\u751f\u7684\u4e00\u7cfb\u5217\u5185\u6218\uff0c\u4e25\u91cd\u524a\u5f31\u4e86\u664b\u671d\uff0c\u5bfc\u81f4\u4e86\u5e7f\u6cdb\u7684\u4e0d\u7a33\u5b9a\u4ee5\u53ca\u6700\u7ec8\u5931\u53bb\u4e2d\u56fd\u5317\u65b9\u3002"}, {"title": "Beginning of the Northern and Southern Dynasties Period", "title_zh": "\u5357\u5317\u671d\u65f6\u671f\u5f00\u59cb", "year": 420, "category": "collapse", "description": "Following the collapse of the Jin Dynasty's control over the north, China splits into two distinct regions: the Northern Dynasties ruled by non-Han peoples and the Southern Dynasties ruled by Han Chinese.", "description_zh": "\u664b\u671d\u5bf9\u5317\u65b9\u7684\u63a7\u5236\u5d29\u6e83\u540e\uff0c\u4e2d\u56fd\u5206\u88c2\u4e3a\u4e24\u4e2a\u4e0d\u540c\u7684\u5730\u533a\uff1a\u7531\u975e\u6c49\u65cf\u7edf\u6cbb\u7684\u5317\u671d\u548c\u7531\u6c49\u65cf\u7edf\u6cbb\u7684\u5357\u671d\u3002"}, {"title": "Sui Dynasty Reunification", "title_zh": "\u968b\u671d\u7edf\u4e00", "year": 581, "category": "revolution", "description": "Yang Jian, Emperor Wen of Sui, conquers the Southern Dynasties and reunifies China, ending the centuries-long period of division.", "description_zh": "\u968b\u6587\u5e1d\u6768\u575a\u5f81\u670d\u5357\u671d\uff0c\u91cd\u65b0\u7edf\u4e00\u4e2d\u56fd\uff0c\u7ed3\u675f\u4e86\u957f\u8fbe\u51e0\u4e2a\u4e16\u7eaa\u7684\u5206\u88c2\u65f6\u671f\u3002"}, {"title": "Completion of the Grand Canal", "title_zh": "\u5927\u8fd0\u6cb3\u7ae3\u5de5", "year": 609, "category": "technology", "description": "The Sui Dynasty completes the Grand Canal, a massive engineering project connecting northern and southern China, facilitating trade and communication but also contributing to the dynasty's eventual downfall due to the immense labor and resources required.", "description_zh": "\u968b\u671d\u5b8c\u6210\u4e86\u5927\u8fd0\u6cb3\uff0c\u8fd9\u662f\u4e00\u9879\u8fde\u63a5\u4e2d\u56fd\u5357\u5317\u7684\u5b8f\u4f1f\u5de5\u7a0b\uff0c\u4fc3\u8fdb\u4e86\u8d38\u6613\u548c\u4ea4\u6d41\uff0c\u4f46\u4e5f\u56e0\u6240\u9700\u7684\u5927\u91cf\u52b3\u52a8\u529b\u548c\u8d44\u6e90\u800c\u5bfc\u81f4\u4e86\u738b\u671d\u7684\u6700\u7ec8\u57ae\u53f0\u3002"}, {"title": "Fall of the Sui Dynasty", "title_zh": "\u968b\u671d\u706d\u4ea1", "year": 618, "category": "collapse", "description": "Internal rebellions and overreach, including costly military campaigns and the construction of the Grand Canal, lead to the collapse of the Sui Dynasty and the establishment of the Tang Dynasty.", "description_zh": "\u5185\u90e8\u53db\u4e71\u548c\u8fc7\u5ea6\u6269\u5f20\uff0c\u5305\u62ec\u4ee3\u4ef7\u9ad8\u6602\u7684\u519b\u4e8b\u884c\u52a8\u548c\u5927\u8fd0\u6cb3\u7684\u5efa\u8bbe\uff0c\u5bfc\u81f4\u4e86\u968b\u671d\u7684\u706d\u4ea1\u548c\u5510\u671d\u7684\u5efa\u7acb\u3002"}], "aligned": [{"category": "reform", "a": {"title": "Founding of the Roman Republic", "title_zh": "\u7f57\u9a6c\u5171\u548c\u56fd\u6210\u7acb", "year": -509, "description": "The overthrow of the Roman monarchy and the establishment of a republic, marking a significant shift in Roman governance towards elected officials and a senate.", "description_zh": "\u7f57\u9a6c\u738b\u653f\u88ab\u63a8\u7ffb\uff0c\u5171\u548c\u56fd\u5efa\u7acb\uff0c\u6807\u5fd7\u7740\u7f57\u9a6c\u6cbb\u7406\u6a21\u5f0f\u5411\u6c11\u9009\u5b98\u5458\u548c\u5143\u8001\u9662\u7684\u91cd\u5927\u8f6c\u53d8\u3002"}, "b": {"title": "Qin Unification of China", "title_zh": "\u79e6\u7edf\u4e00\u4e2d\u56fd", "year": -221, "description": "The state of Qin conquers its rivals, ending the Warring States period and establishing the first unified Chinese empire under Emperor Qin Shi Huang. This marked the beginning of imperial China, with standardized laws, currency, weights, measures, and script.", "description_zh": "\u79e6\u56fd\u5f81\u670d\u5176\u5bf9\u624b\uff0c\u7ed3\u675f\u4e86\u6218\u56fd\u65f6\u671f\uff0c\u5e76\u5728\u79e6\u59cb\u7687\u7684\u7edf\u6cbb\u4e0b\u5efa\u7acb\u4e86\u7b2c\u4e00\u4e2a\u7edf\u4e00\u7684\u4e2d\u56fd\u5e1d\u56fd\u3002\u8fd9\u6807\u5fd7\u7740\u4e2d\u56fd\u5e1d\u5236\u7684\u5f00\u59cb\uff0c\u5b9e\u884c\u4e86\u7edf\u4e00\u7684\u6cd5\u5f8b\u3001\u8d27\u5e01\u3001\u5ea6\u91cf\u8861\u548c\u6587\u5b57\u3002"}}, {"category": "reform", "a": {"title": "Tiberius Gracchus's Land Reforms", "title_zh": "\u63d0\u6bd4\u7565\u00b7\u683c\u62c9\u53e4\u7684\u571f\u5730\u6539\u9769", "year": -133, "description": "Tiberius Gracchus attempts to redistribute public land to landless citizens, sparking intense political conflict and violence that foreshadows the Republic's instability.", "description_zh": "\u63d0\u6bd4\u7565\u00b7\u683c\u62c9\u53e4\u8bd5\u56fe\u5c06\u516c\u6709\u571f\u5730\u91cd\u65b0\u5206\u914d\u7ed9\u65e0\u5730\u516c\u6c11\uff0c\u5f15\u53d1\u4e86\u6fc0\u70c8\u7684\u653f\u6cbb\u51b2\u7a81\u548c\u66b4\u529b\uff0c\u9884\u793a\u7740\u5171\u548c\u56fd\u7684\u4e0d\u7a33\u5b9a\u3002"}, "b": {"title": "Reign of Emperor Wu of Han", "title_zh": "\u6c49\u6b66\u5e1d\u65f6\u671f", "year": -141, "description": "Emperor Wu's long reign saw significant expansion of the Han empire through military campaigns, the establishment of Confucianism as the state ideology, and the promotion of trade along the Silk Road.", "description_zh": "\u6c49\u6b66\u5e1d\u7684\u957f\u671f\u7edf\u6cbb\u901a\u8fc7\u519b\u4e8b\u5f81\u4f10\uff0c\u786e\u7acb\u5112\u5bb6\u601d\u60f3\u4e3a\u56fd\u5bb6\u610f\u8bc6\u5f62\u6001\uff0c\u4ee5\u53ca\u63a8\u5e7f\u4e1d\u7ef8\u4e4b\u8def\u8d38\u6613\uff0c\u5b9e\u73b0\u4e86\u6c49\u5e1d\u56fd\u7684\u663e\u8457\u6269\u5f20\u3002"}}, {"category": "civil_war", "a": {"title": "Sulla's Civil War and Dictatorship", "title_zh": "\u82cf\u62c9\u5185\u6218\u4e0e\u72ec\u88c1", "year": -82, "description": "Lucius Cornelius Sulla marches on Rome, wins a civil war, and becomes dictator, enacting proscriptions and constitutional reforms that further destabilize the Republic.", "description_zh": "\u5362\u57fa\u4e4c\u65af\u00b7\u79d1\u5c14\u5185\u5229\u4e4c\u65af\u00b7\u82cf\u62c9\u8fdb\u519b\u7f57\u9a6c\uff0c\u8d62\u5f97\u5185\u6218\u5e76\u6210\u4e3a\u72ec\u88c1\u5b98\uff0c\u9881\u5e03\u4e86\u8fdb\u4e00\u6b65\u7834\u574f\u5171\u548c\u56fd\u7a33\u5b9a\u7684\u7981\u4ee4\u548c\u5baa\u6cd5\u6539\u9769\u3002"}, "b": {"title": "Three Kingdoms Period", "title_zh": "\u4e09\u56fd\u65f6\u671f", "year": 220, "description": "A period of division and warfare following the fall of the Han Dynasty, characterized by the rival states of Wei, Shu, and Wu vying for control of China.", "description_zh": "\u6c49\u671d\u706d\u4ea1\u540e\u5206\u88c2\u548c\u6218\u4e89\u65f6\u671f\uff0c\u4ee5\u9b4f\u3001\u8700\u3001\u5434\u4e09\u4e2a\u4e89\u593a\u4e2d\u56fd\u63a7\u5236\u6743\u7684\u654c\u5bf9\u56fd\u5bb6\u4e3a\u7279\u5f81\u3002"}}, {"category": "civil_war", "a": {"title": "Caesar Crosses the Rubicon", "title_zh": "\u51ef\u6492\u6e21\u8fc7\u5362\u6bd4\u5b54\u6cb3", "year": -49, "description": "Julius Caesar leads his army across the Rubicon River into Italy, defying the Senate and initiating a civil war against Pompey.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u7387\u519b\u6e21\u8fc7\u5362\u6bd4\u5b54\u6cb3\u8fdb\u5165\u610f\u5927\u5229\uff0c\u8fdd\u6297\u5143\u8001\u9662\uff0c\u5e76\u5f15\u53d1\u4e86\u4e0e\u5e9e\u57f9\u7684\u5185\u6218\u3002"}, "b": {"title": "War of the Eight Princes", "title_zh": "\u516b\u738b\u4e4b\u4e71", "year": 291, "description": "A series of civil wars fought between members of the imperial family of the Jin Dynasty, which severely weakened the dynasty and led to widespread instability and the eventual loss of northern China.", "description_zh": "\u664b\u671d\u7687\u65cf\u6210\u5458\u4e4b\u95f4\u53d1\u751f\u7684\u4e00\u7cfb\u5217\u5185\u6218\uff0c\u4e25\u91cd\u524a\u5f31\u4e86\u664b\u671d\uff0c\u5bfc\u81f4\u4e86\u5e7f\u6cdb\u7684\u4e0d\u7a33\u5b9a\u4ee5\u53ca\u6700\u7ec8\u5931\u53bb\u4e2d\u56fd\u5317\u65b9\u3002"}}, {"category": "revolution", "a": {"title": "Assassination of Julius Caesar", "title_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u9047\u523a", "year": -44, "description": "Julius Caesar is assassinated by a group of senators on the Ides of March, plunging Rome back into civil war.", "description_zh": "\u5c24\u5229\u4e4c\u65af\u00b7\u51ef\u6492\u5728\u4e09\u6708\u5341\u4e94\u65e5\u88ab\u4e00\u7fa4\u53c2\u8bae\u5458\u523a\u6740\uff0c\u4f7f\u7f57\u9a6c\u518d\u6b21\u9677\u5165\u5185\u6218\u3002"}, "b": {"title": "Sui Dynasty Reunification", "title_zh": "\u968b\u671d\u7edf\u4e00", "year": 581, "description": "Yang Jian, Emperor Wen of Sui, conquers the Southern Dynasties and reunifies China, ending the centuries-long period of division.", "description_zh": "\u968b\u6587\u5e1d\u6768\u575a\u5f81\u670d\u5357\u671d\uff0c\u91cd\u65b0\u7edf\u4e00\u4e2d\u56fd\uff0c\u7ed3\u675f\u4e86\u957f\u8fbe\u51e0\u4e2a\u4e16\u7eaa\u7684\u5206\u88c2\u65f6\u671f\u3002"}}, {"category": "collapse", "a": {"title": "Fall of the Western Roman Empire", "title_zh": "\u897f\u7f57\u9a6c\u5e1d\u56fd\u706d\u4ea1", "year": 476, "description": "The deposition of the last Western Roman Emperor, Romulus Augustulus, by the Germanic chieftain Odoacer, traditionally marking the end of the Western Roman Empire.", "description_zh": "\u65e5\u8033\u66fc\u9996\u9886\u5965\u591a\u4e9a\u514b\u5e9f\u9edc\u4e86\u6700\u540e\u4e00\u4f4d\u897f\u7f57\u9a6c\u7687\u5e1d\u7f57\u6155\u8def\u65af\u00b7\u5965\u53e4\u65af\u90fd\uff0c\u4f20\u7edf\u4e0a\u6807\u5fd7\u7740\u897f\u7f57\u9a6c\u5e1d\u56fd\u7684\u7ec8\u7ed3\u3002"}, "b": {"title": "Fall of the Sui Dynasty", "title_zh": "\u968b\u671d\u706d\u4ea1", "year": 618, "description": "Internal rebellions and overreach, including costly military campaigns and the construction of the Grand Canal, lead to the collapse of the Sui Dynasty and the establishment of the Tang Dynasty.", "description_zh": "\u5185\u90e8\u53db\u4e71\u548c\u8fc7\u5ea6\u6269\u5f20\uff0c\u5305\u62ec\u4ee3\u4ef7\u9ad8\u6602\u7684\u519b\u4e8b\u884c\u52a8\u548c\u5927\u8fd0\u6cb3\u7684\u5efa\u8bbe\uff0c\u5bfc\u81f4\u4e86\u968b\u671d\u7684\u706d\u4ea1\u548c\u5510\u671d\u7684\u5efa\u7acb\u3002"}}], "prediction": null}, {"label_a": "British Empire", "label_b": "Spanish Empire", "similarity": 0.348, "lcs_length": 8, "timeline_a": [{"title": "Formation of the Anglo-Saxon Heptarchy", "title_zh": "\u76ce\u683c\u9c81-\u6492\u514b\u900a\u4e03\u56fd\u65f6\u4ee3\u5f62\u6210", "year": 600, "category": "diplomacy", "description": "The gradual consolidation of various Anglo-Saxon kingdoms in England, leading to the establishment of the Heptarchy (Wessex, Sussex, Essex, Kent, East Anglia, Mercia, Northumbria).", "description_zh": "\u82f1\u683c\u5170\u5404\u76ce\u683c\u9c81-\u6492\u514b\u900a\u738b\u56fd\u9010\u6e10\u5de9\u56fa\uff0c\u5f62\u6210\u4e86\u4e03\u56fd\u65f6\u4ee3\uff08\u5a01\u585e\u514b\u65af\u3001\u82cf\u585e\u514b\u65af\u3001\u57c3\u585e\u514b\u65af\u3001\u80af\u7279\u3001\u4e1c\u76ce\u683c\u5229\u4e9a\u3001\u9ea6\u897f\u4e9a\u3001\u8bfa\u68ee\u5e03\u91cc\u4e9a\uff09\u3002"}, {"title": "Establishment of the Danelaw", "title_zh": "\u4e39\u9ea6\u6cd5\u786e\u7acb", "year": 878, "category": "diplomacy", "description": "Following the Great Heathen Army's campaigns, a treaty between Alfred the Great of Wessex and the Viking leader Guthrum established a region in England under Danish law and control.", "description_zh": "\u5728\u4f1f\u5927\u7684\u5f02\u6559\u519b\u961f\u5f81\u6218\u4e4b\u540e\uff0c\u5a01\u585e\u514b\u65af\u7684\u963f\u5c14\u5f17\u96f7\u5fb7\u5927\u5e1d\u4e0e\u7ef4\u4eac\u9886\u8896\u53e4\u65af\u4f26\u7b7e\u8ba2\u6761\u7ea6\uff0c\u5728\u82f1\u683c\u5170\u5efa\u7acb\u4e86\u4e00\u4e2a\u53d7\u4e39\u9ea6\u6cd5\u5f8b\u548c\u63a7\u5236\u7684\u5730\u533a\u3002"}, {"title": "Norman Conquest of England", "title_zh": "\u8bfa\u66fc\u5f81\u670d\u82f1\u683c\u5170", "year": 1066, "category": "war", "description": "William the Conqueror, Duke of Normandy, defeated the English forces at the Battle of Hastings, leading to Norman rule and profound changes in English society, language, and governance.", "description_zh": "\u8bfa\u66fc\u5e95\u516c\u7235\u5a01\u5ec9\u5f81\u670d\u8005\u5728\u9ed1\u65af\u5ef7\u65af\u6218\u5f79\u4e2d\u51fb\u8d25\u82f1\u683c\u5170\u519b\u961f\uff0c\u5bfc\u81f4\u8bfa\u66fc\u4eba\u7edf\u6cbb\uff0c\u5e76\u5bf9\u82f1\u683c\u5170\u7684\u793e\u4f1a\u3001\u8bed\u8a00\u548c\u6cbb\u7406\u4ea7\u751f\u4e86\u6df1\u8fdc\u5f71\u54cd\u3002"}, {"title": "Signing of Magna Carta", "title_zh": "\u300a\u5927\u5baa\u7ae0\u300b\u7b7e\u7f72", "year": 1215, "category": "reform", "description": "King John was compelled by his barons to sign the Magna Carta, a charter of rights that limited the power of the monarch and established principles of due process.", "description_zh": "\u7ea6\u7ff0\u56fd\u738b\u88ab\u8feb\u63a5\u53d7\u7537\u7235\u4eec\u7684\u80c1\u8feb\uff0c\u7b7e\u7f72\u4e86\u300a\u5927\u5baa\u7ae0\u300b\uff0c\u8fd9\u662f\u4e00\u4efd\u9650\u5236\u541b\u4e3b\u6743\u529b\u548c\u786e\u7acb\u6b63\u5f53\u7a0b\u5e8f\u539f\u5219\u7684\u6743\u5229\u6cd5\u6848\u3002"}, {"title": "End of the Hundred Years' War", "title_zh": "\u767e\u5e74\u6218\u4e89\u7ed3\u675f", "year": 1453, "category": "war", "description": "The conclusion of the protracted conflict between England and France, with England losing all its continental possessions except Calais.", "description_zh": "\u82f1\u683c\u5170\u4e0e\u6cd5\u56fd\u4e4b\u95f4\u65f7\u65e5\u6301\u4e45\u7684\u51b2\u7a81\u7ed3\u675f\uff0c\u82f1\u683c\u5170\u5931\u53bb\u4e86\u52a0\u83b1\u4ee5\u5916\u7684\u6240\u6709\u6b27\u6d32\u5927\u9646\u9886\u571f\u3002"}, {"title": "End of the Wars of the Roses", "title_zh": "\u73ab\u7470\u6218\u4e89\u7ed3\u675f", "year": 1485, "category": "civil_war", "description": "The Battle of Bosworth Field marked the end of the dynastic civil wars between the Houses of Lancaster and York, leading to the establishment of the Tudor dynasty.", "description_zh": "\u535a\u65af\u6c83\u601d\u539f\u91ce\u6218\u5f79\u6807\u5fd7\u7740\u5170\u5f00\u65af\u7279\u5bb6\u65cf\u548c\u7ea6\u514b\u5bb6\u65cf\u4e4b\u95f4\u738b\u671d\u5185\u6218\u7684\u7ed3\u675f\uff0c\u5e76\u5bfc\u81f4\u4e86\u90fd\u94ce\u738b\u671d\u7684\u5efa\u7acb\u3002"}, {"title": "English Reformation Begins", "title_zh": "\u82f1\u683c\u5170\u5b97\u6559\u6539\u9769\u5f00\u59cb", "year": 1534, "category": "reform", "description": "The Act of Supremacy declared King Henry VIII the Supreme Head of the Church of England, initiating a break from papal authority and the Roman Catholic Church.", "description_zh": "\u300a\u81f3\u5c0a\u6cd5\u6848\u300b\u5ba3\u5e03\u4ea8\u5229\u516b\u4e16\u56fd\u738b\u4e3a\u82f1\u683c\u5170\u6559\u4f1a\u7684\u6700\u9ad8\u9996\u8111\uff0c\u6807\u5fd7\u7740\u4e0e\u6559\u7687\u6743\u5a01\u548c\u7f57\u9a6c\u5929\u4e3b\u6559\u4f1a\u7684\u51b3\u88c2\u3002"}, {"title": "Defeat of the Spanish Armada", "title_zh": "\u897f\u73ed\u7259\u65e0\u654c\u8230\u961f\u6e83\u8d25", "year": 1588, "category": "war", "description": "The English navy, aided by storms, repelled the invasion fleet sent by King Philip II of Spain, a significant victory for England and Protestantism.", "description_zh": "\u82f1\u683c\u5170\u6d77\u519b\u5728\u98ce\u66b4\u7684\u5e2e\u52a9\u4e0b\uff0c\u51fb\u9000\u4e86\u897f\u73ed\u7259\u56fd\u738b\u8153\u529b\u4e8c\u4e16\u6d3e\u51fa\u7684\u5165\u4fb5\u8230\u961f\uff0c\u8fd9\u662f\u82f1\u683c\u5170\u548c\u65b0\u6559\u7684\u4e00\u6b21\u91cd\u5927\u80dc\u5229\u3002"}, {"title": "English Civil War", "title_zh": "\u82f1\u56fd\u5185\u6218", "year": 1642, "category": "civil_war", "description": "A series of conflicts fought between Parliamentarians ('Roundheads') and Royalists ('Cavaliers') over the manner of England's governance, leading to the execution of King Charles I.", "description_zh": "\u8bae\u4f1a\u6d3e\uff08\u5706\u9885\u515a\uff09\u4e0e\u738b\u515a\uff08\u9a91\u58eb\u515a\uff09\u4e4b\u95f4\u56f4\u7ed5\u82f1\u683c\u5170\u6cbb\u7406\u65b9\u5f0f\u5c55\u5f00\u7684\u4e00\u7cfb\u5217\u51b2\u7a81\uff0c\u6700\u7ec8\u5bfc\u81f4\u67e5\u7406\u4e00\u4e16\u56fd\u738b\u88ab\u5904\u51b3\u3002"}, {"title": "The Glorious Revolution", "title_zh": "\u5149\u8363\u9769\u547d", "year": 1688, "category": "revolution", "description": "The overthrow of King James II by a union of English Parliamentarians with the Dutch stadtholder William of Orange. It led to a constitutional monarchy and the Bill of Rights.", "description_zh": "\u82f1\u683c\u5170\u8bae\u4f1a\u6d3e\u4e0e\u8377\u5170\u6267\u653f\u5a01\u5ec9\u4e09\u4e16\u8054\u5408\u63a8\u7ffb\u4e86\u8a79\u59c6\u65af\u4e8c\u4e16\u56fd\u738b\u7684\u7edf\u6cbb\u3002\u8fd9\u5bfc\u81f4\u4e86\u541b\u4e3b\u7acb\u5baa\u5236\u548c\u300a\u6743\u5229\u6cd5\u6848\u300b\u7684\u8bde\u751f\u3002"}, {"title": "Acts of Union 1707", "title_zh": "1707\u5e74\u8054\u5408\u6cd5\u4ee4", "year": 1707, "category": "diplomacy", "description": "The Acts of Union were passed by the parliaments of England and Scotland, uniting the Kingdom of England and the Kingdom of Scotland into a single Kingdom of Great Britain.", "description_zh": "\u82f1\u683c\u5170\u548c\u82cf\u683c\u5170\u8bae\u4f1a\u901a\u8fc7\u4e86\u300a\u8054\u5408\u6cd5\u4ee4\u300b\uff0c\u5c06\u82f1\u683c\u5170\u738b\u56fd\u548c\u82cf\u683c\u5170\u738b\u56fd\u5408\u5e76\u4e3a\u4e00\u4e2a\u5927\u4e0d\u5217\u98a0\u738b\u56fd\u3002"}, {"title": "Beginning of the Industrial Revolution", "title_zh": "\u5de5\u4e1a\u9769\u547d\u5f00\u59cb", "year": 1760, "category": "technology", "description": "A period of major technological, socioeconomic, and cultural change, originating in Great Britain, characterized by the transition to new manufacturing processes and the rise of the factory system.", "description_zh": "\u4e00\u573a\u91cd\u5927\u7684\u6280\u672f\u3001\u793e\u4f1a\u7ecf\u6d4e\u548c\u6587\u5316\u53d8\u9769\u65f6\u671f\uff0c\u8d77\u6e90\u4e8e\u82f1\u56fd\uff0c\u5176\u7279\u70b9\u662f\u5411\u65b0\u7684\u5236\u9020\u5de5\u827a\u8fc7\u6e21\u548c\u5de5\u5382\u5236\u5ea6\u7684\u5174\u8d77\u3002"}, {"title": "End of the Napoleonic Wars (British Perspective)", "title_zh": "\u62ff\u7834\u4ed1\u6218\u4e89\u7ed3\u675f\uff08\u82f1\u56fd\u89c6\u89d2\uff09", "year": 1815, "category": "war", "description": "Following the defeat of Napoleon at Waterloo, Britain emerged as the dominant global power, ushering in a period of Pax Britannica.", "description_zh": "\u5728\u6ed1\u94c1\u5362\u6218\u5f79\u4e2d\u62ff\u7834\u4ed1\u6218\u8d25\u540e\uff0c\u82f1\u56fd\u5d1b\u8d77\u6210\u4e3a\u4e3b\u5bfc\u6027\u5168\u7403\u529b\u91cf\uff0c\u5f00\u542f\u4e86\u4e0d\u5217\u98a0\u6cbb\u4e0b\u7684\u548c\u5e73\u65f6\u671f\u3002"}, {"title": "Great Reform Act 1832", "title_zh": "1832\u5e74\u6539\u9769\u6cd5\u6848", "year": 1832, "category": "reform", "description": "A significant piece of legislation that redistributed parliamentary seats to give better representation to industrial towns and expanded the franchise.", "description_zh": "\u4e00\u9879\u91cd\u8981\u7684\u7acb\u6cd5\uff0c\u91cd\u65b0\u5206\u914d\u4e86\u8bae\u4f1a\u5e2d\u4f4d\uff0c\u4e3a\u5de5\u4e1a\u57ce\u9547\u63d0\u4f9b\u4e86\u66f4\u597d\u7684\u4ee3\u8868\u6027\uff0c\u5e76\u6269\u5927\u4e86\u9009\u4e3e\u6743\u3002"}, {"title": "Great Exhibition of the Works of Industry of All Nations", "title_zh": "\u4e07\u56fd\u5de5\u4e1a\u535a\u89c8\u4f1a", "year": 1851, "category": "cultural_peak", "description": "Held in the Crystal Palace in London, this exhibition showcased Britain's industrial and technological prowess during the height of the Victorian era.", "description_zh": "\u5728\u4f26\u6566\u6c34\u6676\u5bab\u4e3e\u884c\u7684\u8fd9\u6b21\u5c55\u89c8\u5c55\u793a\u4e86\u7ef4\u591a\u5229\u4e9a\u65f6\u4ee3\u9f0e\u76db\u65f6\u671f\u82f1\u56fd\u7684\u5de5\u4e1a\u548c\u6280\u672f\u5b9e\u529b\u3002"}, {"title": "Britain Enters World War I", "title_zh": "\u82f1\u56fd\u5377\u5165\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218", "year": 1914, "category": "war", "description": "Britain declared war on Germany following the invasion of neutral Belgium, marking the beginning of its involvement in the global conflict.", "description_zh": "\u5728\u5fb7\u56fd\u5165\u4fb5\u4e2d\u7acb\u56fd\u6bd4\u5229\u65f6\u540e\uff0c\u82f1\u56fd\u5411\u5fb7\u56fd\u5ba3\u6218\uff0c\u6807\u5fd7\u7740\u5176\u5377\u5165\u8fd9\u573a\u5168\u7403\u51b2\u7a81\u7684\u5f00\u59cb\u3002"}, {"title": "Battle of Britain", "title_zh": "\u4e0d\u5217\u98a0\u4e4b\u6218", "year": 1940, "category": "war", "description": "A crucial air campaign fought between the Royal Air Force (RAF) and the German Luftwaffe during World War II. Britain's victory prevented a German invasion.", "description_zh": "\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u671f\u95f4\uff0c\u82f1\u56fd\u7687\u5bb6\u7a7a\u519b\uff08RAF\uff09\u4e0e\u5fb7\u56fd\u7a7a\u519b\uff08Luftwaffe\uff09\u4e4b\u95f4\u7684\u4e00\u573a\u5173\u952e\u7a7a\u6218\u3002\u82f1\u56fd\u7684\u80dc\u5229\u963b\u6b62\u4e86\u5fb7\u56fd\u7684\u5165\u4fb5\u3002"}, {"title": "End of World War II in Europe (VE Day)", "title_zh": "\u6b27\u6d32\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u7ed3\u675f\uff08\u6b27\u6d32\u80dc\u5229\u65e5\uff09", "year": 1945, "category": "war", "description": "The unconditional surrender of Nazi Germany marked the end of the war in Europe, with Britain playing a pivotal role in the Allied victory.", "description_zh": "\u7eb3\u7cb9\u5fb7\u56fd\u7684\u65e0\u6761\u4ef6\u6295\u964d\u6807\u5fd7\u7740\u6b27\u6d32\u6218\u4e89\u7684\u7ed3\u675f\uff0c\u82f1\u56fd\u5728\u76df\u519b\u80dc\u5229\u4e2d\u53d1\u6325\u4e86\u5173\u952e\u4f5c\u7528\u3002"}, {"title": "Creation of the National Health Service (NHS)", "title_zh": "\u56fd\u6c11\u533b\u7597\u670d\u52a1\u4f53\u7cfb\uff08NHS\uff09\u7684\u521b\u5efa", "year": 1948, "category": "reform", "description": "Established as part of the welfare state following World War II, the NHS provided comprehensive healthcare free at the point of use.", "description_zh": "\u4f5c\u4e3a\u4e8c\u6218\u540e\u798f\u5229\u56fd\u5bb6\u7684\u4e00\u90e8\u5206\u800c\u5efa\u7acb\uff0cNHS \u63d0\u4f9b\u514d\u8d39\u7684\u7efc\u5408\u533b\u7597\u4fdd\u5065\u670d\u52a1\u3002"}, {"title": "Suez Crisis", "title_zh": "\u82cf\u4f0a\u58eb\u8fd0\u6cb3\u5371\u673a", "year": 1956, "category": "war", "description": "A military conflict in the Suez Canal zone resulting from an invasion by Israel, followed by the United Kingdom and France. It marked a significant decline in British and French influence.", "description_zh": "\u4ee5\u8272\u5217\u5165\u4fb5\u82cf\u4f0a\u58eb\u8fd0\u6cb3\u533a\u540e\uff0c\u82f1\u56fd\u548c\u6cd5\u56fd\u4e5f\u968f\u4e4b\u5165\u4fb5\uff0c\u5f15\u53d1\u4e86\u519b\u4e8b\u51b2\u7a81\u3002\u8fd9\u6807\u5fd7\u7740\u82f1\u6cd5\u4e24\u56fd\u5f71\u54cd\u529b\u7684\u5927\u5e45\u4e0b\u964d\u3002"}, {"title": "United Kingdom Joins the European Economic Community", "title_zh": "\u82f1\u56fd\u52a0\u5165\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53", "year": 1973, "category": "diplomacy", "description": "After years of negotiation, the UK became a member of the EEC, marking a significant shift in its foreign policy and economic orientation.", "description_zh": "\u7ecf\u8fc7\u591a\u5e74\u7684\u8c08\u5224\uff0c\u82f1\u56fd\u6210\u4e3a\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53\u6210\u5458\u56fd\uff0c\u6807\u5fd7\u7740\u5176\u5916\u4ea4\u653f\u7b56\u548c\u7ecf\u6d4e\u65b9\u5411\u7684\u91cd\u5927\u8f6c\u53d8\u3002"}, {"title": "Falklands War", "title_zh": "\u798f\u514b\u5170\u6218\u4e89", "year": 1982, "category": "war", "description": "A conflict between Argentina and the United Kingdom over the Falkland Islands. Britain's decisive victory reinforced its international standing.", "description_zh": "\u963f\u6839\u5ef7\u4e0e\u82f1\u56fd\u4e4b\u95f4\u56f4\u7ed5\u798f\u514b\u5170\u7fa4\u5c9b\u53d1\u751f\u7684\u51b2\u7a81\u3002\u82f1\u56fd\u7684\u51b3\u5b9a\u6027\u80dc\u5229\u5de9\u56fa\u4e86\u5176\u56fd\u9645\u5730\u4f4d\u3002"}, {"title": "Brexit Referendum", "title_zh": "\u8131\u6b27\u516c\u6295", "year": 2016, "category": "diplomacy", "description": "A referendum was held on the United Kingdom's membership of the European Union, resulting in a vote to leave the EU.", "description_zh": "\u5c31\u82f1\u56fd\u662f\u5426\u7ee7\u7eed\u7559\u5728\u6b27\u6d32\u8054\u76df\u4e3e\u884c\u4e86\u5168\u6c11\u516c\u6295\uff0c\u7ed3\u679c\u6295\u7968\u51b3\u5b9a\u79bb\u5f00\u6b27\u76df\u3002"}], "timeline_b": [{"title": "Umayyad Conquest of Hispania", "title_zh": "\u502d\u9a6c\u4e9a\u5f81\u670d\u4f0a\u6bd4\u5229\u4e9a", "year": 711, "category": "conquest", "description": "The Umayyad Caliphate launched a successful invasion of the Visigothic Kingdom, leading to the establishment of Al-Andalus.", "description_zh": "\u502d\u9a6c\u4e9a\u54c8\u91cc\u53d1\u56fd\u6210\u529f\u5165\u4fb5\u897f\u54e5\u7279\u738b\u56fd\uff0c\u5bfc\u81f4\u5b89\u8fbe\u5362\u65af\u5efa\u7acb\u3002"}, {"title": "Battle of Covadonga", "title_zh": "\u79d1\u74e6\u4e1c\u52a0\u6218\u5f79", "year": 722, "category": "war", "description": "A pivotal battle in which Asturian forces led by Pelagius defeated an Umayyad army, marking the beginning of the Reconquista.", "description_zh": "\u963f\u65af\u56fe\u91cc\u4e9a\u65af\u519b\u961f\u5728\u4f69\u62c9\u7ea6\u7684\u9886\u5bfc\u4e0b\u51fb\u8d25\u502d\u9a6c\u4e9a\u519b\u961f\u7684\u4e00\u573a\u5173\u952e\u6218\u5f79\uff0c\u6807\u5fd7\u7740\u6536\u590d\u5931\u5730\u8fd0\u52a8\u7684\u5f00\u59cb\u3002"}, {"title": "Establishment of the Emirate of C\u00f3rdoba", "title_zh": "\u79d1\u5c14\u591a\u74e6\u914b\u957f\u56fd\u5efa\u7acb", "year": 756, "category": "independence", "description": "Abd al-Rahman I declared an independent emirate in C\u00f3rdoba, breaking away from the Abbasid Caliphate.", "description_zh": "\u963f\u535c\u675c\u52d2\u00b7\u62c9\u8d6b\u66fc\u4e00\u4e16\u5728\u79d1\u5c14\u591a\u74e6\u5ba3\u5e03\u5efa\u7acb\u4e00\u4e2a\u72ec\u7acb\u7684\u914b\u957f\u56fd\uff0c\u8131\u79bb\u963f\u62d4\u65af\u54c8\u91cc\u53d1\u56fd\u3002"}, {"title": "Establishment of the Caliphate of C\u00f3rdoba", "title_zh": "\u79d1\u5c14\u591a\u74e6\u54c8\u91cc\u53d1\u56fd\u5efa\u7acb", "year": 929, "category": "independence", "description": "Abd al-Rahman III proclaimed himself Caliph, elevating Al-Andalus to a caliphate and marking its cultural and political zenith.", "description_zh": "\u963f\u535c\u675c\u52d2\u00b7\u62c9\u8d6b\u66fc\u4e09\u4e16\u5ba3\u5e03\u81ea\u5df1\u4e3a\u54c8\u91cc\u53d1\uff0c\u5c06\u5b89\u8fbe\u5362\u65af\u63d0\u5347\u4e3a\u54c8\u91cc\u53d1\u56fd\uff0c\u6807\u5fd7\u7740\u5176\u6587\u5316\u548c\u653f\u6cbb\u7684\u9876\u5cf0\u3002"}, {"title": "Fall of Granada", "title_zh": "\u683c\u62c9\u7eb3\u8fbe\u9677\u843d", "year": 1492, "category": "conquest", "description": "The Catholic Monarchs conquered Granada, the last Muslim stronghold in Iberia, effectively ending the Reconquista and unifying Spain.", "description_zh": "\u5929\u4e3b\u6559\u541b\u4e3b\u5f81\u670d\u4e86\u683c\u62c9\u7eb3\u8fbe\uff0c\u8fd9\u662f\u4f0a\u6bd4\u5229\u4e9a\u6700\u540e\u4e00\u4e2a\u7a46\u65af\u6797\u636e\u70b9\uff0c\u6807\u5fd7\u7740\u6536\u590d\u5931\u5730\u8fd0\u52a8\u7684\u7ed3\u675f\u548c\u897f\u73ed\u7259\u7684\u7edf\u4e00\u3002"}, {"title": "Columbus's First Voyage to the Americas", "title_zh": "\u54e5\u4f26\u5e03\u9996\u6b21\u7f8e\u6d32\u822a\u884c", "year": 1492, "category": "discovery", "description": "Sponsored by the Catholic Monarchs, Christopher Columbus reached the Americas, initiating the Columbian Exchange and Spanish colonization.", "description_zh": "\u5728\u5929\u4e3b\u6559\u541b\u4e3b\u7684\u652f\u6301\u4e0b\uff0c\u514b\u91cc\u65af\u6258\u5f17\u00b7\u54e5\u4f26\u5e03\u62b5\u8fbe\u7f8e\u6d32\uff0c\u5f00\u542f\u4e86\u54e5\u4f26\u5e03\u5927\u4ea4\u6362\u548c\u897f\u73ed\u7259\u6b96\u6c11\u3002"}, {"title": "Defeat of the Spanish Armada", "title_zh": "\u897f\u73ed\u7259\u65e0\u654c\u8230\u961f\u6e83\u8d25", "year": 1588, "category": "war", "description": "The English navy defeated the Spanish Armada, a major turning point in the Anglo-Spanish War and a blow to Spanish naval supremacy.", "description_zh": "\u82f1\u56fd\u6d77\u519b\u51fb\u8d25\u4e86\u897f\u73ed\u7259\u65e0\u654c\u8230\u961f\uff0c\u8fd9\u662f\u82f1\u897f\u6218\u4e89\u7684\u4e00\u4e2a\u91cd\u8981\u8f6c\u6298\u70b9\uff0c\u4e5f\u662f\u5bf9\u897f\u73ed\u7259\u6d77\u519b\u9738\u6743\u7684\u6253\u51fb\u3002"}, {"title": "War of the Spanish Succession", "title_zh": "\u897f\u73ed\u7259\u738b\u4f4d\u7ee7\u627f\u6218\u4e89", "year": 1701, "category": "war", "description": "A major European conflict triggered by the succession to the Spanish throne after the death of Charles II, resulting in the Bourbon dynasty taking power.", "description_zh": "\u67e5\u7406\u4e8c\u4e16\u53bb\u4e16\u540e\uff0c\u7531\u897f\u73ed\u7259\u738b\u4f4d\u7ee7\u627f\u95ee\u9898\u5f15\u53d1\u7684\u4e00\u573a\u6b27\u6d32\u4e3b\u8981\u51b2\u7a81\uff0c\u6700\u7ec8\u5bfc\u81f4\u6ce2\u65c1\u738b\u671d\u638c\u6743\u3002"}, {"title": "Peninsular War", "title_zh": "\u534a\u5c9b\u6218\u4e89", "year": 1808, "category": "war", "description": "A conflict fought on the Iberian Peninsula during the Napoleonic Wars, where Spanish and Portuguese forces, aided by the British, fought against the French.", "description_zh": "\u62ff\u7834\u4ed1\u6218\u4e89\u671f\u95f4\u5728\u4f0a\u6bd4\u5229\u4e9a\u534a\u5c9b\u8fdb\u884c\u7684\u4e00\u573a\u51b2\u7a81\uff0c\u897f\u73ed\u7259\u548c\u8461\u8404\u7259\u519b\u961f\u5728\u82f1\u56fd\u7684\u63f4\u52a9\u4e0b\u5bf9\u6297\u6cd5\u56fd\u3002"}, {"title": "First Spanish Republic", "title_zh": "\u897f\u73ed\u7259\u7b2c\u4e00\u5171\u548c\u56fd", "year": 1873, "category": "revolution", "description": "A brief period of republican government in Spain, marked by political instability and federalist uprisings.", "description_zh": "\u897f\u73ed\u7259\u77ed\u6682\u7684\u5171\u548c\u653f\u5e9c\u65f6\u671f\uff0c\u4ee5\u653f\u6cbb\u4e0d\u7a33\u5b9a\u548c\u8054\u90a6\u4e3b\u4e49\u8d77\u4e49\u4e3a\u7279\u5f81\u3002"}, {"title": "Spanish-American War", "title_zh": "\u7f8e\u897f\u6218\u4e89", "year": 1898, "category": "war", "description": "A conflict between Spain and the United States, resulting in Spain ceding Cuba, Puerto Rico, and Guam, and selling the Philippines to the U.S.", "description_zh": "\u897f\u73ed\u7259\u4e0e\u7f8e\u56fd\u4e4b\u95f4\u7684\u51b2\u7a81\uff0c\u5bfc\u81f4\u897f\u73ed\u7259\u5272\u8ba9\u53e4\u5df4\u3001\u6ce2\u591a\u9ece\u5404\u548c\u5173\u5c9b\uff0c\u5e76\u5c06\u83f2\u5f8b\u5bbe\u51fa\u552e\u7ed9\u7f8e\u56fd\u3002"}, {"title": "Second Spanish Republic", "title_zh": "\u897f\u73ed\u7259\u7b2c\u4e8c\u5171\u548c\u56fd", "year": 1931, "category": "revolution", "description": "A democratic republic established after the abdication of King Alfonso XIII, characterized by significant social and political reforms.", "description_zh": "\u963f\u65b9\u7d22\u5341\u4e09\u4e16\u56fd\u738b\u9000\u4f4d\u540e\u5efa\u7acb\u7684\u6c11\u4e3b\u5171\u548c\u56fd\uff0c\u4ee5\u91cd\u8981\u7684\u793e\u4f1a\u548c\u653f\u6cbb\u6539\u9769\u4e3a\u7279\u5f81\u3002"}, {"title": "Spanish Civil War", "title_zh": "\u897f\u73ed\u7259\u5185\u6218", "year": 1936, "category": "civil_war", "description": "A brutal conflict between the Republicans and the Nationalists, led by Francisco Franco, resulting in a Nationalist victory and the establishment of a dictatorship.", "description_zh": "\u5171\u548c\u6d3e\u4e0e\u5f17\u6717\u897f\u65af\u79d1\u00b7\u4f5b\u6717\u54e5\u9886\u5bfc\u7684\u56fd\u6c11\u519b\u4e4b\u95f4\u7684\u4e00\u573a\u6b8b\u9177\u51b2\u7a81\uff0c\u56fd\u6c11\u519b\u83b7\u80dc\u5e76\u5efa\u7acb\u4e86\u72ec\u88c1\u7edf\u6cbb\u3002"}, {"title": "Establishment of Francoist Dictatorship", "title_zh": "\u4f5b\u6717\u54e5\u72ec\u88c1\u7edf\u6cbb\u5efa\u7acb", "year": 1939, "category": "revolution", "description": "Following the victory in the Civil War, Francisco Franco established an authoritarian regime that lasted until his death in 1975.", "description_zh": "\u5185\u6218\u80dc\u5229\u540e\uff0c\u5f17\u6717\u897f\u65af\u79d1\u00b7\u4f5b\u6717\u54e5\u5efa\u7acb\u4e86\u4e00\u4e2a\u6301\u7eed\u52301975\u5e74\u4ed6\u53bb\u4e16\u7684\u5a01\u6743\u4e3b\u4e49\u653f\u6743\u3002"}, {"title": "Spanish Transition to Democracy", "title_zh": "\u897f\u73ed\u7259\u6c11\u4e3b\u5316\u8f6c\u578b", "year": 1975, "category": "reform", "description": "Following Franco's death, Spain peacefully transitioned from a dictatorship to a constitutional monarchy and parliamentary democracy.", "description_zh": "\u4f5b\u6717\u54e5\u53bb\u4e16\u540e\uff0c\u897f\u73ed\u7259\u4ece\u72ec\u88c1\u7edf\u6cbb\u548c\u5e73\u8fc7\u6e21\u5230\u541b\u4e3b\u7acb\u5baa\u5236\u548c\u8bae\u4f1a\u6c11\u4e3b\u5236\u3002"}, {"title": "Spanish Constitutional Referendum", "title_zh": "\u897f\u73ed\u7259\u5baa\u6cd5\u516c\u6295", "year": 1978, "category": "reform", "description": "A referendum approved the Constitution of 1978, establishing Spain as a parliamentary monarchy and laying the groundwork for modern Spanish democracy.", "description_zh": "\u516c\u6295\u6279\u51c6\u4e861978\u5e74\u5baa\u6cd5\uff0c\u5c06\u897f\u73ed\u7259\u786e\u7acb\u4e3a\u8bae\u4f1a\u541b\u4e3b\u5236\u56fd\u5bb6\uff0c\u4e3a\u73b0\u4ee3\u897f\u73ed\u7259\u6c11\u4e3b\u5960\u5b9a\u4e86\u57fa\u7840\u3002"}, {"title": "Spain Joins the European Economic Community", "title_zh": "\u897f\u73ed\u7259\u52a0\u5165\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53", "year": 1986, "category": "diplomacy", "description": "Spain's accession to the EEC (now the European Union) marked its full reintegration into Europe after the Franco dictatorship.", "description_zh": "\u897f\u73ed\u7259\u52a0\u5165\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53\uff08\u73b0\u4e3a\u6b27\u76df\uff09\u6807\u5fd7\u7740\u5176\u5728\u4f5b\u6717\u54e5\u72ec\u88c1\u7edf\u6cbb\u7ed3\u675f\u540e\u91cd\u65b0\u5b8c\u5168\u878d\u5165\u6b27\u6d32\u3002"}, {"title": "Catalan Independence Referendum", "title_zh": "\u52a0\u6cf0\u7f57\u5c3c\u4e9a\u72ec\u7acb\u516c\u6295", "year": 2017, "category": "independence", "description": "A referendum on Catalan independence was held, though it was declared illegal by the Spanish constitutional court and met with strong opposition from the central government.", "description_zh": "\u4e3e\u884c\u4e86\u5173\u4e8e\u52a0\u6cf0\u7f57\u5c3c\u4e9a\u72ec\u7acb\u7684\u516c\u6295\uff0c\u5c3d\u7ba1\u88ab\u897f\u73ed\u7259\u5baa\u6cd5\u6cd5\u9662\u5ba3\u5e03\u4e3a\u975e\u6cd5\uff0c\u5e76\u906d\u5230\u4e2d\u592e\u653f\u5e9c\u7684\u5f3a\u70c8\u53cd\u5bf9\u3002"}], "aligned": [{"category": "war", "a": {"title": "Norman Conquest of England", "title_zh": "\u8bfa\u66fc\u5f81\u670d\u82f1\u683c\u5170", "year": 1066, "description": "William the Conqueror, Duke of Normandy, defeated the English forces at the Battle of Hastings, leading to Norman rule and profound changes in English society, language, and governance.", "description_zh": "\u8bfa\u66fc\u5e95\u516c\u7235\u5a01\u5ec9\u5f81\u670d\u8005\u5728\u9ed1\u65af\u5ef7\u65af\u6218\u5f79\u4e2d\u51fb\u8d25\u82f1\u683c\u5170\u519b\u961f\uff0c\u5bfc\u81f4\u8bfa\u66fc\u4eba\u7edf\u6cbb\uff0c\u5e76\u5bf9\u82f1\u683c\u5170\u7684\u793e\u4f1a\u3001\u8bed\u8a00\u548c\u6cbb\u7406\u4ea7\u751f\u4e86\u6df1\u8fdc\u5f71\u54cd\u3002"}, "b": {"title": "War of the Spanish Succession", "title_zh": "\u897f\u73ed\u7259\u738b\u4f4d\u7ee7\u627f\u6218\u4e89", "year": 1701, "description": "A major European conflict triggered by the succession to the Spanish throne after the death of Charles II, resulting in the Bourbon dynasty taking power.", "description_zh": "\u67e5\u7406\u4e8c\u4e16\u53bb\u4e16\u540e\uff0c\u7531\u897f\u73ed\u7259\u738b\u4f4d\u7ee7\u627f\u95ee\u9898\u5f15\u53d1\u7684\u4e00\u573a\u6b27\u6d32\u4e3b\u8981\u51b2\u7a81\uff0c\u6700\u7ec8\u5bfc\u81f4\u6ce2\u65c1\u738b\u671d\u638c\u6743\u3002"}}, {"category": "war", "a": {"title": "End of the Hundred Years' War", "title_zh": "\u767e\u5e74\u6218\u4e89\u7ed3\u675f", "year": 1453, "description": "The conclusion of the protracted conflict between England and France, with England losing all its continental possessions except Calais.", "description_zh": "\u82f1\u683c\u5170\u4e0e\u6cd5\u56fd\u4e4b\u95f4\u65f7\u65e5\u6301\u4e45\u7684\u51b2\u7a81\u7ed3\u675f\uff0c\u82f1\u683c\u5170\u5931\u53bb\u4e86\u52a0\u83b1\u4ee5\u5916\u7684\u6240\u6709\u6b27\u6d32\u5927\u9646\u9886\u571f\u3002"}, "b": {"title": "Peninsular War", "title_zh": "\u534a\u5c9b\u6218\u4e89", "year": 1808, "description": "A conflict fought on the Iberian Peninsula during the Napoleonic Wars, where Spanish and Portuguese forces, aided by the British, fought against the French.", "description_zh": "\u62ff\u7834\u4ed1\u6218\u4e89\u671f\u95f4\u5728\u4f0a\u6bd4\u5229\u4e9a\u534a\u5c9b\u8fdb\u884c\u7684\u4e00\u573a\u51b2\u7a81\uff0c\u897f\u73ed\u7259\u548c\u8461\u8404\u7259\u519b\u961f\u5728\u82f1\u56fd\u7684\u63f4\u52a9\u4e0b\u5bf9\u6297\u6cd5\u56fd\u3002"}}, {"category": "war", "a": {"title": "Defeat of the Spanish Armada", "title_zh": "\u897f\u73ed\u7259\u65e0\u654c\u8230\u961f\u6e83\u8d25", "year": 1588, "description": "The English navy, aided by storms, repelled the invasion fleet sent by King Philip II of Spain, a significant victory for England and Protestantism.", "description_zh": "\u82f1\u683c\u5170\u6d77\u519b\u5728\u98ce\u66b4\u7684\u5e2e\u52a9\u4e0b\uff0c\u51fb\u9000\u4e86\u897f\u73ed\u7259\u56fd\u738b\u8153\u529b\u4e8c\u4e16\u6d3e\u51fa\u7684\u5165\u4fb5\u8230\u961f\uff0c\u8fd9\u662f\u82f1\u683c\u5170\u548c\u65b0\u6559\u7684\u4e00\u6b21\u91cd\u5927\u80dc\u5229\u3002"}, "b": {"title": "Spanish-American War", "title_zh": "\u7f8e\u897f\u6218\u4e89", "year": 1898, "description": "A conflict between Spain and the United States, resulting in Spain ceding Cuba, Puerto Rico, and Guam, and selling the Philippines to the U.S.", "description_zh": "\u897f\u73ed\u7259\u4e0e\u7f8e\u56fd\u4e4b\u95f4\u7684\u51b2\u7a81\uff0c\u5bfc\u81f4\u897f\u73ed\u7259\u5272\u8ba9\u53e4\u5df4\u3001\u6ce2\u591a\u9ece\u5404\u548c\u5173\u5c9b\uff0c\u5e76\u5c06\u83f2\u5f8b\u5bbe\u51fa\u552e\u7ed9\u7f8e\u56fd\u3002"}}, {"category": "civil_war", "a": {"title": "English Civil War", "title_zh": "\u82f1\u56fd\u5185\u6218", "year": 1642, "description": "A series of conflicts fought between Parliamentarians ('Roundheads') and Royalists ('Cavaliers') over the manner of England's governance, leading to the execution of King Charles I.", "description_zh": "\u8bae\u4f1a\u6d3e\uff08\u5706\u9885\u515a\uff09\u4e0e\u738b\u515a\uff08\u9a91\u58eb\u515a\uff09\u4e4b\u95f4\u56f4\u7ed5\u82f1\u683c\u5170\u6cbb\u7406\u65b9\u5f0f\u5c55\u5f00\u7684\u4e00\u7cfb\u5217\u51b2\u7a81\uff0c\u6700\u7ec8\u5bfc\u81f4\u67e5\u7406\u4e00\u4e16\u56fd\u738b\u88ab\u5904\u51b3\u3002"}, "b": {"title": "Spanish Civil War", "title_zh": "\u897f\u73ed\u7259\u5185\u6218", "year": 1936, "description": "A brutal conflict between the Republicans and the Nationalists, led by Francisco Franco, resulting in a Nationalist victory and the establishment of a dictatorship.", "description_zh": "\u5171\u548c\u6d3e\u4e0e\u5f17\u6717\u897f\u65af\u79d1\u00b7\u4f5b\u6717\u54e5\u9886\u5bfc\u7684\u56fd\u6c11\u519b\u4e4b\u95f4\u7684\u4e00\u573a\u6b8b\u9177\u51b2\u7a81\uff0c\u56fd\u6c11\u519b\u83b7\u80dc\u5e76\u5efa\u7acb\u4e86\u72ec\u88c1\u7edf\u6cbb\u3002"}}, {"category": "revolution", "a": {"title": "The Glorious Revolution", "title_zh": "\u5149\u8363\u9769\u547d", "year": 1688, "description": "The overthrow of King James II by a union of English Parliamentarians with the Dutch stadtholder William of Orange. It led to a constitutional monarchy and the Bill of Rights.", "description_zh": "\u82f1\u683c\u5170\u8bae\u4f1a\u6d3e\u4e0e\u8377\u5170\u6267\u653f\u5a01\u5ec9\u4e09\u4e16\u8054\u5408\u63a8\u7ffb\u4e86\u8a79\u59c6\u65af\u4e8c\u4e16\u56fd\u738b\u7684\u7edf\u6cbb\u3002\u8fd9\u5bfc\u81f4\u4e86\u541b\u4e3b\u7acb\u5baa\u5236\u548c\u300a\u6743\u5229\u6cd5\u6848\u300b\u7684\u8bde\u751f\u3002"}, "b": {"title": "Establishment of Francoist Dictatorship", "title_zh": "\u4f5b\u6717\u54e5\u72ec\u88c1\u7edf\u6cbb\u5efa\u7acb", "year": 1939, "description": "Following the victory in the Civil War, Francisco Franco established an authoritarian regime that lasted until his death in 1975.", "description_zh": "\u5185\u6218\u80dc\u5229\u540e\uff0c\u5f17\u6717\u897f\u65af\u79d1\u00b7\u4f5b\u6717\u54e5\u5efa\u7acb\u4e86\u4e00\u4e2a\u6301\u7eed\u52301975\u5e74\u4ed6\u53bb\u4e16\u7684\u5a01\u6743\u4e3b\u4e49\u653f\u6743\u3002"}}, {"category": "reform", "a": {"title": "Great Reform Act 1832", "title_zh": "1832\u5e74\u6539\u9769\u6cd5\u6848", "year": 1832, "description": "A significant piece of legislation that redistributed parliamentary seats to give better representation to industrial towns and expanded the franchise.", "description_zh": "\u4e00\u9879\u91cd\u8981\u7684\u7acb\u6cd5\uff0c\u91cd\u65b0\u5206\u914d\u4e86\u8bae\u4f1a\u5e2d\u4f4d\uff0c\u4e3a\u5de5\u4e1a\u57ce\u9547\u63d0\u4f9b\u4e86\u66f4\u597d\u7684\u4ee3\u8868\u6027\uff0c\u5e76\u6269\u5927\u4e86\u9009\u4e3e\u6743\u3002"}, "b": {"title": "Spanish Transition to Democracy", "title_zh": "\u897f\u73ed\u7259\u6c11\u4e3b\u5316\u8f6c\u578b", "year": 1975, "description": "Following Franco's death, Spain peacefully transitioned from a dictatorship to a constitutional monarchy and parliamentary democracy.", "description_zh": "\u4f5b\u6717\u54e5\u53bb\u4e16\u540e\uff0c\u897f\u73ed\u7259\u4ece\u72ec\u88c1\u7edf\u6cbb\u548c\u5e73\u8fc7\u6e21\u5230\u541b\u4e3b\u7acb\u5baa\u5236\u548c\u8bae\u4f1a\u6c11\u4e3b\u5236\u3002"}}, {"category": "reform", "a": {"title": "Creation of the National Health Service (NHS)", "title_zh": "\u56fd\u6c11\u533b\u7597\u670d\u52a1\u4f53\u7cfb\uff08NHS\uff09\u7684\u521b\u5efa", "year": 1948, "description": "Established as part of the welfare state following World War II, the NHS provided comprehensive healthcare free at the point of use.", "description_zh": "\u4f5c\u4e3a\u4e8c\u6218\u540e\u798f\u5229\u56fd\u5bb6\u7684\u4e00\u90e8\u5
