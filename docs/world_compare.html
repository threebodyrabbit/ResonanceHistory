206\u800c\u5efa\u7acb\uff0cNHS \u63d0\u4f9b\u514d\u8d39\u7684\u7efc\u5408\u533b\u7597\u4fdd\u5065\u670d\u52a1\u3002"}, "b": {"title": "Spanish Constitutional Referendum", "title_zh": "\u897f\u73ed\u7259\u5baa\u6cd5\u516c\u6295", "year": 1978, "description": "A referendum approved the Constitution of 1978, establishing Spain as a parliamentary monarchy and laying the groundwork for modern Spanish democracy.", "description_zh": "\u516c\u6295\u6279\u51c6\u4e861978\u5e74\u5baa\u6cd5\uff0c\u5c06\u897f\u73ed\u7259\u786e\u7acb\u4e3a\u8bae\u4f1a\u541b\u4e3b\u5236\u56fd\u5bb6\uff0c\u4e3a\u73b0\u4ee3\u897f\u73ed\u7259\u6c11\u4e3b\u5960\u5b9a\u4e86\u57fa\u7840\u3002"}}, {"category": "diplomacy", "a": {"title": "United Kingdom Joins the European Economic Community", "title_zh": "\u82f1\u56fd\u52a0\u5165\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53", "year": 1973, "description": "After years of negotiation, the UK became a member of the EEC, marking a significant shift in its foreign policy and economic orientation.", "description_zh": "\u7ecf\u8fc7\u591a\u5e74\u7684\u8c08\u5224\uff0c\u82f1\u56fd\u6210\u4e3a\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53\u6210\u5458\u56fd\uff0c\u6807\u5fd7\u7740\u5176\u5916\u4ea4\u653f\u7b56\u548c\u7ecf\u6d4e\u65b9\u5411\u7684\u91cd\u5927\u8f6c\u53d8\u3002"}, "b": {"title": "Spain Joins the European Economic Community", "title_zh": "\u897f\u73ed\u7259\u52a0\u5165\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53", "year": 1986, "description": "Spain's accession to the EEC (now the European Union) marked its full reintegration into Europe after the Franco dictatorship.", "description_zh": "\u897f\u73ed\u7259\u52a0\u5165\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53\uff08\u73b0\u4e3a\u6b27\u76df\uff09\u6807\u5fd7\u7740\u5176\u5728\u4f5b\u6717\u54e5\u72ec\u88c1\u7edf\u6cbb\u7ed3\u675f\u540e\u91cd\u65b0\u5b8c\u5168\u878d\u5165\u6b27\u6d32\u3002"}}], "prediction": null}, {"label_a": "France", "label_b": "China (Ming & Qing)", "similarity": 0.409, "lcs_length": 9, "timeline_a": [{"title": "Founding of the Capetian Dynasty", "title_zh": "\u5361\u4f69\u738b\u671d\u7684\u5efa\u7acb", "year": 987, "category": "reform", "description": "Hugh Capet was elected King of the Franks, establishing the Capetian dynasty which would rule France for over three centuries and lay the foundations for the modern French state.", "description_zh": "\u4e8e\u683c\u00b7\u5361\u4f69\u5f53\u9009\u4e3a\u6cd5\u5170\u514b\u56fd\u738b\uff0c\u5efa\u7acb\u4e86\u7edf\u6cbb\u6cd5\u56fd\u4e09\u4e2a\u591a\u4e16\u7eaa\u7684\u5361\u4f69\u738b\u671d\uff0c\u4e3a\u73b0\u4ee3\u6cd5\u56fd\u5960\u5b9a\u4e86\u57fa\u7840\u3002"}, {"title": "First Crusade Launched", "title_zh": "\u7b2c\u4e00\u6b21\u5341\u5b57\u519b\u4e1c\u5f81", "year": 1095, "category": "war", "description": "Pope Urban II called for the First Crusade at the Council of Clermont, initiating a series of religious wars that significantly impacted European and Middle Eastern history, with many French knights and nobles participating.", "description_zh": "\u6559\u7687\u4e4c\u5c14\u73ed\u4e8c\u4e16\u5728\u514b\u83b1\u8499\u4f1a\u8bae\u4e0a\u53f7\u53ec\u53d1\u52a8\u7b2c\u4e00\u6b21\u5341\u5b57\u519b\u4e1c\u5f81\uff0c\u5f00\u542f\u4e86\u4e00\u7cfb\u5217\u5bf9\u6b27\u6d32\u548c\u4e2d\u4e1c\u5386\u53f2\u4ea7\u751f\u91cd\u5927\u5f71\u54cd\u7684\u5b97\u6559\u6218\u4e89\uff0c\u8bb8\u591a\u6cd5\u56fd\u9a91\u58eb\u548c\u8d35\u65cf\u53c2\u4e0e\u5176\u4e2d\u3002"}, {"title": "Beginning of the Hundred Years' War", "title_zh": "\u767e\u5e74\u6218\u4e89\u5f00\u59cb", "year": 1337, "category": "war", "description": "The Hundred Years' War, a protracted conflict between England and France over dynastic succession and territorial claims, began with English incursions into French territory.", "description_zh": "\u82f1\u683c\u5170\u548c\u6cd5\u56fd\u4e4b\u95f4\u5173\u4e8e\u738b\u4f4d\u7ee7\u627f\u6743\u548c\u9886\u571f\u4e3b\u5f20\u7684\u957f\u671f\u51b2\u7a81\u2014\u2014\u767e\u5e74\u6218\u4e89\uff0c\u968f\u7740\u82f1\u683c\u5170\u4eba\u5165\u4fb5\u6cd5\u56fd\u9886\u571f\u800c\u5f00\u59cb\u3002"}, {"title": "Battle of Agincourt", "title_zh": "\u963f\u91d1\u5e93\u5c14\u6218\u5f79", "year": 1415, "category": "war", "description": "A major English victory during the Hundred Years' War, where a numerically inferior English army led by Henry V defeated a much larger French force.", "description_zh": "\u767e\u5e74\u6218\u4e89\u671f\u95f4\u7684\u4e00\u573a\u91cd\u5927\u82f1\u683c\u5170\u80dc\u5229\uff0c\u4ea8\u5229\u4e94\u4e16\u7387\u9886\u7684\u5175\u529b\u5360\u52a3\u52bf\u7684\u82f1\u683c\u5170\u519b\u961f\u51fb\u8d25\u4e86\u6570\u91cf\u8fdc\u8d85\u4e8e\u5df1\u7684\u6cd5\u56fd\u519b\u961f\u3002"}, {"title": "End of the Hundred Years' War", "title_zh": "\u767e\u5e74\u6218\u4e89\u7ed3\u675f", "year": 1453, "category": "war", "description": "The expulsion of English forces from all French territory except Calais marked the end of the Hundred Years' War, consolidating French national identity and royal power.", "description_zh": "\u82f1\u683c\u5170\u519b\u961f\u88ab\u9010\u51fa\u6cd5\u56fd\u9886\u571f\uff08\u52a0\u83b1\u9664\u5916\uff09\uff0c\u6807\u5fd7\u7740\u767e\u5e74\u6218\u4e89\u7684\u7ed3\u675f\uff0c\u5de9\u56fa\u4e86\u6cd5\u56fd\u7684\u6c11\u65cf\u8ba4\u540c\u548c\u738b\u6743\u3002"}, {"title": "Beginning of the French Renaissance", "title_zh": "\u6cd5\u56fd\u6587\u827a\u590d\u5174\u5f00\u59cb", "year": 1494, "category": "cultural_peak", "description": "Influenced by Italian humanism and artistic developments, the French Renaissance saw a flourishing of arts, literature, and architecture, particularly under monarchs like Francis I.", "description_zh": "\u53d7\u610f\u5927\u5229\u4eba\u6587\u4e3b\u4e49\u548c\u827a\u672f\u53d1\u5c55\u7684\u5f71\u54cd\uff0c\u6cd5\u56fd\u6587\u827a\u590d\u5174\u8fce\u6765\u4e86\u827a\u672f\u3001\u6587\u5b66\u548c\u5efa\u7b51\u7684\u7e41\u8363\uff0c\u5c24\u5176\u662f\u5728\u5f17\u6717\u7d22\u74e6\u4e00\u4e16\u7b49\u541b\u4e3b\u7edf\u6cbb\u65f6\u671f\u3002"}, {"title": "French Wars of Religion Begin", "title_zh": "\u6cd5\u56fd\u5b97\u6559\u6218\u4e89\u5f00\u59cb", "year": 1562, "category": "civil_war", "description": "A series of brutal civil wars fought between Catholics and Huguenots (Protestants) that devastated France for over three decades.", "description_zh": "\u5929\u4e3b\u6559\u5f92\u548c\u80e1\u683c\u8bfa\u6d3e\uff08\u65b0\u6559\u5f92\uff09\u4e4b\u95f4\u7206\u53d1\u4e86\u4e00\u7cfb\u5217\u6b8b\u9177\u7684\u5185\u6218\uff0c\u8e42\u8e8f\u4e86\u6cd5\u56fd\u4e09\u5341\u591a\u5e74\u3002"}, {"title": "Edict of Nantes Issued", "title_zh": "\u300a\u5357\u7279\u6555\u4ee4\u300b\u9881\u5e03", "year": 1598, "category": "reform", "description": "King Henry IV issued the Edict of Nantes, granting substantial rights to Huguenots in a nation still largely Catholic, bringing a temporary end to the French Wars of Religion.", "description_zh": "\u4ea8\u5229\u56db\u4e16\u56fd\u738b\u9881\u5e03\u4e86\u300a\u5357\u7279\u6555\u4ee4\u300b\uff0c\u5728\u4ecd\u4ee5\u5929\u4e3b\u6559\u4e3a\u4e3b\u7684\u56fd\u5bb6\u7ed9\u4e88\u80e1\u683c\u8bfa\u6d3e\u76f8\u5f53\u5927\u7684\u6743\u5229\uff0c\u6682\u65f6\u7ed3\u675f\u4e86\u6cd5\u56fd\u5b97\u6559\u6218\u4e89\u3002"}, {"title": "Reign of Terror", "title_zh": "\u6050\u6016\u7edf\u6cbb", "year": 1793, "category": "revolution", "description": "A period of extreme violence during the French Revolution, marked by mass executions of 'enemies of the revolution' by the Committee of Public Safety.", "description_zh": "\u6cd5\u56fd\u5927\u9769\u547d\u671f\u95f4\u4e00\u6bb5\u6781\u7aef\u66b4\u529b\u7684\u65f6\u671f\uff0c\u4ee5\u6551\u56fd\u59d4\u5458\u4f1a\u5bf9\u201c\u9769\u547d\u654c\u4eba\u201d\u8fdb\u884c\u5927\u89c4\u6a21\u5904\u51b3\u4e3a\u6807\u5fd7\u3002"}, {"title": "Napoleonic Wars Begin", "title_zh": "\u62ff\u7834\u4ed1\u6218\u4e89\u5f00\u59cb", "year": 1803, "category": "war", "description": "Following the French Revolution, Napoleon Bonaparte's rise to power led to a series of major conflicts across Europe, known as the Napoleonic Wars, reshaping the continent's political map.", "description_zh": "\u6cd5\u56fd\u5927\u9769\u547d\u4e4b\u540e\uff0c\u62ff\u7834\u4ed1\u00b7\u6ce2\u62ff\u5df4\u7684\u5d1b\u8d77\u5bfc\u81f4\u4e86\u6a2a\u8de8\u6b27\u6d32\u7684\u4e00\u7cfb\u5217\u91cd\u5927\u51b2\u7a81\uff0c\u5373\u62ff\u7834\u4ed1\u6218\u4e89\uff0c\u91cd\u5851\u4e86\u6b27\u6d32\u5927\u9646\u7684\u653f\u6cbb\u7248\u56fe\u3002"}, {"title": "Battle of Waterloo", "title_zh": "\u6ed1\u94c1\u5362\u6218\u5f79", "year": 1815, "category": "war", "description": "Napoleon Bonaparte's final defeat by a coalition of British, Dutch, Belgian, and German troops under the Duke of Wellington and Prussian forces under Gebhard von Bl\u00fccher.", "description_zh": "\u62ff\u7834\u4ed1\u00b7\u6ce2\u62ff\u5df4\u88ab\u5a01\u7075\u987f\u516c\u7235\u7387\u9886\u7684\u82f1\u3001\u8377\u3001\u6bd4\u3001\u5fb7\u8054\u519b\u548c\u683c\u5e03\u54c8\u5fb7\u00b7\u51af\u00b7\u5e03\u5415\u6b47\u5c14\u7387\u9886\u7684\u666e\u9c81\u58eb\u519b\u961f\u51fb\u8d25\uff0c\u8fd9\u662f\u4ed6\u6700\u540e\u7684\u5931\u8d25\u3002"}, {"title": "Second French Empire Proclaimed", "title_zh": "\u7b2c\u4e8c\u6cd5\u5170\u897f\u5e1d\u56fd\u5ba3\u5e03", "year": 1852, "category": "revolution", "description": "Louis-Napol\u00e9on Bonaparte, nephew of Napoleon I, became Emperor Napoleon III, establishing the Second French Empire after a coup d'\u00e9tat.", "description_zh": "\u62ff\u7834\u4ed1\u4e00\u4e16\u7684\u4f84\u5b50\u8def\u6613-\u62ff\u7834\u4ed1\u00b7\u6ce2\u62ff\u5df4\u6210\u4e3a\u62ff\u7834\u4ed1\u4e09\u4e16\uff0c\u5728\u653f\u53d8\u540e\u5efa\u7acb\u4e86\u7b2c\u4e8c\u6cd5\u5170\u897f\u5e1d\u56fd\u3002"}, {"title": "Franco-Prussian War", "title_zh": "\u666e\u6cd5\u6218\u4e89", "year": 1870, "category": "war", "description": "A conflict between the Second French Empire and the North German Confederation led by Prussia, resulting in a decisive Prussian victory and the unification of Germany.", "description_zh": "\u7b2c\u4e8c\u6cd5\u5170\u897f\u5e1d\u56fd\u4e0e\u666e\u9c81\u58eb\u9886\u5bfc\u7684\u5317\u5fb7\u610f\u5fd7\u90a6\u8054\u4e4b\u95f4\u7684\u51b2\u7a81\uff0c\u5bfc\u81f4\u666e\u9c81\u58eb\u53d6\u5f97\u51b3\u5b9a\u6027\u80dc\u5229\uff0c\u5e76\u4fc3\u6210\u4e86\u5fb7\u56fd\u7684\u7edf\u4e00\u3002"}, {"title": "Paris Commune", "title_zh": "\u5df4\u9ece\u516c\u793e", "year": 1871, "category": "revolution", "description": "A radical socialist and revolutionary government that ruled Paris for two months following the defeat of France in the Franco-Prussian War.", "description_zh": "\u5728\u666e\u6cd5\u6218\u4e89\u6cd5\u56fd\u6218\u8d25\u540e\uff0c\u7edf\u6cbb\u5df4\u9ece\u4e24\u4e2a\u6708\u7684\u6fc0\u8fdb\u793e\u4f1a\u4e3b\u4e49\u9769\u547d\u653f\u5e9c\u3002"}, {"title": "World War I Begins", "title_zh": "\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218\u5f00\u59cb", "year": 1914, "category": "war", "description": "France entered World War I as part of the Allied Powers against the Central Powers, leading to four years of devastating trench warfare on French soil.", "description_zh": "\u6cd5\u56fd\u4f5c\u4e3a\u534f\u7ea6\u56fd\u6210\u5458\u52a0\u5165\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218\uff0c\u5bf9\u6297\u540c\u76df\u56fd\uff0c\u5bfc\u81f4\u6cd5\u56fd\u672c\u571f\u7ecf\u5386\u4e86\u56db\u5e74\u6bc1\u706d\u6027\u7684\u5811\u58d5\u6218\u3002"}, {"title": "Treaty of Versailles Signed", "title_zh": "\u300a\u51e1\u5c14\u8d5b\u6761\u7ea6\u300b\u7b7e\u7f72", "year": 1919, "category": "diplomacy", "description": "The peace treaty that officially ended World War I between Germany and the Allied Powers, largely negotiated in the Palace of Versailles.", "description_zh": "\u6b63\u5f0f\u7ed3\u675f\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218\u7684\u548c\u5e73\u6761\u7ea6\uff0c\u5728\u51e1\u5c14\u8d5b\u5bab\u4e0e\u5fb7\u56fd\u548c\u534f\u7ea6\u56fd\u7b7e\u7f72\u3002"}, {"title": "World War II Begins in Europe", "title_zh": "\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u5728\u6b27\u6d32\u7206\u53d1", "year": 1939, "category": "war", "description": "France declared war on Germany following the invasion of Poland, entering World War II and enduring occupation by Nazi Germany.", "description_zh": "\u6ce2\u5170\u88ab\u5165\u4fb5\u540e\uff0c\u6cd5\u56fd\u5411\u5fb7\u56fd\u5ba3\u6218\uff0c\u5377\u5165\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\uff0c\u5e76\u906d\u53d7\u7eb3\u7cb9\u5fb7\u56fd\u7684\u5360\u9886\u3002"}, {"title": "Liberation of Paris", "title_zh": "\u5df4\u9ece\u89e3\u653e", "year": 1944, "category": "war", "description": "Allied forces, including Free French troops, liberated Paris from Nazi German occupation during World War II.", "description_zh": "\u5305\u62ec\u81ea\u7531\u6cd5\u56fd\u90e8\u961f\u5728\u5185\u7684\u76df\u519b\u5728\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u671f\u95f4\u4ece\u7eb3\u7cb9\u5fb7\u56fd\u5360\u9886\u4e0b\u89e3\u653e\u4e86\u5df4\u9ece\u3002"}, {"title": "Fourth French Republic Established", "title_zh": "\u7b2c\u56db\u6cd5\u5170\u897f\u5171\u548c\u56fd\u5efa\u7acb", "year": 1946, "category": "reform", "description": "A new constitution established the Fourth Republic, a parliamentary democracy that succeeded the provisional government after World War II.", "description_zh": "\u65b0\u5baa\u6cd5\u5efa\u7acb\u4e86\u7b2c\u56db\u5171\u548c\u56fd\uff0c\u8fd9\u662f\u4e8c\u6218\u540e\u63a5\u66ff\u4e34\u65f6\u653f\u5e9c\u7684\u8bae\u4f1a\u6c11\u4e3b\u5236\u3002"}, {"title": "Fifth French Republic Established", "title_zh": "\u7b2c\u4e94\u6cd5\u5170\u897f\u5171\u548c\u56fd\u5efa\u7acb", "year": 1958, "category": "reform", "description": "Following the Algerian Crisis, Charles de Gaulle returned to power and established the Fifth Republic with a new constitution strengthening the presidency.", "description_zh": "\u963f\u5c14\u53ca\u5229\u4e9a\u5371\u673a\u540e\uff0c\u590f\u5c14\u00b7\u6234\u9ad8\u4e50\u91cd\u8fd4\u653f\u575b\uff0c\u5e76\u5236\u5b9a\u65b0\u5baa\u6cd5\u5efa\u7acb\u4e86\u7b2c\u4e94\u5171\u548c\u56fd\uff0c\u52a0\u5f3a\u4e86\u603b\u7edf\u6743\u529b\u3002"}, {"title": "May 1968 Events in France", "title_zh": "\u6cd5\u56fd1968\u5e74\u4e94\u6708\u4e8b\u4ef6", "year": 1968, "category": "revolution", "description": "A period of widespread student protests and general strikes that paralyzed France, leading to significant social and cultural changes.", "description_zh": "\u6cd5\u56fd\u7206\u53d1\u4e86\u5e7f\u6cdb\u7684\u5b66\u751f\u6297\u8bae\u548c\u603b\u7f62\u5de5\uff0c\u5bfc\u81f4\u56fd\u5bb6\u762b\u75ea\uff0c\u5e76\u5f15\u53d1\u4e86\u91cd\u5927\u7684\u793e\u4f1a\u548c\u6587\u5316\u53d8\u9769\u3002"}, {"title": "EU Expansion", "title_zh": "\u6b27\u76df\u6269\u5f20", "year": 2004, "category": "diplomacy", "description": "France, as a founding member of the European Economic Community (precursor to the EU), participated in the largest single-day enlargement of the European Union, admitting ten new member states.", "description_zh": "\u4f5c\u4e3a\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53\uff08\u6b27\u76df\u524d\u8eab\uff09\u7684\u521b\u59cb\u6210\u5458\u56fd\uff0c\u6cd5\u56fd\u53c2\u4e0e\u4e86\u6b27\u6d32\u8054\u76df\u6709\u53f2\u4ee5\u6765\u6700\u5927\u89c4\u6a21\u7684\u5355\u65e5\u6269\u5f20\uff0c\u63a5\u7eb3\u4e86\u5341\u4e2a\u65b0\u6210\u5458\u56fd\u3002"}], "timeline_b": [{"title": "Hongwu Emperor Begins Reign", "title_zh": "\u6d2a\u6b66\u7687\u5e1d\u5f00\u59cb\u7edf\u6cbb", "year": 1368, "category": "revolution", "description": "Zhu Yuanzhang, the Hongwu Emperor, establishes the Ming Dynasty, driving out the Mongol Yuan Dynasty and setting up his capital in Nanjing. He initiates sweeping reforms aimed at restoring Han Chinese rule and consolidating imperial power.", "description_zh": "\u6731\u5143\u748b\uff0c\u5373\u6d2a\u6b66\u7687\u5e1d\uff0c\u5efa\u7acb\u660e\u671d\uff0c\u9a71\u9010\u8499\u53e4\u5143\u671d\uff0c\u5b9a\u90fd\u5357\u4eac\u3002\u4ed6\u53d1\u8d77\u5e7f\u6cdb\u7684\u6539\u9769\uff0c\u65e8\u5728\u6062\u590d\u6c49\u65cf\u7edf\u6cbb\u548c\u5de9\u56fa\u7687\u6743\u3002"}, {"title": "Zheng He's First Voyage", "title_zh": "\u90d1\u548c\u9996\u6b21\u4e0b\u897f\u6d0b", "year": 1405, "category": "discovery", "description": "Admiral Zheng He embarks on the first of seven major maritime expeditions sponsored by the Yongle Emperor, reaching Southeast Asia, the Indian Ocean, and the coast of East Africa, showcasing Ming naval power.", "description_zh": "\u90d1\u548c\u4e0b\u897f\u6d0b\uff0c\u662f\u6c38\u4e50\u7687\u5e1d\u8d5e\u52a9\u7684\u4e03\u6b21\u5927\u89c4\u6a21\u6d77\u4e0a\u8fdc\u5f81\u4e2d\u7684\u7b2c\u4e00\u6b21\uff0c\u8fdc\u8fbe\u4e1c\u5357\u4e9a\u3001\u5370\u5ea6\u6d0b\u548c\u4e1c\u975e\u6d77\u5cb8\uff0c\u5c55\u793a\u4e86\u660e\u671d\u7684\u6d77\u4e0a\u5b9e\u529b\u3002"}, {"title": "Yongle Emperor Moves Capital to Beijing", "title_zh": "\u6c38\u4e50\u7687\u5e1d\u8fc1\u90fd\u5317\u4eac", "year": 1421, "category": "reform", "description": "The Yongle Emperor moves the Ming capital from Nanjing to Beijing, constructing the Forbidden City and solidifying Beijing's status as the imperial center. This move also facilitated his northern defense policies.", "description_zh": "\u6c38\u4e50\u7687\u5e1d\u5c06\u660e\u671d\u9996\u90fd\u4ece\u5357\u4eac\u8fc1\u5f80\u5317\u4eac\uff0c\u4fee\u5efa\u4e86\u7d2b\u7981\u57ce\uff0c\u5de9\u56fa\u4e86\u5317\u4eac\u4f5c\u4e3a\u5e1d\u56fd\u4e2d\u5fc3\u7684\u5730\u4f4d\u3002\u6b64\u4e3e\u4e5f\u4fc3\u8fdb\u4e86\u4ed6\u5317\u65b9\u7684\u9632\u5fa1\u653f\u7b56\u3002"}, {"title": "Tumu Crisis", "title_zh": "\u571f\u6728\u4e4b\u53d8", "year": 1449, "category": "war", "description": "The Zhengtong Emperor is captured by the Oirat Mongols during a disastrous military campaign. This event severely weakened the Ming Dynasty and led to a political crisis.", "description_zh": "\u6b63\u7edf\u7687\u5e1d\u5728\u4e00\u6b21\u707e\u96be\u6027\u7684\u519b\u4e8b\u8fdc\u5f81\u4e2d\u88ab\u74e6\u524c\u8499\u53e4\u4eba\u4fd8\u864f\u3002\u8fd9\u4e00\u4e8b\u4ef6\u4e25\u91cd\u524a\u5f31\u4e86\u660e\u671d\uff0c\u5e76\u5bfc\u81f4\u4e86\u653f\u6cbb\u5371\u673a\u3002"}, {"title": "Late Ming Economic Decline", "title_zh": "\u660e\u671d\u540e\u671f\u7ecf\u6d4e\u8870\u9000", "year": 1600, "category": "economic_crisis", "description": "The Ming Dynasty faced severe economic challenges, including inflation caused by the influx of silver, agricultural disruption from climate change (Little Ice Age), and heavy military spending, contributing to widespread unrest.", "description_zh": "\u660e\u671d\u9762\u4e34\u4e25\u5cfb\u7684\u7ecf\u6d4e\u6311\u6218\uff0c\u5305\u62ec\u767d\u94f6\u6d8c\u5165\u9020\u6210\u7684\u901a\u8d27\u81a8\u80c0\u3001\u5c0f\u51b0\u671f\u5e26\u6765\u7684\u519c\u4e1a\u7834\u574f\u4ee5\u53ca\u6c89\u91cd\u7684\u519b\u8d39\u5f00\u652f\uff0c\u8fd9\u4e9b\u90fd\u52a0\u5267\u4e86\u5e7f\u6cdb\u7684\u4e0d\u6ee1\u3002"}, {"title": "Manchu Conquest Begins", "title_zh": "\u6ee1\u6d32\u5f81\u670d\u5f00\u59cb", "year": 1618, "category": "war", "description": "Nurhaci, leader of the Jurchen tribes, declares war on the Ming Dynasty, establishing the Later Jin Dynasty and initiating the Manchu conquest of China.", "description_zh": "\u5973\u771f\u90e8\u843d\u9886\u8896\u52aa\u5c14\u54c8\u8d64\u5411\u660e\u671d\u5ba3\u6218\uff0c\u5efa\u7acb\u540e\u91d1\u653f\u6743\uff0c\u5f00\u542f\u4e86\u6ee1\u6d32\u5bf9\u4e2d\u56fd\u7684\u5f81\u670d\u3002"}, {"title": "Fall of Beijing to Li Zicheng", "title_zh": "\u5317\u4eac\u9677\u843d\u4e8e\u674e\u81ea\u6210", "year": 1644, "category": "revolution", "description": "Rebel forces led by Li Zicheng capture Beijing, leading to the suicide of the Chongzhen Emperor and the effective end of the Ming Dynasty.", "description_zh": "\u674e\u81ea\u6210\u9886\u5bfc\u7684\u53db\u519b\u653b\u9677\u5317\u4eac\uff0c\u5bfc\u81f4\u5d07\u796f\u7687\u5e1d\u81ea\u7f22\uff0c\u660e\u671d\u5b9e\u9645\u706d\u4ea1\u3002"}, {"title": "Qing Dynasty Established", "title_zh": "\u6e05\u671d\u5efa\u7acb", "year": 1644, "category": "revolution", "description": "Following the fall of Beijing, the Manchus, led by Prince Dorgon, enter the city and establish the Qing Dynasty, marking the beginning of Manchu rule over China.", "description_zh": "\u5317\u4eac\u9677\u843d\u540e\uff0c\u7531\u591a\u5c14\u886e\u4eb2\u738b\u9886\u5bfc\u7684\u6ee1\u65cf\u4eba\u8fdb\u5165\u5317\u4eac\uff0c\u5efa\u7acb\u6e05\u671d\uff0c\u6807\u5fd7\u7740\u6ee1\u65cf\u7edf\u6cbb\u4e2d\u56fd\u7684\u5f00\u59cb\u3002"}, {"title": "Kangxi Emperor's Reign Begins", "title_zh": "\u5eb7\u7199\u7687\u5e1d\u5f00\u59cb\u7edf\u6cbb", "year": 1661, "category": "reform", "description": "The Kangxi Emperor ascends the throne, beginning one of the longest and most prosperous reigns in Chinese history. He consolidated Qing rule and oversaw significant cultural and economic achievements.", "description_zh": "\u5eb7\u7199\u7687\u5e1d\u767b\u57fa\uff0c\u5f00\u542f\u4e86\u4e2d\u56fd\u5386\u53f2\u4e0a\u6700\u957f\u4e45\u3001\u6700\u7e41\u8363\u7684\u7edf\u6cbb\u65f6\u671f\u4e4b\u4e00\u3002\u4ed6\u5de9\u56fa\u4e86\u6e05\u671d\u7684\u7edf\u6cbb\uff0c\u5e76 oversaw \u4e86\u663e\u8457\u7684\u6587\u5316\u548c\u7ecf\u6d4e\u6210\u5c31\u3002"}, {"title": "Qianlong Emperor's Reign", "title_zh": "\u4e7e\u9686\u7687\u5e1d\u7edf\u6cbb", "year": 1735, "category": "cultural_peak", "description": "The Qianlong Emperor's reign marked the zenith of Qing power and territorial expansion, though it also saw the beginnings of internal decay and increasing corruption.", "description_zh": "\u4e7e\u9686\u7687\u5e1d\u7684\u7edf\u6cbb\u6807\u5fd7\u7740\u6e05\u671d\u6743\u529b\u548c\u9886\u571f\u6269\u5f20\u7684\u9876\u5cf0\uff0c\u5c3d\u7ba1\u4ed6\u4e5f\u89c1\u8bc1\u4e86\u5185\u90e8\u8870\u8d25\u548c\u8150\u8d25\u52a0\u5267\u7684\u5f00\u7aef\u3002"}, {"title": "Qing Literary Inquisition", "title_zh": "\u6e05\u671d\u6587\u5b57\u72f1", "year": 1736, "category": "reform", "description": "The Qing Dynasty intensified its literary inquisition, persecuting scholars and writers for perceived anti-Manchu sentiments expressed in literature, stifling intellectual freedom.", "description_zh": "\u6e05\u671d\u52a0\u5267\u4e86\u5176\u6587\u5b57\u72f1\uff0c\u8feb\u5bb3\u56e0\u6587\u5b66\u4f5c\u54c1\u4e2d\u88ab\u8ba4\u4e3a\u53cd\u6ee1\u60c5\u7eea\u800c\u4ea7\u751f\u7684\u5b66\u8005\u548c\u4f5c\u5bb6\uff0c\u538b\u5236\u4e86\u601d\u60f3\u81ea\u7531\u3002"}, {"title": "Macartney Embassy to China", "title_zh": "\u9a6c\u621b\u5c14\u5c3c\u4f7f\u534e", "year": 1793, "category": "diplomacy", "description": "The British Macartney Embassy visits the Qianlong Emperor seeking to establish diplomatic relations and expand trade. The embassy's failure highlighted the Qing court's resistance to foreign engagement.", "description_zh": "\u82f1\u56fd\u9a6c\u621b\u5c14\u5c3c\u4f7f\u56e2\u62dc\u8bbf\u4e7e\u9686\u7687\u5e1d\uff0c\u5bfb\u6c42\u5efa\u7acb\u5916\u4ea4\u5173\u7cfb\u548c\u6269\u5927\u8d38\u6613\u3002\u4f7f\u56e2\u7684\u5931\u8d25\u51f8\u663e\u4e86\u6e05\u671d\u5bab\u5ef7\u5bf9\u5916\u6765\u63a5\u89e6\u7684\u62b5\u5236\u3002"}, {"title": "First Opium War", "title_zh": "\u7b2c\u4e00\u6b21\u9e26\u7247\u6218\u4e89", "year": 1839, "category": "war", "description": "Conflict erupts between Great Britain and China over trade disputes, particularly the opium trade. The war resulted in a decisive British victory and the signing of the Treaty of Nanking.", "description_zh": "\u82f1\u56fd\u4e0e\u4e2d\u56fd\u56e0\u8d38\u6613\u4e89\u7aef\uff0c\u7279\u522b\u662f\u9e26\u7247\u8d38\u6613\u800c\u7206\u53d1\u51b2\u7a81\u3002\u6218\u4e89\u5bfc\u81f4\u82f1\u56fd\u53d6\u5f97\u51b3\u5b9a\u6027\u80dc\u5229\uff0c\u5e76\u7b7e\u7f72\u4e86\u300a\u5357\u4eac\u6761\u7ea6\u300b\u3002"}, {"title": "Treaty of Nanking", "title_zh": "\u5357\u4eac\u6761\u7ea6", "year": 1842, "category": "diplomacy", "description": "The first of the 'unequal treaties,' signed after the First Opium War, ceding Hong Kong Island to Britain and opening several Chinese ports to foreign trade and residence.", "description_zh": "\u7b2c\u4e00\u6b21\u9e26\u7247\u6218\u4e89\u540e\u7b7e\u7f72\u7684\u7b2c\u4e00\u4e2a\u201c\u4e0d\u5e73\u7b49\u6761\u7ea6\u201d\uff0c\u5c06\u9999\u6e2f\u5c9b\u5272\u8ba9\u7ed9\u82f1\u56fd\uff0c\u5e76\u5f00\u653e\u4e86\u591a\u4e2a\u4e2d\u56fd\u6e2f\u53e3\u8fdb\u884c\u5bf9\u5916\u8d38\u6613\u548c\u5c45\u4f4f\u3002"}, {"title": "Taiping Rebellion Begins", "title_zh": "\u592a\u5e73\u5929\u56fd\u8fd0\u52a8\u5f00\u59cb", "year": 1850, "category": "civil_war", "description": "Hong Xiuquan leads the Taiping Rebellion, a massive civil war against the Qing Dynasty, aiming to establish a 'Heavenly Kingdom of Great Peace.' It became one of the bloodiest conflicts in history.", "description_zh": "\u6d2a\u79c0\u5168\u9886\u5bfc\u592a\u5e73\u5929\u56fd\u8fd0\u52a8\uff0c\u4e00\u573a\u53cd\u5bf9\u6e05\u671d\u7684\u5927\u89c4\u6a21\u5185\u6218\uff0c\u65e8\u5728\u5efa\u7acb\u201c\u592a\u5e73\u5929\u56fd\u201d\u3002\u5b83\u6210\u4e3a\u5386\u53f2\u4e0a\u6700\u8840\u8165\u7684\u51b2\u7a81\u4e4b\u4e00\u3002"}, {"title": "Self-Strengthening Movement", "title_zh": "\u6d0b\u52a1\u8fd0\u52a8", "year": 1861, "category": "reform", "description": "A period of institutional reforms initiated by Qing officials to modernize the military and economy by adopting Western technologies and institutions, spurred by military defeats.", "description_zh": "\u7531\u6e05\u671d\u5b98\u5458\u53d1\u8d77\u7684\u4e00\u7cfb\u5217\u6539\u9769\uff0c\u65e8\u5728\u901a\u8fc7\u91c7\u7eb3\u897f\u65b9\u6280\u672f\u548c\u5236\u5ea6\u6765\u73b0\u4ee3\u5316\u519b\u961f\u548c\u7ecf\u6d4e\uff0c\u8fd9\u662f\u7531\u519b\u4e8b\u5931\u8d25\u6240\u63a8\u52a8\u7684\u3002"}, {"title": "First Sino-Japanese War", "title_zh": "\u7532\u5348\u6218\u4e89", "year": 1894, "category": "war", "description": "A conflict between the Qing Dynasty and Meiji Japan over control of Korea. Japan's decisive victory exposed the weaknesses of the Self-Strengthening Movement and led to further concessions.", "description_zh": "\u6e05\u671d\u4e0e\u660e\u6cbb\u65e5\u672c\u4e4b\u95f4\u56f4\u7ed5\u671d\u9c9c\u63a7\u5236\u6743\u53d1\u751f\u7684\u51b2\u7a81\u3002\u65e5\u672c\u7684\u51b3\u5b9a\u6027\u80dc\u5229\u66b4\u9732\u4e86\u6d0b\u52a1\u8fd0\u52a8\u7684\u5f31\u70b9\uff0c\u5e76\u5bfc\u81f4\u4e86\u8fdb\u4e00\u6b65\u7684\u8ba9\u6b65\u3002"}, {"title": "Boxer Rebellion", "title_zh": "\u4e49\u548c\u56e2\u8fd0\u52a8", "year": 1899, "category": "revolution", "description": "An anti-foreign and anti-Christian uprising by the 'Boxers' in northern China. The rebellion was eventually suppressed by an international coalition, leading to further humiliation for the Qing Dynasty.", "description_zh": "\u4e2d\u56fd\u5317\u65b9\u7531\u201c\u4e49\u548c\u56e2\u201d\u53d1\u8d77\u7684\u53cd\u5916\u56fd\u548c\u53cd\u57fa\u7763\u6559\u8d77\u4e49\u3002\u8fd9\u573a\u8d77\u4e49\u6700\u7ec8\u88ab\u56fd\u9645\u8054\u519b\u9547\u538b\uff0c\u7ed9\u6e05\u671d\u5e26\u6765\u4e86\u8fdb\u4e00\u6b65\u7684\u5c48\u8fb1\u3002"}, {"title": "Xinhai Revolution", "title_zh": "\u8f9b\u4ea5\u9769\u547d", "year": 1911, "category": "revolution", "description": "A revolutionary uprising that overthrew the Qing Dynasty and ended imperial rule in China, establishing the Republic of China. It began with the Wuchang Uprising.", "description_zh": "\u63a8\u7ffb\u6e05\u671d\u3001\u7ed3\u675f\u4e2d\u56fd\u541b\u4e3b\u7edf\u6cbb\u7684\u9769\u547d\u8d77\u4e49\uff0c\u5efa\u7acb\u4e86\u4e2d\u534e\u6c11\u56fd\u3002\u5b83\u59cb\u4e8e\u6b66\u660c\u8d77\u4e49\u3002"}], "aligned": [{"category": "reform", "a": {"title": "Founding of the Capetian Dynasty", "title_zh": "\u5361\u4f69\u738b\u671d\u7684\u5efa\u7acb", "year": 987, "description": "Hugh Capet was elected King of the Franks, establishing the Capetian dynasty which would rule France for over three centuries and lay the foundations for the modern French state.", "description_zh": "\u4e8e\u683c\u00b7\u5361\u4f69\u5f53\u9009\u4e3a\u6cd5\u5170\u514b\u56fd\u738b\uff0c\u5efa\u7acb\u4e86\u7edf\u6cbb\u6cd5\u56fd\u4e09\u4e2a\u591a\u4e16\u7eaa\u7684\u5361\u4f69\u738b\u671d\uff0c\u4e3a\u73b0\u4ee3\u6cd5\u56fd\u5960\u5b9a\u4e86\u57fa\u7840\u3002"}, "b": {"title": "Yongle Emperor Moves Capital to Beijing", "title_zh": "\u6c38\u4e50\u7687\u5e1d\u8fc1\u90fd\u5317\u4eac", "year": 1421, "description": "The Yongle Emperor moves the Ming capital from Nanjing to Beijing, constructing the Forbidden City and solidifying Beijing's status as the imperial center. This move also facilitated his northern defense policies.", "description_zh": "\u6c38\u4e50\u7687\u5e1d\u5c06\u660e\u671d\u9996\u90fd\u4ece\u5357\u4eac\u8fc1\u5f80\u5317\u4eac\uff0c\u4fee\u5efa\u4e86\u7d2b\u7981\u57ce\uff0c\u5de9\u56fa\u4e86\u5317\u4eac\u4f5c\u4e3a\u5e1d\u56fd\u4e2d\u5fc3\u7684\u5730\u4f4d\u3002\u6b64\u4e3e\u4e5f\u4fc3\u8fdb\u4e86\u4ed6\u5317\u65b9\u7684\u9632\u5fa1\u653f\u7b56\u3002"}}, {"category": "war", "a": {"title": "First Crusade Launched", "title_zh": "\u7b2c\u4e00\u6b21\u5341\u5b57\u519b\u4e1c\u5f81", "year": 1095, "description": "Pope Urban II called for the First Crusade at the Council of Clermont, initiating a series of religious wars that significantly impacted European and Middle Eastern history, with many French knights and nobles participating.", "description_zh": "\u6559\u7687\u4e4c\u5c14\u73ed\u4e8c\u4e16\u5728\u514b\u83b1\u8499\u4f1a\u8bae\u4e0a\u53f7\u53ec\u53d1\u52a8\u7b2c\u4e00\u6b21\u5341\u5b57\u519b\u4e1c\u5f81\uff0c\u5f00\u542f\u4e86\u4e00\u7cfb\u5217\u5bf9\u6b27\u6d32\u548c\u4e2d\u4e1c\u5386\u53f2\u4ea7\u751f\u91cd\u5927\u5f71\u54cd\u7684\u5b97\u6559\u6218\u4e89\uff0c\u8bb8\u591a\u6cd5\u56fd\u9a91\u58eb\u548c\u8d35\u65cf\u53c2\u4e0e\u5176\u4e2d\u3002"}, "b": {"title": "Tumu Crisis", "title_zh": "\u571f\u6728\u4e4b\u53d8", "year": 1449, "description": "The Zhengtong Emperor is captured by the Oirat Mongols during a disastrous military campaign. This event severely weakened the Ming Dynasty and led to a political crisis.", "description_zh": "\u6b63\u7edf\u7687\u5e1d\u5728\u4e00\u6b21\u707e\u96be\u6027\u7684\u519b\u4e8b\u8fdc\u5f81\u4e2d\u88ab\u74e6\u524c\u8499\u53e4\u4eba\u4fd8\u864f\u3002\u8fd9\u4e00\u4e8b\u4ef6\u4e25\u91cd\u524a\u5f31\u4e86\u660e\u671d\uff0c\u5e76\u5bfc\u81f4\u4e86\u653f\u6cbb\u5371\u673a\u3002"}}, {"category": "war", "a": {"title": "Beginning of the Hundred Years' War", "title_zh": "\u767e\u5e74\u6218\u4e89\u5f00\u59cb", "year": 1337, "description": "The Hundred Years' War, a protracted conflict between England and France over dynastic succession and territorial claims, began with English incursions into French territory.", "description_zh": "\u82f1\u683c\u5170\u548c\u6cd5\u56fd\u4e4b\u95f4\u5173\u4e8e\u738b\u4f4d\u7ee7\u627f\u6743\u548c\u9886\u571f\u4e3b\u5f20\u7684\u957f\u671f\u51b2\u7a81\u2014\u2014\u767e\u5e74\u6218\u4e89\uff0c\u968f\u7740\u82f1\u683c\u5170\u4eba\u5165\u4fb5\u6cd5\u56fd\u9886\u571f\u800c\u5f00\u59cb\u3002"}, "b": {"title": "Manchu Conquest Begins", "title_zh": "\u6ee1\u6d32\u5f81\u670d\u5f00\u59cb", "year": 1618, "description": "Nurhaci, leader of the Jurchen tribes, declares war on the Ming Dynasty, establishing the Later Jin Dynasty and initiating the Manchu conquest of China.", "description_zh": "\u5973\u771f\u90e8\u843d\u9886\u8896\u52aa\u5c14\u54c8\u8d64\u5411\u660e\u671d\u5ba3\u6218\uff0c\u5efa\u7acb\u540e\u91d1\u653f\u6743\uff0c\u5f00\u542f\u4e86\u6ee1\u6d32\u5bf9\u4e2d\u56fd\u7684\u5f81\u670d\u3002"}}, {"category": "war", "a": {"title": "Battle of Agincourt", "title_zh": "\u963f\u91d1\u5e93\u5c14\u6218\u5f79", "year": 1415, "description": "A major English victory during the Hundred Years' War, where a numerically inferior English army led by Henry V defeated a much larger French force.", "description_zh": "\u767e\u5e74\u6218\u4e89\u671f\u95f4\u7684\u4e00\u573a\u91cd\u5927\u82f1\u683c\u5170\u80dc\u5229\uff0c\u4ea8\u5229\u4e94\u4e16\u7387\u9886\u7684\u5175\u529b\u5360\u52a3\u52bf\u7684\u82f1\u683c\u5170\u519b\u961f\u51fb\u8d25\u4e86\u6570\u91cf\u8fdc\u8d85\u4e8e\u5df1\u7684\u6cd5\u56fd\u519b\u961f\u3002"}, "b": {"title": "First Opium War", "title_zh": "\u7b2c\u4e00\u6b21\u9e26\u7247\u6218\u4e89", "year": 1839, "description": "Conflict erupts between Great Britain and China over trade disputes, particularly the opium trade. The war resulted in a decisive British victory and the signing of the Treaty of Nanking.", "description_zh": "\u82f1\u56fd\u4e0e\u4e2d\u56fd\u56e0\u8d38\u6613\u4e89\u7aef\uff0c\u7279\u522b\u662f\u9e26\u7247\u8d38\u6613\u800c\u7206\u53d1\u51b2\u7a81\u3002\u6218\u4e89\u5bfc\u81f4\u82f1\u56fd\u53d6\u5f97\u51b3\u5b9a\u6027\u80dc\u5229\uff0c\u5e76\u7b7e\u7f72\u4e86\u300a\u5357\u4eac\u6761\u7ea6\u300b\u3002"}}, {"category": "civil_war", "a": {"title": "French Wars of Religion Begin", "title_zh": "\u6cd5\u56fd\u5b97\u6559\u6218\u4e89\u5f00\u59cb", "year": 1562, "description": "A series of brutal civil wars fought between Catholics and Huguenots (Protestants) that devastated France for over three decades.", "description_zh": "\u5929\u4e3b\u6559\u5f92\u548c\u80e1\u683c\u8bfa\u6d3e\uff08\u65b0\u6559\u5f92\uff09\u4e4b\u95f4\u7206\u53d1\u4e86\u4e00\u7cfb\u5217\u6b8b\u9177\u7684\u5185\u6218\uff0c\u8e42\u8e8f\u4e86\u6cd5\u56fd\u4e09\u5341\u591a\u5e74\u3002"}, "b": {"title": "Taiping Rebellion Begins", "title_zh": "\u592a\u5e73\u5929\u56fd\u8fd0\u52a8\u5f00\u59cb", "year": 1850, "description": "Hong Xiuquan leads the Taiping Rebellion, a massive civil war against the Qing Dynasty, aiming to establish a 'Heavenly Kingdom of Great Peace.' It became one of the bloodiest conflicts in history.", "description_zh": "\u6d2a\u79c0\u5168\u9886\u5bfc\u592a\u5e73\u5929\u56fd\u8fd0\u52a8\uff0c\u4e00\u573a\u53cd\u5bf9\u6e05\u671d\u7684\u5927\u89c4\u6a21\u5185\u6218\uff0c\u65e8\u5728\u5efa\u7acb\u201c\u592a\u5e73\u5929\u56fd\u201d\u3002\u5b83\u6210\u4e3a\u5386\u53f2\u4e0a\u6700\u8840\u8165\u7684\u51b2\u7a81\u4e4b\u4e00\u3002"}}, {"category": "reform", "a": {"title": "Edict of Nantes Issued", "title_zh": "\u300a\u5357\u7279\u6555\u4ee4\u300b\u9881\u5e03", "year": 1598, "description": "King Henry IV issued the Edict of Nantes, granting substantial rights to Huguenots in a nation still largely Catholic, bringing a temporary end to the French Wars of Religion.", "description_zh": "\u4ea8\u5229\u56db\u4e16\u56fd\u738b\u9881\u5e03\u4e86\u300a\u5357\u7279\u6555\u4ee4\u300b\uff0c\u5728\u4ecd\u4ee5\u5929\u4e3b\u6559\u4e3a\u4e3b\u7684\u56fd\u5bb6\u7ed9\u4e88\u80e1\u683c\u8bfa\u6d3e\u76f8\u5f53\u5927\u7684\u6743\u5229\uff0c\u6682\u65f6\u7ed3\u675f\u4e86\u6cd5\u56fd\u5b97\u6559\u6218\u4e89\u3002"}, "b": {"title": "Self-Strengthening Movement", "title_zh": "\u6d0b\u52a1\u8fd0\u52a8", "year": 1861, "description": "A period of institutional reforms initiated by Qing officials to modernize the military and economy by adopting Western technologies and institutions, spurred by military defeats.", "description_zh": "\u7531\u6e05\u671d\u5b98\u5458\u53d1\u8d77\u7684\u4e00\u7cfb\u5217\u6539\u9769\uff0c\u65e8\u5728\u901a\u8fc7\u91c7\u7eb3\u897f\u65b9\u6280\u672f\u548c\u5236\u5ea6\u6765\u73b0\u4ee3\u5316\u519b\u961f\u548c\u7ecf\u6d4e\uff0c\u8fd9\u662f\u7531\u519b\u4e8b\u5931\u8d25\u6240\u63a8\u52a8\u7684\u3002"}}, {"category": "war", "a": {"title": "Franco-Prussian War", "title_zh": "\u666e\u6cd5\u6218\u4e89", "year": 1870, "description": "A conflict between the Second French Empire and the North German Confederation led by Prussia, resulting in a decisive Prussian victory and the unification of Germany.", "description_zh": "\u7b2c\u4e8c\u6cd5\u5170\u897f\u5e1d\u56fd\u4e0e\u666e\u9c81\u58eb\u9886\u5bfc\u7684\u5317\u5fb7\u610f\u5fd7\u90a6\u8054\u4e4b\u95f4\u7684\u51b2\u7a81\uff0c\u5bfc\u81f4\u666e\u9c81\u58eb\u53d6\u5f97\u51b3\u5b9a\u6027\u80dc\u5229\uff0c\u5e76\u4fc3\u6210\u4e86\u5fb7\u56fd\u7684\u7edf\u4e00\u3002"}, "b": {"title": "First Sino-Japanese War", "title_zh": "\u7532\u5348\u6218\u4e89", "year": 1894, "description": "A conflict between the Qing Dynasty and Meiji Japan over control of Korea. Japan's decisive victory exposed the weaknesses of the Self-Strengthening Movement and led to further concessions.", "description_zh": "\u6e05\u671d\u4e0e\u660e\u6cbb\u65e5\u672c\u4e4b\u95f4\u56f4\u7ed5\u671d\u9c9c\u63a7\u5236\u6743\u53d1\u751f\u7684\u51b2\u7a81\u3002\u65e5\u672c\u7684\u51b3\u5b9a\u6027\u80dc\u5229\u66b4\u9732\u4e86\u6d0b\u52a1\u8fd0\u52a8\u7684\u5f31\u70b9\uff0c\u5e76\u5bfc\u81f4\u4e86\u8fdb\u4e00\u6b65\u7684\u8ba9\u6b65\u3002"}}, {"category": "revolution", "a": {"title": "Paris Commune", "title_zh": "\u5df4\u9ece\u516c\u793e", "year": 1871, "description": "A radical socialist and revolutionary government that ruled Paris for two months following the defeat of France in the Franco-Prussian War.", "description_zh": "\u5728\u666e\u6cd5\u6218\u4e89\u6cd5\u56fd\u6218\u8d25\u540e\uff0c\u7edf\u6cbb\u5df4\u9ece\u4e24\u4e2a\u6708\u7684\u6fc0\u8fdb\u793e\u4f1a\u4e3b\u4e49\u9769\u547d\u653f\u5e9c\u3002"}, "b": {"title": "Boxer Rebellion", "title_zh": "\u4e49\u548c\u56e2\u8fd0\u52a8", "year": 1899, "description": "An anti-foreign and anti-Christian uprising by the 'Boxers' in northern China. The rebellion was eventually suppressed by an international coalition, leading to further humiliation for the Qing Dynasty.", "description_zh": "\u4e2d\u56fd\u5317\u65b9\u7531\u201c\u4e49\u548c\u56e2\u201d\u53d1\u8d77\u7684\u53cd\u5916\u56fd\u548c\u53cd\u57fa\u7763\u6559\u8d77\u4e49\u3002\u8fd9\u573a\u8d77\u4e49\u6700\u7ec8\u88ab\u56fd\u9645\u8054\u519b\u9547\u538b\uff0c\u7ed9\u6e05\u671d\u5e26\u6765\u4e86\u8fdb\u4e00\u6b65\u7684\u5c48\u8fb1\u3002"}}, {"category": "revolution", "a": {"title": "May 1968 Events in France", "title_zh": "\u6cd5\u56fd1968\u5e74\u4e94\u6708\u4e8b\u4ef6", "year": 1968, "description": "A period of widespread student protests and general strikes that paralyzed France, leading to significant social and cultural changes.", "description_zh": "\u6cd5\u56fd\u7206\u53d1\u4e86\u5e7f\u6cdb\u7684\u5b66\u751f\u6297\u8bae\u548c\u603b\u7f62\u5de5\uff0c\u5bfc\u81f4\u56fd\u5bb6\u762b\u75ea\uff0c\u5e76\u5f15\u53d1\u4e86\u91cd\u5927\u7684\u793e\u4f1a\u548c\u6587\u5316\u53d8\u9769\u3002"}, "b": {"title": "Xinhai Revolution", "title_zh": "\u8f9b\u4ea5\u9769\u547d", "year": 1911, "description": "A revolutionary uprising that overthrew the Qing Dynasty and ended imperial rule in China, establishing the Republic of China. It began with the Wuchang Uprising.", "description_zh": "\u63a8\u7ffb\u6e05\u671d\u3001\u7ed3\u675f\u4e2d\u56fd\u541b\u4e3b\u7edf\u6cbb\u7684\u9769\u547d\u8d77\u4e49\uff0c\u5efa\u7acb\u4e86\u4e2d\u534e\u6c11\u56fd\u3002\u5b83\u59cb\u4e8e\u6b66\u660c\u8d77\u4e49\u3002"}}], "prediction": {"title": "EU Expansion", "title_zh": "\u6b27\u76df\u6269\u5f20", "year": 2004, "category": "diplomacy", "description": "France, as a founding member of the European Economic Community (precursor to the EU), participated in the largest single-day enlargement of the European Union, admitting ten new member states.", "description_zh": "\u4f5c\u4e3a\u6b27\u6d32\u7ecf\u6d4e\u5171\u540c\u4f53\uff08\u6b27\u76df\u524d\u8eab\uff09\u7684\u521b\u59cb\u6210\u5458\u56fd\uff0c\u6cd5\u56fd\u53c2\u4e0e\u4e86\u6b27\u6d32\u8054\u76df\u6709\u53f2\u4ee5\u6765\u6700\u5927\u89c4\u6a21\u7684\u5355\u65e5\u6269\u5f20\uff0c\u63a5\u7eb3\u4e86\u5341\u4e2a\u65b0\u6210\u5458\u56fd\u3002"}}, {"label_a": "Ottoman Empire", "label_b": "Mughal Empire", "similarity": 0.583, "lcs_length": 7, "timeline_a": [{"title": "Foundation of the Ottoman Beylik", "title_zh": "\u5965\u65af\u66fc\u8d1d\u4f0a\u56fd\u7684\u5efa\u7acb", "year": 1299, "category": "independence", "description": "Osman I, a leader of Turkic tribes in Anatolia, establishes a small beylik (principality) that would eventually grow into the vast Ottoman Empire.", "description_zh": "\u5b89\u7eb3\u6258\u5229\u4e9a\u7a81\u53a5\u90e8\u843d\u7684\u9886\u5bfc\u4eba\u5965\u65af\u66fc\u4e00\u4e16\u5efa\u7acb\u4e86\u4e00\u4e2a\u5c0f\u578b\u7684\u8d1d\u4f0a\u56fd\uff08\u516c\u56fd\uff09\uff0c\u8be5\u56fd\u6700\u7ec8\u53d1\u5c55\u6210\u4e3a\u5e9e\u5927\u7684\u5965\u65af\u66fc\u5e1d\u56fd\u3002"}, {"title": "Conquest of Constantinople", "title_zh": "\u541b\u58eb\u5766\u4e01\u5821\u7684\u5f81\u670d", "year": 1453, "category": "war", "description": "Sultan Mehmed II conquers Constantinople, the capital of the Byzantine Empire, marking the end of the Byzantine Empire and the rise of the Ottoman Empire as a major world power.", "description_zh": "\u82cf\u4e39\u7a46\u7f55\u9ed8\u5fb7\u4e8c\u4e16\u5f81\u670d\u4e86\u62dc\u5360\u5ead\u5e1d\u56fd\u7684\u9996\u90fd\u541b\u58eb\u5766\u4e01\u5821\uff0c\u6807\u5fd7\u7740\u62dc\u5360\u5ead\u5e1d\u56fd\u7684\u706d\u4ea1\u548c\u5965\u65af\u66fc\u5e1d\u56fd\u4f5c\u4e3a\u4e16\u754c\u5927\u56fd\u7684\u5d1b\u8d77\u3002"}, {"title": "Siege of Vienna", "title_zh": "\u7ef4\u4e5f\u7eb3\u4e4b\u56f4", "year": 1529, "category": "war", "description": "The first Ottoman attempt to capture Vienna, which was unsuccessful. This marked the limit of Ottoman expansion into Central Europe.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u9996\u6b21\u653b\u6253\u7ef4\u4e5f\u7eb3\u7684\u5c1d\u8bd5\uff0c\u4f46\u672a\u80fd\u6210\u529f\u3002\u8fd9\u6807\u5fd7\u7740\u5965\u65af\u66fc\u5e1d\u56fd\u5411\u4e2d\u6b27\u6269\u5f20\u7684\u6781\u9650\u3002"}, {"title": "Battle of Lepanto", "title_zh": "\u52d2\u73ed\u9640\u6d77\u6218", "year": 1571, "category": "war", "description": "A naval battle in which the Holy League, a coalition of Catholic states, decisively defeated the Ottoman fleet. This marked a turning point in Ottoman naval dominance in the Mediterranean.", "description_zh": "\u4e00\u573a\u6d77\u6218\uff0c\u5929\u4e3b\u6559\u56fd\u5bb6\u7ec4\u6210\u7684\u5723\u8054\u76df\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u5965\u65af\u66fc\u8230\u961f\u3002\u8fd9\u6807\u5fd7\u7740\u5965\u65af\u66fc\u5728\u5730\u4e2d\u6d77\u6d77\u4e0a\u9738\u6743\u7684\u8f6c\u6298\u70b9\u3002"}, {"title": "Treaty of Karlowitz", "title_zh": "\u5361\u5c14\u6d1b\u592b\u5947\u6761\u7ea6", "year": 1699, "category": "diplomacy", "description": "The first major territorial loss for the Ottoman Empire to European powers. It ceded significant territories in Central Europe, including Hungary, to the Habsburg Monarchy.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u9996\u6b21\u5411\u6b27\u6d32\u5217\u5f3a\u5272\u8ba9\u5927\u7247\u9886\u571f\u3002\u5b83\u5c06\u5305\u62ec\u5308\u7259\u5229\u5728\u5185\u7684\u4e2d\u6b27\u91cd\u8981\u9886\u571f\u5272\u8ba9\u7ed9\u54c8\u5e03\u65af\u5821\u541b\u4e3b\u56fd\u3002"}, {"title": "Tanzimat Reforms Begin", "title_zh": "\u5766\u9f50\u9a6c\u7279\u6539\u9769\u5f00\u59cb", "year": 1839, "category": "reform", "description": "A period of reform in the Ottoman Empire aimed at modernizing the empire and securing its territorial integrity against internal and external threats. Key decrees included guarantees of rights for all subjects regardless of religion.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u7684\u4e00\u6bb5\u6539\u9769\u65f6\u671f\uff0c\u65e8\u5728\u5b9e\u73b0\u5e1d\u56fd\u73b0\u4ee3\u5316\uff0c\u5e76\u4fdd\u969c\u5176\u514d\u53d7\u5185\u5916\u90e8\u5a01\u80c1\u7684\u9886\u571f\u5b8c\u6574\u3002\u5173\u952e\u6cd5\u4ee4\u5305\u62ec\u4fdd\u969c\u6240\u6709\u81e3\u6c11\u4e0d\u5206\u5b97\u6559\u7684\u6743\u5229\u3002"}, {"title": "Crimean War", "title_zh": "\u514b\u91cc\u7c73\u4e9a\u6218\u4e89", "year": 1853, "category": "war", "description": "A conflict fought between the Russian Empire and an alliance of the Ottoman Empire, France, the United Kingdom, and Sardinia. It highlighted the declining military power of Russia and the growing influence of Western powers in the region.", "description_zh": "\u4fc4\u7f57\u65af\u5e1d\u56fd\u4e0e\u5965\u65af\u66fc\u5e1d\u56fd\u3001\u6cd5\u56fd\u3001\u82f1\u56fd\u548c\u6492\u4e01\u738b\u56fd\u7ec4\u6210\u7684\u8054\u76df\u4e4b\u95f4\u7684\u4e00\u573a\u51b2\u7a81\u3002\u5b83\u51f8\u663e\u4e86\u4fc4\u7f57\u65af\u519b\u4e8b\u529b\u91cf\u7684\u8870\u843d\u4ee5\u53ca\u897f\u65b9\u5217\u5f3a\u5728\u8be5\u5730\u533a\u65e5\u76ca\u589e\u957f\u7684\u5f71\u54cd\u529b\u3002"}, {"title": "Promulgation of the First Ottoman Constitution", "title_zh": "\u7b2c\u4e00\u90e8\u5965\u65af\u66fc\u5baa\u6cd5\u7684\u9881\u5e03", "year": 1876, "category": "reform", "description": "The Ottoman Empire adopts its first constitution, establishing a constitutional monarchy and a parliament. This was a significant step towards modernization but was soon suspended.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u901a\u8fc7\u4e86\u7b2c\u4e00\u90e8\u5baa\u6cd5\uff0c\u5efa\u7acb\u4e86\u541b\u4e3b\u7acb\u5baa\u5236\u548c\u8bae\u4f1a\u3002\u8fd9\u662f\u8fc8\u5411\u73b0\u4ee3\u5316\u7684\u4e00\u5927\u6b65\uff0c\u4f46\u5f88\u5feb\u88ab\u6682\u505c\u3002"}, {"title": "Russo-Turkish War", "title_zh": "\u4fc4\u571f\u6218\u4e89", "year": 1877, "category": "war", "description": "A major conflict between the Russian and Ottoman Empires, resulting in significant territorial losses for the Ottomans and the independence of several Balkan nations.", "description_zh": "\u4fc4\u7f57\u65af\u548c\u5965\u65af\u66fc\u5e1d\u56fd\u4e4b\u95f4\u7684\u4e00\u573a\u4e3b\u8981\u51b2\u7a81\uff0c\u5bfc\u81f4\u5965\u65af\u66fc\u5e1d\u56fd\u5931\u53bb\u5927\u7247\u9886\u571f\uff0c\u4ee5\u53ca\u51e0\u4e2a\u5df4\u5c14\u5e72\u56fd\u5bb6\u7684\u72ec\u7acb\u3002"}, {"title": "Young Turk Revolution", "title_zh": "\u9752\u5e74\u571f\u8033\u5176\u9769\u547d", "year": 1908, "category": "revolution", "description": "A movement that restored the Ottoman constitution of 1876 and ushered in a period of multi-party politics. It aimed to modernize the empire and counter European influence.", "description_zh": "\u4e00\u9879\u6062\u590d1876\u5e74\u5965\u65af\u66fc\u5baa\u6cd5\u5e76\u5f00\u542f\u591a\u515a\u653f\u6cbb\u65f6\u671f\u7684\u8fd0\u52a8\u3002\u5b83\u65e8\u5728\u5b9e\u73b0\u5e1d\u56fd\u73b0\u4ee3\u5316\u5e76\u5bf9\u6297\u6b27\u6d32\u5f71\u54cd\u3002"}, {"title": "Ottoman Empire Enters World War I", "title_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u52a0\u5165\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218", "year": 1914, "category": "war", "description": "The Ottoman Empire joined the Central Powers in World War I, a decision that ultimately led to its dissolution.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u52a0\u5165\u540c\u76df\u56fd\u53c2\u52a0\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218\uff0c\u8fd9\u4e00\u51b3\u5b9a\u6700\u7ec8\u5bfc\u81f4\u4e86\u5176\u89e3\u4f53\u3002"}, {"title": "Abolition of the Ottoman Sultanate", "title_zh": "\u5965\u65af\u66fc\u82cf\u4e39\u5236\u7684\u5e9f\u9664", "year": 1922, "category": "independence", "description": "The Grand National Assembly of Turkey abolishes the Ottoman Sultanate, marking the end of the Ottoman Empire and paving the way for the establishment of the Republic of Turkey.", "description_zh": "\u571f\u8033\u5176\u5927\u56fd\u6c11\u8bae\u4f1a\u5e9f\u9664\u4e86\u5965\u65af\u66fc\u82cf\u4e39\u5236\uff0c\u6807\u5fd7\u7740\u5965\u65af\u66fc\u5e1d\u56fd\u7684\u7ec8\u7ed3\uff0c\u5e76\u4e3a\u571f\u8033\u5176\u5171\u548c\u56fd\u7684\u5efa\u7acb\u94fa\u5e73\u4e86\u9053\u8def\u3002"}], "timeline_b": [{"title": "First Battle of Panipat", "title_zh": "\u7b2c\u4e00\u6b21\u5e15\u5c3c\u5e15\u7279\u6218\u5f79", "year": 1526, "category": "war", "description": "Babur, founder of the Mughal Empire, defeated Ibrahim Lodi of the Delhi Sultanate using gunpowder firearms and field artillery, marking the beginning of Mughal rule in India.", "description_zh": "\u83ab\u5367\u513f\u5e1d\u56fd\u7684\u5960\u57fa\u4eba\u5df4\u5e03\u5c14\u5229\u7528\u706b\u836f\u6b66\u5668\u548c\u91ce\u6218\u70ae\u51fb\u8d25\u4e86\u5fb7\u91cc\u82cf\u4e39\u56fd\u7684\u6613\u535c\u62c9\u6b23\u00b7\u6d1b\u8fea\uff0c\u6807\u5fd7\u7740\u83ab\u5367\u513f\u738b\u671d\u5728\u5370\u5ea6\u7edf\u6cbb\u7684\u5f00\u59cb\u3002"}, {"title": "Battle of Khanwa", "title_zh": "\u574e\u74e6\u6218\u5f79", "year": 1527, "category": "war", "description": "Babur decisively defeated a Rajput confederacy led by Rana Sanga, consolidating Mughal power in Northern India and demonstrating the effectiveness of his military tactics.", "description_zh": "\u5df4\u5e03\u5c14\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u7531\u62c9\u7eb3\u00b7\u6851\u52a0\u9886\u5bfc\u7684\u62c9\u6770\u666e\u7279\u8054\u519b\uff0c\u5de9\u56fa\u4e86\u83ab\u5367\u513f\u5728\u5370\u5ea6\u5317\u90e8\u7684\u6743\u529b\uff0c\u5e76\u5c55\u793a\u4e86\u4ed6\u6218\u672f\u7684\u6709\u6548\u6027\u3002"}, {"title": "Second Battle of Panipat", "title_zh": "\u7b2c\u4e8c\u6b21\u5e15\u5c3c\u5e15\u7279\u6218\u5f79", "year": 1556, "category": "war", "description": "Akbar's forces, led by Bairam Khan, defeated Hemu, a Hindu general and claimant to the throne, securing the Mughal Empire's future and establishing Akbar's authority.", "description_zh": "\u963f\u514b\u5df4\u7684\u519b\u961f\u5728\u62dc\u62c9\u59c6\u00b7\u6c57\u7684\u7387\u9886\u4e0b\u51fb\u8d25\u4e86\u8d6b\u7a46\uff0c\u4e00\u4f4d\u5370\u5ea6\u6559\u5c06\u519b\u548c\u738b\u4f4d\u89ca\u89ce\u8005\uff0c\u786e\u4fdd\u4e86\u83ab\u5367\u513f\u5e1d\u56fd\u7684\u672a\u6765\u5e76\u786e\u7acb\u4e86\u963f\u514b\u5df4\u7684\u6743\u5a01\u3002"}, {"title": "Reign of Akbar", "title_zh": "\u963f\u514b\u5df4\u7edf\u6cbb\u65f6\u671f", "year": 1556, "category": "reform", "description": "Akbar's long reign was characterized by military expansion, administrative reforms, religious tolerance (Din-i Ilahi), and patronage of arts and culture, establishing the empire's golden age.", "description_zh": "\u963f\u514b\u5df4\u7684\u957f\u671f\u7edf\u6cbb\u4ee5\u519b\u4e8b\u6269\u5f20\u3001\u884c\u653f\u6539\u9769\u3001\u5b97\u6559\u5bbd\u5bb9\uff08\u8fea\u5c3c\u00b7\u4f0a\u62c9\u5e0c\uff09\u4ee5\u53ca\u5bf9\u827a\u672f\u548c\u6587\u5316\u7684\u8d5e\u52a9\u4e3a\u7279\u5f81\uff0c\u786e\u7acb\u4e86\u5e1d\u56fd\u7684\u9ec4\u91d1\u65f6\u4ee3\u3002"}, {"title": "Construction of the Taj Mahal", "title_zh": "\u6cf0\u59ec\u9675\u7684\u5efa\u9020", "year": 1632, "category": "cultural_peak", "description": "Commissioned by Emperor Shah Jahan as a mausoleum for his wife Mumtaz Mahal, the Taj Mahal is an iconic symbol of Mughal architecture and a UNESCO World Heritage site.", "description_zh": "\u6cf0\u59ec\u9675\u7531\u6c99\u8d3e\u6c57\u7687\u5e1d\u4e3a\u7eaa\u5ff5\u5176\u59bb\u5b50\u7a46\u5854\u5179\u00b7\u739b\u54c8\u5c14\u800c\u4e0b\u4ee4\u5efa\u9020\uff0c\u662f\u83ab\u5367\u513f\u5efa\u7b51\u7684\u6807\u5fd7\u6027\u8c61\u5f81\u548c\u8054\u5408\u56fd\u6559\u79d1\u6587\u7ec4\u7ec7\u4e16\u754c\u9057\u4ea7\u3002"}, {"title": "Aurangzeb's Reign", "title_zh": "\u5965\u6717\u5219\u5e03\u7684\u7edf\u6cbb", "year": 1658, "category": "reform", "description": "Aurangzeb's reign saw the Mughal Empire reach its greatest territorial extent but was marked by religious intolerance, costly wars, and growing discontent, sowing seeds of decline.", "description_zh": "\u5965\u6717\u5219\u5e03\u7684\u7edf\u6cbb\u65f6\u671f\uff0c\u83ab\u5367\u513f\u5e1d\u56fd\u8fbe\u5230\u4e86\u6700\u5927\u7684\u9886\u571f\u8303\u56f4\uff0c\u4f46\u5176\u7279\u70b9\u662f\u5b97\u6559\u4e0d\u5bb9\u5fcd\u3001\u4ee3\u4ef7\u9ad8\u6602\u7684\u6218\u4e89\u4ee5\u53ca\u65e5\u76ca\u589e\u957f\u7684\u4e0d\u6ee1\uff0c\u4e3a\u5e1d\u56fd\u7684\u8870\u843d\u57cb\u4e0b\u4e86\u4f0f\u7b14\u3002"}, {"title": "Coronation of Shivaji", "title_zh": "\u897f\u74e6\u5409\u52a0\u5195\u4e3a\u9a6c\u62c9\u5854\u56fd\u738b", "year": 1674, "category": "independence", "description": "Shivaji Maharaj was crowned Chhatrapati, establishing the Maratha Empire and challenging Mughal authority, marking a significant shift in regional power dynamics.", "description_zh": "\u897f\u74e6\u5409\u00b7\u9a6c\u54c8\u62c9\u5409\u52a0\u5195\u4e3a\u9a6c\u62c9\u5854\u5e1d\u56fd\u7687\u5e1d\uff0c\u5efa\u7acb\u4e86\u9a6c\u62c9\u5854\u5e1d\u56fd\u5e76\u6311\u6218\u83ab\u5367\u513f\u7684\u6743\u5a01\uff0c\u6807\u5fd7\u7740\u533a\u57df\u6743\u529b\u683c\u5c40\u7684\u91cd\u5927\u8f6c\u53d8\u3002"}, {"title": "Battle of Karnal", "title_zh": "\u5361\u7eb3\u5c14\u6218\u5f79", "year": 1739, "category": "war", "description": "Nader Shah of Persia decisively defeated the Mughal army, leading to the sack of Delhi and the plundering of immense wealth, severely weakening the Mughal Empire.", "description_zh": "\u6ce2\u65af\u56fd\u738b\u7eb3\u8fea\u5c14\u6c99\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u83ab\u5367\u513f\u519b\u961f\uff0c\u5bfc\u81f4\u5fb7\u91cc\u88ab\u6d17\u52ab\uff0c\u8d22\u5bcc\u88ab\u63a0\u593a\uff0c\u4e25\u91cd\u524a\u5f31\u4e86\u83ab\u5367\u513f\u5e1d\u56fd\u3002"}, {"title": "Third Battle of Panipat", "title_zh": "\u7b2c\u4e09\u6b21\u5e15\u5c3c\u5e15\u7279\u6218\u5f79", "year": 1761, "category": "war", "description": "The Maratha Empire suffered a devastating defeat against the Durrani Empire of Afghanistan, led by Ahmad Shah Durrani. This battle significantly curtailed Maratha ambitions and paved the way for British ascendancy.", "description_zh": "\u9a6c\u62c9\u5854\u5e1d\u56fd\u5728\u963f\u5bcc\u6c57\u675c\u5170\u5c3c\u5e1d\u56fd\uff08\u7531\u827e\u54c8\u8fc8\u5fb7\u00b7\u6c99\u00b7\u675c\u5170\u5c3c\u9886\u5bfc\uff09\u7684\u8fdb\u653b\u4e0b\u906d\u53d7\u4e86\u6bc1\u706d\u6027\u5931\u8d25\u3002\u8fd9\u573a\u6218\u5f79\u6781\u5927\u5730\u524a\u5f31\u4e86\u9a6c\u62c9\u5854\u4eba\u7684\u91ce\u5fc3\uff0c\u5e76\u4e3a\u82f1\u56fd\u7684\u5d1b\u8d77\u94fa\u5e73\u4e86\u9053\u8def\u3002"}, {"title": "Indian Rebellion of 1857", "title_zh": "1857\u5e74\u5370\u5ea6\u8d77\u4e49", "year": 1857, "category": "revolution", "description": "A widespread uprising against the rule of the British East India Company, marking the end of the Mughal Empire and the beginning of direct British Crown rule in India.", "description_zh": "\u4e00\u573a\u53cd\u5bf9\u82f1\u56fd\u4e1c\u5370\u5ea6\u516c\u53f8\u7edf\u6cbb\u7684\u5e7f\u6cdb\u8d77\u4e49\uff0c\u6807\u5fd7\u7740\u83ab\u5367\u513f\u5e1d\u56fd\u7684\u7ec8\u7ed3\u548c\u82f1\u56fd\u738b\u5ba4\u76f4\u63a5\u7edf\u6cbb\u5370\u5ea6\u7684\u5f00\u59cb\u3002"}], "aligned": [{"category": "war", "a": {"title": "Conquest of Constantinople", "title_zh": "\u541b\u58eb\u5766\u4e01\u5821\u7684\u5f81\u670d", "year": 1453, "description": "Sultan Mehmed II conquers Constantinople, the capital of the Byzantine Empire, marking the end of the Byzantine Empire and the rise of the Ottoman Empire as a major world power.", "description_zh": "\u82cf\u4e39\u7a46\u7f55\u9ed8\u5fb7\u4e8c\u4e16\u5f81\u670d\u4e86\u62dc\u5360\u5ead\u5e1d\u56fd\u7684\u9996\u90fd\u541b\u58eb\u5766\u4e01\u5821\uff0c\u6807\u5fd7\u7740\u62dc\u5360\u5ead\u5e1d\u56fd\u7684\u706d\u4ea1\u548c\u5965\u65af\u66fc\u5e1d\u56fd\u4f5c\u4e3a\u4e16\u754c\u5927\u56fd\u7684\u5d1b\u8d77\u3002"}, "b": {"title": "First Battle of Panipat", "title_zh": "\u7b2c\u4e00\u6b21\u5e15\u5c3c\u5e15\u7279\u6218\u5f79", "year": 1526, "description": "Babur, founder of the Mughal Empire, defeated Ibrahim Lodi of the Delhi Sultanate using gunpowder firearms and field artillery, marking the beginning of Mughal rule in India.", "description_zh": "\u83ab\u5367\u513f\u5e1d\u56fd\u7684\u5960\u57fa\u4eba\u5df4\u5e03\u5c14\u5229\u7528\u706b\u836f\u6b66\u5668\u548c\u91ce\u6218\u70ae\u51fb\u8d25\u4e86\u5fb7\u91cc\u82cf\u4e39\u56fd\u7684\u6613\u535c\u62c9\u6b23\u00b7\u6d1b\u8fea\uff0c\u6807\u5fd7\u7740\u83ab\u5367\u513f\u738b\u671d\u5728\u5370\u5ea6\u7edf\u6cbb\u7684\u5f00\u59cb\u3002"}}, {"category": "war", "a": {"title": "Siege of Vienna", "title_zh": "\u7ef4\u4e5f\u7eb3\u4e4b\u56f4", "year": 1529, "description": "The first Ottoman attempt to capture Vienna, which was unsuccessful. This marked the limit of Ottoman expansion into Central Europe.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u9996\u6b21\u653b\u6253\u7ef4\u4e5f\u7eb3\u7684\u5c1d\u8bd5\uff0c\u4f46\u672a\u80fd\u6210\u529f\u3002\u8fd9\u6807\u5fd7\u7740\u5965\u65af\u66fc\u5e1d\u56fd\u5411\u4e2d\u6b27\u6269\u5f20\u7684\u6781\u9650\u3002"}, "b": {"title": "Battle of Khanwa", "title_zh": "\u574e\u74e6\u6218\u5f79", "year": 1527, "description": "Babur decisively defeated a Rajput confederacy led by Rana Sanga, consolidating Mughal power in Northern India and demonstrating the effectiveness of his military tactics.", "description_zh": "\u5df4\u5e03\u5c14\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u7531\u62c9\u7eb3\u00b7\u6851\u52a0\u9886\u5bfc\u7684\u62c9\u6770\u666e\u7279\u8054\u519b\uff0c\u5de9\u56fa\u4e86\u83ab\u5367\u513f\u5728\u5370\u5ea6\u5317\u90e8\u7684\u6743\u529b\uff0c\u5e76\u5c55\u793a\u4e86\u4ed6\u6218\u672f\u7684\u6709\u6548\u6027\u3002"}}, {"category": "war", "a": {"title": "Battle of Lepanto", "title_zh": "\u52d2\u73ed\u9640\u6d77\u6218", "year": 1571, "description": "A naval battle in which the Holy League, a coalition of Catholic states, decisively defeated the Ottoman fleet. This marked a turning point in Ottoman naval dominance in the Mediterranean.", "description_zh": "\u4e00\u573a\u6d77\u6218\uff0c\u5929\u4e3b\u6559\u56fd\u5bb6\u7ec4\u6210\u7684\u5723\u8054\u76df\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u5965\u65af\u66fc\u8230\u961f\u3002\u8fd9\u6807\u5fd7\u7740\u5965\u65af\u66fc\u5728\u5730\u4e2d\u6d77\u6d77\u4e0a\u9738\u6743\u7684\u8f6c\u6298\u70b9\u3002"}, "b": {"title": "Second Battle of Panipat", "title_zh": "\u7b2c\u4e8c\u6b21\u5e15\u5c3c\u5e15\u7279\u6218\u5f79", "year": 1556, "description": "Akbar's forces, led by Bairam Khan, defeated Hemu, a Hindu general and claimant to the throne, securing the Mughal Empire's future and establishing Akbar's authority.", "description_zh": "\u963f\u514b\u5df4\u7684\u519b\u961f\u5728\u62dc\u62c9\u59c6\u00b7\u6c57\u7684\u7387\u9886\u4e0b\u51fb\u8d25\u4e86\u8d6b\u7a46\uff0c\u4e00\u4f4d\u5370\u5ea6\u6559\u5c06\u519b\u548c\u738b\u4f4d\u89ca\u89ce\u8005\uff0c\u786e\u4fdd\u4e86\u83ab\u5367\u513f\u5e1d\u56fd\u7684\u672a\u6765\u5e76\u786e\u7acb\u4e86\u963f\u514b\u5df4\u7684\u6743\u5a01\u3002"}}, {"category": "reform", "a": {"title": "Tanzimat Reforms Begin", "title_zh": "\u5766\u9f50\u9a6c\u7279\u6539\u9769\u5f00\u59cb", "year": 1839, "description": "A period of reform in the Ottoman Empire aimed at modernizing the empire and securing its territorial integrity against internal and external threats. Key decrees included guarantees of rights for all subjects regardless of religion.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u7684\u4e00\u6bb5\u6539\u9769\u65f6\u671f\uff0c\u65e8\u5728\u5b9e\u73b0\u5e1d\u56fd\u73b0\u4ee3\u5316\uff0c\u5e76\u4fdd\u969c\u5176\u514d\u53d7\u5185\u5916\u90e8\u5a01\u80c1\u7684\u9886\u571f\u5b8c\u6574\u3002\u5173\u952e\u6cd5\u4ee4\u5305\u62ec\u4fdd\u969c\u6240\u6709\u81e3\u6c11\u4e0d\u5206\u5b97\u6559\u7684\u6743\u5229\u3002"}, "b": {"title": "Aurangzeb's Reign", "title_zh": "\u5965\u6717\u5219\u5e03\u7684\u7edf\u6cbb", "year": 1658, "description": "Aurangzeb's reign saw the Mughal Empire reach its greatest territorial extent but was marked by religious intolerance, costly wars, and growing discontent, sowing seeds of decline.", "description_zh": "\u5965\u6717\u5219\u5e03\u7684\u7edf\u6cbb\u65f6\u671f\uff0c\u83ab\u5367\u513f\u5e1d\u56fd\u8fbe\u5230\u4e86\u6700\u5927\u7684\u9886\u571f\u8303\u56f4\uff0c\u4f46\u5176\u7279\u70b9\u662f\u5b97\u6559\u4e0d\u5bb9\u5fcd\u3001\u4ee3\u4ef7\u9ad8\u6602\u7684\u6218\u4e89\u4ee5\u53ca\u65e5\u76ca\u589e\u957f\u7684\u4e0d\u6ee1\uff0c\u4e3a\u5e1d\u56fd\u7684\u8870\u843d\u57cb\u4e0b\u4e86\u4f0f\u7b14\u3002"}}, {"category": "war", "a": {"title": "Crimean War", "title_zh": "\u514b\u91cc\u7c73\u4e9a\u6218\u4e89", "year": 1853, "description": "A conflict fought between the Russian Empire and an alliance of the Ottoman Empire, France, the United Kingdom, and Sardinia. It highlighted the declining military power of Russia and the growing influence of Western powers in the region.", "description_zh": "\u4fc4\u7f57\u65af\u5e1d\u56fd\u4e0e\u5965\u65af\u66fc\u5e1d\u56fd\u3001\u6cd5\u56fd\u3001\u82f1\u56fd\u548c\u6492\u4e01\u738b\u56fd\u7ec4\u6210\u7684\u8054\u76df\u4e4b\u95f4\u7684\u4e00\u573a\u51b2\u7a81\u3002\u5b83\u51f8\u663e\u4e86\u4fc4\u7f57\u65af\u519b\u4e8b\u529b\u91cf\u7684\u8870\u843d\u4ee5\u53ca\u897f\u65b9\u5217\u5f3a\u5728\u8be5\u5730\u533a\u65e5\u76ca\u589e\u957f\u7684\u5f71\u54cd\u529b\u3002"}, "b": {"title": "Battle of Karnal", "title_zh": "\u5361\u7eb3\u5c14\u6218\u5f79", "year": 1739, "description": "Nader Shah of Persia decisively defeated the Mughal army, leading to the sack of Delhi and the plundering of immense wealth, severely weakening the Mughal Empire.", "description_zh": "\u6ce2\u65af\u56fd\u738b\u7eb3\u8fea\u5c14\u6c99\u51b3\u5b9a\u6027\u5730\u51fb\u8d25\u4e86\u83ab\u5367\u513f\u519b\u961f\uff0c\u5bfc\u81f4\u5fb7\u91cc\u88ab\u6d17\u52ab\uff0c\u8d22\u5bcc\u88ab\u63a0\u593a\uff0c\u4e25\u91cd\u524a\u5f31\u4e86\u83ab\u5367\u513f\u5e1d\u56fd\u3002"}}, {"category": "war", "a": {"title": "Russo-Turkish War", "title_zh": "\u4fc4\u571f\u6218\u4e89", "year": 1877, "description": "A major conflict between the Russian and Ottoman Empires, resulting in significant territorial losses for the Ottomans and the independence of several Balkan nations.", "description_zh": "\u4fc4\u7f57\u65af\u548c\u5965\u65af\u66fc\u5e1d\u56fd\u4e4b\u95f4\u7684\u4e00\u573a\u4e3b\u8981\u51b2\u7a81\uff0c\u5bfc\u81f4\u5965\u65af\u66fc\u5e1d\u56fd\u5931\u53bb\u5927\u7247\u9886\u571f\uff0c\u4ee5\u53ca\u51e0\u4e2a\u5df4\u5c14\u5e72\u56fd\u5bb6\u7684\u72ec\u7acb\u3002"}, "b": {"title": "Third Battle of Panipat", "title_zh": "\u7b2c\u4e09\u6b21\u5e15\u5c3c\u5e15\u7279\u6218\u5f79", "year": 1761, "description": "The Maratha Empire suffered a devastating defeat against the Durrani Empire of Afghanistan, led by Ahmad Shah Durrani. This battle significantly curtailed Maratha ambitions and paved the way for British ascendancy.", "description_zh": "\u9a6c\u62c9\u5854\u5e1d\u56fd\u5728\u963f\u5bcc\u6c57\u675c\u5170\u5c3c\u5e1d\u56fd\uff08\u7531\u827e\u54c8\u8fc8\u5fb7\u00b7\u6c99\u00b7\u675c\u5170\u5c3c\u9886\u5bfc\uff09\u7684\u8fdb\u653b\u4e0b\u906d\u53d7\u4e86\u6bc1\u706d\u6027\u5931\u8d25\u3002\u8fd9\u573a\u6218\u5f79\u6781\u5927\u5730\u524a\u5f31\u4e86\u9a6c\u62c9\u5854\u4eba\u7684\u91ce\u5fc3\uff0c\u5e76\u4e3a\u82f1\u56fd\u7684\u5d1b\u8d77\u94fa\u5e73\u4e86\u9053\u8def\u3002"}}, {"category": "revolution", "a": {"title": "Young Turk Revolution", "title_zh": "\u9752\u5e74\u571f\u8033\u5176\u9769\u547d", "year": 1908, "description": "A movement that restored the Ottoman constitution of 1876 and ushered in a period of multi-party politics. It aimed to modernize the empire and counter European influence.", "description_zh": "\u4e00\u9879\u6062\u590d1876\u5e74\u5965\u65af\u66fc\u5baa\u6cd5\u5e76\u5f00\u542f\u591a\u515a\u653f\u6cbb\u65f6\u671f\u7684\u8fd0\u52a8\u3002\u5b83\u65e8\u5728\u5b9e\u73b0\u5e1d\u56fd\u73b0\u4ee3\u5316\u5e76\u5bf9\u6297\u6b27\u6d32\u5f71\u54cd\u3002"}, "b": {"title": "Indian Rebellion of 1857", "title_zh": "1857\u5e74\u5370\u5ea6\u8d77\u4e49", "year": 1857, "description": "A widespread uprising against the rule of the British East India Company, marking the end of the Mughal Empire and the beginning of direct British Crown rule in India.", "description_zh": "\u4e00\u573a\u53cd\u5bf9\u82f1\u56fd\u4e1c\u5370\u5ea6\u516c\u53f8\u7edf\u6cbb\u7684\u5e7f\u6cdb\u8d77\u4e49\uff0c\u6807\u5fd7\u7740\u83ab\u5367\u513f\u5e1d\u56fd\u7684\u7ec8\u7ed3\u548c\u82f1\u56fd\u738b\u5ba4\u76f4\u63a5\u7edf\u6cbb\u5370\u5ea6\u7684\u5f00\u59cb\u3002"}}], "prediction": {"title": "Ottoman Empire Enters World War I", "title_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u52a0\u5165\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218", "year": 1914, "category": "war", "description": "The Ottoman Empire joined the Central Powers in World War I, a decision that ultimately led to its dissolution.", "description_zh": "\u5965\u65af\u66fc\u5e1d\u56fd\u52a0\u5165\u540c\u76df\u56fd\u53c2\u52a0\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218\uff0c\u8fd9\u4e00\u51b3\u5b9a\u6700\u7ec8\u5bfc\u81f4\u4e86\u5176\u89e3\u4f53\u3002"}}, {"label_a": "Modern Japan", "label_b": "Modern Germany", "similarity": 0.238, "lcs_length": 5, "timeline_a": [{"title": "Meiji Restoration", "title_zh": "\u660e\u6cbb\u7ef4\u65b0", "year": 1868, "category": "reform", "description": "The Meiji Restoration marked the end of the Tokugawa shogunate and the restoration of imperial rule in Japan, leading to rapid modernization and Westernization.", "description_zh": "\u660e\u6cbb\u7ef4\u65b0\u6807\u5fd7\u7740\u5fb7\u5ddd\u5e55\u5e9c\u7684\u7ed3\u675f\u548c\u65e5\u672c\u5929\u7687\u7edf\u6cbb\u7684\u6062\u590d\uff0c\u5e26\u6765\u4e86\u5feb\u901f\u7684\u73b0\u4ee3\u5316\u548c\u897f\u5316\u3002"}, {"title": "First Sino-Japanese War", "title_zh": "\u7b2c\u4e00\u6b21\u4e2d\u65e5\u6218\u4e89", "year": 1894, "category": "war", "description": "A conflict between the Qing Dynasty of China and the Empire of Japan over influence in Korea, resulting in a decisive Japanese victory and territorial gains.", "description_zh": "\u6e05\u671d\u4e0e\u65e5\u672c\u5e1d\u56fd\u4e4b\u95f4\u56f4\u7ed5\u671d\u9c9c\u5f71\u54cd\u529b\u5c55\u5f00\u7684\u51b2\u7a81\uff0c\u7ed3\u679c\u662f\u65e5\u672c\u53d6\u5f97\u51b3\u5b9a\u6027\u80dc\u5229\u5e76\u83b7\u5f97\u9886\u571f\u3002"}, {"title": "Treaty of Shimonoseki", "title_zh": "\u9a6c\u5173\u6761\u7ea6", "year": 1895, "category": "diplomacy", "description": "The treaty that ended the First Sino-Japanese War, forcing China to cede Taiwan, the Pescadores Islands, and the Liaodong Peninsula to Japan, and recognize Korean independence.", "description_zh": "\u7ed3\u675f\u7b2c\u4e00\u6b21\u4e2d\u65e5\u6218\u4e89\u7684\u6761\u7ea6\uff0c\u8feb\u4f7f\u4e2d\u56fd\u5c06\u53f0\u6e7e\u3001\u6f8e\u6e56\u5217\u5c9b\u548c\u8fbd\u4e1c\u534a\u5c9b\u5272\u8ba9\u7ed9\u65e5\u672c\uff0c\u5e76\u627f\u8ba4\u671d\u9c9c\u72ec\u7acb\u3002"}, {"title": "Russo-Japanese War", "title_zh": "\u65e5\u4fc4\u6218\u4e89", "year": 1904, "category": "war", "description": "A major war fought between the Russian Empire and the Empire of Japan over imperial ambitions in Manchuria and Korea, resulting in a Japanese victory.", "description_zh": "\u4fc4\u7f57\u65af\u5e1d\u56fd\u548c\u65e5\u672c\u5e1d\u56fd\u4e4b\u95f4\u56f4\u7ed5\u6ee1\u6d32\u548c\u671d\u9c9c\u7684\u5e1d\u56fd\u91ce\u5fc3\u800c\u5c55\u5f00\u7684\u4e00\u573a\u4e3b\u8981\u6218\u4e89\uff0c\u7ed3\u679c\u662f\u65e5\u672c\u83b7\u80dc\u3002"}, {"title": "Annexation of Korea by Japan", "title_zh": "\u65e5\u672c\u541e\u5e76\u671d\u9c9c", "year": 1910, "category": "colonization", "description": "Japan formally annexed Korea, ending the Joseon Dynasty and beginning a period of Japanese colonial rule.", "description_zh": "\u65e5\u672c\u6b63\u5f0f\u541e\u5e76\u671d\u9c9c\uff0c\u7ed3\u675f\u4e86\u671d\u9c9c\u738b\u671d\uff0c\u5f00\u59cb\u4e86\u65e5\u672c\u6b96\u6c11\u7edf\u6cbb\u65f6\u671f\u3002"}, {"title": "Japan's Involvement in World War I", "title_zh": "\u65e5\u672c\u5728\u4e00\u6218\u4e2d\u7684\u53c2\u4e0e", "year": 1914, "category": "war", "description": "Japan joined the Allied Powers in World War I, seizing German possessions in China and the Pacific.", "description_zh": "\u65e5\u672c\u5728\u4e00\u6218\u4e2d\u52a0\u5165\u534f\u7ea6\u56fd\uff0c\u593a\u53d6\u4e86\u5fb7\u56fd\u5728\u4e2d\u56fd\u548c\u592a\u5e73\u6d0b\u7684\u5c5e\u5730\u3002"}, {"title": "Great Kanto Earthquake", "title_zh": "\u5173\u4e1c\u5927\u5730\u9707", "year": 1923, "category": "disaster", "description": "A massive earthquake that devastated Tokyo and surrounding areas, causing widespread destruction and loss of life.", "description_zh": "\u4e00\u573a\u6bc1\u706d\u4e86\u4e1c\u4eac\u53ca\u5468\u8fb9\u5730\u533a\u7684\u5de8\u5927\u5730\u9707\uff0c\u9020\u6210\u5927\u8303\u56f4\u7834\u574f\u548c\u751f\u547d\u635f\u5931\u3002"}, {"title": "Manchurian Incident", "title_zh": "\u6ee1\u6d32\u4e8b\u53d8", "year": 1931, "category": "war", "description": "A staged event by the Japanese Kwantung Army that provided a pretext for Japan's invasion and occupation of Manchuria.", "description_zh": "\u65e5\u672c\u5173\u4e1c\u519b\u7b56\u5212\u7684\u4e00\u8d77\u4e8b\u4ef6\uff0c\u4e3a\u65e5\u672c\u5165\u4fb5\u548c\u5360\u9886\u6ee1\u6d32\u63d0\u4f9b\u4e86\u501f\u53e3\u3002"}, {"title": "Second Sino-Japanese War", "title_zh": "\u7b2c\u4e8c\u6b21\u4e2d\u65e5\u6218\u4e89", "year": 1937, "category": "war", "description": "A large-scale war between the Republic of China and the Empire of Japan, which later merged into the Pacific theater of World War II.", "description_zh": "\u4e2d\u534e\u6c11\u56fd\u4e0e\u65e5\u672c\u5e1d\u56fd\u4e4b\u95f4\u7684\u4e00\u573a\u5927\u89c4\u6a21\u6218\u4e89\uff0c\u540e\u6765\u5e76\u5165\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u7684\u592a\u5e73\u6d0b\u6218\u573a\u3002"}, {"title": "Attack on Pearl Harbor", "title_zh": "\u5077\u88ad\u73cd\u73e0\u6e2f", "year": 1941, "category": "war", "description": "A surprise military strike by the Imperial Japanese Navy Air Service upon the United States naval base at Pearl Harbor, Hawaii, which led to the US entry into World War II.", "description_zh": "\u65e5\u672c\u5e1d\u56fd\u6d77\u519b\u822a\u7a7a\u961f\u5bf9\u590f\u5a01\u5937\u73cd\u73e0\u6e2f\u7f8e\u56fd\u6d77\u519b\u57fa\u5730\u53d1\u52a8\u7684\u7a81\u88ad\u519b\u4e8b\u6253\u51fb\uff0c\u5bfc\u81f4\u7f8e\u56fd\u53c2\u6218\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u3002"}, {"title": "Atomic Bombings of Hiroshima and Nagasaki", "title_zh": "\u5e7f\u5c9b\u548c\u957f\u5d0e\u539f\u5b50\u5f39\u7206\u70b8", "year": 1945, "category": "war", "description": "The United States dropped atomic bombs on the Japanese cities of Hiroshima and Nagasaki, leading to Japan's surrender and the end of World War II.", "description_zh": "\u7f8e\u56fd\u5728\u65e5\u672c\u5e7f\u5c9b\u548c\u957f\u5d0e\u6295\u4e0b\u539f\u5b50\u5f39\uff0c\u5bfc\u81f4\u65e5\u672c\u6295\u964d\u548c\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u7ed3\u675f\u3002"}, {"title": "Promulgation of the Constitution of Japan", "title_zh": "\u65e5\u672c\u56fd\u5baa\u6cd5\u7684\u9881\u5e03", "year": 1947, "category": "reform", "description": "A new constitution was promulgated, establishing Japan as a parliamentary democracy with a strong emphasis on pacifism and civil liberties.", "description_zh": "\u9881\u5e03\u4e86\u65b0\u5baa\u6cd5\uff0c\u786e\u7acb\u4e86\u65e5\u672c\u4f5c\u4e3a\u4ee5\u548c\u5e73\u4e3b\u4e49\u548c\u516c\u6c11\u81ea\u7531\u4e3a\u91cd\u70b9\u7684\u8bae\u4f1a\u6c11\u4e3b\u5236\u56fd\u5bb6\u3002"}, {"title": "Japanese Post-War Economic Miracle", "title_zh": "\u65e5\u672c\u6218\u540e\u7ecf\u6d4e\u5947\u8ff9", "year": 1955, "category": "economic_boom", "description": "A period of rapid economic growth in Japan following World War II, transforming the country into a global economic powerhouse.", "description_zh": "\u7b2c\u4e8c\u6b21\u4e16\u754c\u5927\u6218\u540e\u65e5\u672c\u7ecf\u6d4e\u5feb\u901f\u589e\u957f\u7684\u65f6\u671f\uff0c\u5c06\u8be5\u56fd\u8f6c\u53d8\u4e3a\u5168\u7403\u7ecf\u6d4e\u5f3a\u56fd\u3002"}, {"title": "1964 Summer Olympics in Tokyo", "title_zh": "1964\u5e74\u4e1c\u4eac\u5965\u8fd0\u4f1a", "year": 1964, "category": "cultural_peak", "description": "The first Olympic Games held in Asia, symbolizing Japan's post-war recovery and re-emergence on the world stage.", "description_zh": "\u9996\u6b21\u5728\u4e9a\u6d32\u4e3e\u884c\u7684\u5965\u6797\u5339\u514b\u8fd0\u52a8\u4f1a\uff0c\u8c61\u5f81\u7740\u65e5\u672c\u6218\u540e\u590d\u82cf\u548c\u91cd\u65b0\u767b\u4e0a\u4e16\u754c\u821e\u53f0\u3002"}, {"title": "Collapse of the Japanese Asset Price Bubble", "title_zh": "\u65e5\u672c\u8d44\u4ea7\u4ef7\u683c\u6ce1\u6cab\u7834\u88c2", "year": 1991, "category": "economic_crisis", "description": "The bursting of the economic bubble in Japan, leading to a prolonged period of economic stagnation known as the 'Lost Decades'.", "description_zh": "\u65e5\u672c\u7ecf\u6d4e\u6ce1\u6cab\u7684\u7834\u88c2\uff0c\u5bfc\u81f4\u4e86\u88ab\u79f0\u4e3a\u201c\u5931\u843d\u7684\u51e0\u5341\u5e74\u201d\u7684\u957f\u671f\u7ecf\u6d4e\u505c\u6ede\u3002"}, {"title": "Fukushima Daiichi Nuclear Disaster", "title_zh": "\u798f\u5c9b\u7b2c\u4e00\u6838\u4e8b\u6545", "year": 2011, "category": "disaster", "description": "A nuclear accident triggered by the T\u014dhoku earthquake and tsunami, leading to widespread radioactive contamination and significant challenges for Japan.", "description_zh": "\u7531\u4e1c\u5317\u5730\u9707\u548c\u6d77\u5578\u5f15\u53d1\u7684\u6838\u4e8b\u6545\uff0c\u5bfc\u81f4\u5927\u8303\u56f4\u653e\u5c04\u6027\u6c61\u67d3\u548c\u65e5\u672c\u9762\u4e34\u91cd\u5927\u6311\u6218\u3002"}], "timeline_b": [{"title": "Treaty of Verdun", "title_zh": "\u51e1\u5c14\u767b\u6761\u7ea6", "year": 843, "category": "diplomacy", "description": "The treaty divided the Carolingian Empire among the three surviving sons of Louis the Pious, laying the groundwork for the future kingdoms of France and Germany.", "description_zh": "\u51e1\u5c14\u767b\u6761\u7ea6\u5c06\u67e5\u7406\u66fc\u5e1d\u56fd\u5206\u5272\u7ed9\u8def\u6613\u8654\u8bda\u7684\u4e09\u4e2a\u5e78\u5b58\u7684\u513f\u5b50\uff0c\u4e3a\u672a\u6765\u7684\u6cd5\u5170\u897f\u738b\u56fd\u548c\u5fb7\u610f\u5fd7\u738b\u56fd\u5960\u5b9a\u4e86\u57fa\u7840\u3002"}, {"title": "Ottonian Renaissance", "title_zh": "\u5965\u6258\u738b\u671d\u6587\u827a\u590d\u5174", "year": 950, "category": "cultural_peak", "description": "A period of cultural and artistic flourishing in the Holy Roman Empire under the Ottonian dynasty, characterized by a revival of learning and the arts.", "description_zh": "\u5965\u6258\u738b\u671d\u7edf\u6cbb\u4e0b\u7684\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\u6587\u5316\u548c\u827a\u672f\u7684\u7e41\u8363\u65f6\u671f\uff0c\u4ee5\u5b66\u4e60\u548c\u827a\u672f\u7684\u590d\u5174\u4e3a\u7279\u5f81\u3002"}, {"title": "Investiture Controversy", "title_zh": "\u53d9\u4efb\u6743\u6597\u4e89", "year": 1075, "category": "diplomacy", "description": "A conflict between the Holy Roman Emperors and the Papacy over the right to appoint bishops and other church officials.", "description_zh": "\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\u7687\u5e1d\u4e0e\u6559\u7687\u4e4b\u95f4\u5173\u4e8e\u4efb\u547d\u4e3b\u6559\u548c\u5176\u4ed6\u6559\u4f1a\u5b98\u5458\u7684\u6743\u5229\u7684\u51b2\u7a81\u3002"}, {"title": "Formation of the Hanseatic League", "title_zh": "\u6c49\u8428\u540c\u76df\u7684\u5f62\u6210", "year": 1200, "category": "economic_boom", "description": "A commercial and defensive confederation of merchant guilds and market towns in Northwestern and Central Europe, which dominated trade along the coast of Northern Europe.", "description_zh": "\u897f\u5317\u6b27\u548c\u4e2d\u6b27\u5546\u4eba\u884c\u4f1a\u548c\u96c6\u5e02\u57ce\u9547\u7684\u5546\u4e1a\u548c\u9632\u5fa1\u8054\u76df\uff0c\u4e3b\u5bfc\u4e86\u5317\u6b27\u6cbf\u6d77\u7684\u8d38\u6613\u3002"}, {"title": "Black Death in German Lands", "title_zh": "\u9ed1\u6b7b\u75c5\u5728\u5fb7\u610f\u5fd7\u5730\u533a", "year": 1348, "category": "pandemic", "description": "The bubonic plague swept through the Holy Roman Empire, causing widespread death and social upheaval.", "description_zh": "\u817a\u9f20\u75ab\u5e2d\u5377\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\uff0c\u9020\u6210\u5e7f\u6cdb\u7684\u6b7b\u4ea1\u548c\u793e\u4f1a\u52a8\u8361\u3002"}, {"title": "Martin Luther Posts the Ninety-five Theses", "title_zh": "\u9a6c\u4e01\u00b7\u8def\u5fb7\u5f20\u8d34\u4e5d\u5341\u4e94\u6761\u8bba\u7eb2", "year": 1517, "category": "reform", "description": "Martin Luther's challenge to the Catholic Church's practices, particularly the sale of indulgences, marking a pivotal moment in the Protestant Reformation.", "description_zh": "\u9a6c\u4e01\u00b7\u8def\u5fb7\u6311\u6218\u5929\u4e3b\u6559\u4f1a\u7684\u505a\u6cd5\uff0c\u7279\u522b\u662f\u8d4e\u7f6a\u5238\u7684\u9500\u552e\uff0c\u6807\u5fd7\u7740\u5b97\u6559\u6539\u9769\u7684\u5173\u952e\u65f6\u523b\u3002"}, {"title": "Peace of Augsburg", "title_zh": "\u5965\u683c\u65af\u5821\u548c\u7ea6", "year": 1555, "category": "diplomacy", "description": "A treaty that officially ended the religious struggle between Catholics and Protestants within the Holy Roman Empire, allowing rulers to choose either Catholicism or Lutheranism as the official religion of their state.", "description_zh": "\u4e00\u9879\u6761\u7ea6\uff0c\u6b63\u5f0f\u7ed3\u675f\u4e86\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\u5883\u5185\u5929\u4e3b\u6559\u5f92\u548c\u65b0\u6559\u5f92\u4e4b\u95f4\u7684\u5b97\u6559\u6597\u4e89\uff0c\u5141\u8bb8\u7edf\u6cbb\u8005\u9009\u62e9\u5929\u4e3b\u6559\u6216\u8def\u5fb7\u5b97\u4f5c\u4e3a\u5176\u56fd\u5bb6\u7684\u5b98\u65b9\u5b97\u6559\u3002"}, {"title": "Thirty Years' War Begins", "title_zh": "\u4e09\u5341\u5e74\u6218\u4e89\u5f00\u59cb", "year": 1618, "category": "war", "description": "A devastating war fought primarily in Central Europe, initially between Protestant and Catholic states, which evolved into a general struggle for power involving most of the great European powers.", "description_zh": "\u4e00\u573a\u4e3b\u8981\u5728\u4e2d\u6b27\u8fdb\u884c\u7684\u6bc1\u706d\u6027\u6218\u4e89\uff0c\u6700\u521d\u662f\u65b0\u6559\u56fd\u5bb6\u548c\u5929\u4e3b\u6559\u56fd\u5bb6\u4e4b\u95f4\u7684\u51b2\u7a81\uff0c\u540e\u6765\u6f14\u53d8\u6210\u6d89\u53ca\u5927\u591a\u6570\u6b27\u6d32\u5927\u56fd\u7684\u666e\u904d\u6743\u529b\u6597\u4e89\u3002"}, {"title": "Peace of Westphalia", "title_zh": "\u5a01\u65af\u7279\u4f10\u5229\u4e9a\u548c\u7ea6", "year": 1648, "category": "diplomacy", "description": "A series of peace treaties that ended the Thirty Years' War and the Eighty Years' War, establishing the principle of state sovereignty and the concept of the balance of power in Europe.", "description_zh": "\u4e00\u7cfb\u5217\u7ed3\u675f\u4e09\u5341\u5e74\u6218\u4e89\u548c\u516b\u5341\u5e74\u6218\u4e89\u7684\u548c\u5e73\u6761\u7ea6\uff0c\u786e\u7acb\u4e86\u56fd\u5bb6\u4e3b\u6743\u539f\u5219\u548c\u6b27\u6d32\u5747\u52bf\u6982\u5ff5\u3002"}, {"title": "Kingdom of Prussia Proclaimed", "title_zh": "\u666e\u9c81\u58eb\u738b\u56fd\u5ba3\u544a\u6210\u7acb", "year": 1701, "category": "diplomacy", "description": "Frederick I crowned himself King in Prussia, marking the elevation of Brandenburg-Prussia to a kingdom and the beginning of its rise as a major European power.", "description_zh": "\u8153\u7279\u70c8\u4e00\u4e16\u52a0\u5195\u4e3a\u666e\u9c81\u58eb\u56fd\u738b\uff0c\u6807\u5fd7\u7740\u52c3\u5170\u767b\u5821-\u666e\u9c81\u58eb\u63d0\u5347\u4e3a\u738b\u56fd\uff0c\u5e76\u5f00\u59cb\u5d1b\u8d77\u4e3a\u6b27\u6d32\u4e3b\u8981\u5f3a\u56fd\u3002"}, {"title": "Dissolution of the Holy Roman Empire", "title_zh": "\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\u89e3\u4f53", "year": 1806, "category": "collapse", "description": "Following Napoleon's victories, the Holy Roman Empire was dissolved, leading to the formation of the Confederation of the Rhine and a significant redrawing of the political map of German lands.", "description_zh": "\u5728\u62ff\u7834\u4ed1\u53d6\u5f97\u80dc\u5229\u540e\uff0c\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\u89e3\u4f53\uff0c\u5bfc\u81f4\u83b1\u8335\u90a6\u8054\u7684\u5f62\u6210\uff0c\u5e76\u663e\u8457\u91cd\u7ed8\u4e86\u5fb7\u610f\u5fd7\u5730\u533a\u7684\u653f\u6cbb\u7248\u56fe\u3002"}, {"title": "German Confederation Established", "title_zh": "\u5fb7\u610f\u5fd7\u90a6\u8054\u6210\u7acb", "year": 1815, "category": "diplomacy", "description": "A loose association of 39 German states, created by the Congress of Vienna, intended to replace the defunct Holy Roman Empire and provide a framework for German political organization.", "description_zh": "\u7531\u7ef4\u4e5f\u7eb3\u4f1a\u8bae\u521b\u5efa\u768439\u4e2a\u5fb7\u610f\u5fd7\u56fd\u5bb6\u7684\u677e\u6563\u8054\u5408\uff0c\u65e8\u5728\u53d6\u4ee3\u5df2\u89e3\u4f53\u7684\u795e\u5723\u7f57\u9a6c\u5e1d\u56fd\uff0c\u5e76\u4e3a\u5fb7\u56fd\u653f\u6cbb\u7ec4\u7ec7\u63d0\u4f9b\u6846\u67b6\u3002"}, {"title": "Revolutions of 1848 in German States", "title_zh": "1848\u5e74\u5fb7\u610f\u5fd7\u5404\u90a6\u9769\u547d", "year": 1848, "category": "revolution", "description": "A series of loosely coordinated protests and uprisings in the German Confederation, driven by demands for political reform, freedom of the press, and national unity.", "description_zh": "\u5fb7\u610f\u5fd7\u90a6\u8054\u4e2d\u4e00\u7cfb\u5217\u677e\u6563\u534f\u8c03\u7684\u6297\u8bae\u548c\u8
